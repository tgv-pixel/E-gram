<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - SAFE Platform</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #667eea;
            --primary-dark: #764ba2;
            --success: #2ecc71;
            --warning: #f39c12;
            --danger: #e74c3c;
            --dark: #2c3e50;
            --light: #f8f9fa;
            --gray: #6c757d;
            --sidebar-width: 250px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
            display: flex;
        }

        /* Login Screen */
        .login-screen {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            width: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .login-screen.hidden {
            display: none;
        }

        .login-box {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 400px;
            animation: fadeInUp 0.5s;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-box h2 {
            text-align: center;
            color: var(--dark);
            margin-bottom: 10px;
        }

        .login-box .subtitle {
            text-align: center;
            color: var(--gray);
            font-size: 0.85em;
            margin-bottom: 25px;
        }

        .login-box .form-group {
            margin-bottom: 15px;
        }

        .login-box label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: var(--dark);
            font-size: 0.9em;
        }

        .login-box input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e1e5e9;
            border-radius: 10px;
            font-size: 14px;
            transition: all 0.3s;
            outline: none;
        }

        .login-box input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
        }

        .login-box .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .login-box .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102,126,234,0.3);
        }

        .login-box .error-msg {
            color: var(--danger);
            text-align: center;
            margin-top: 10px;
            font-size: 0.85em;
            display: none;
        }

        /* Sidebar */
        .sidebar {
            width: var(--sidebar-width);
            background: var(--dark);
            color: white;
            padding: 20px 0;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
            z-index: 100;
        }

        .sidebar .logo {
            padding: 20px;
            font-size: 1.5em;
            font-weight: 700;
            text-align: center;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 20px;
        }

        .sidebar .nav-item {
            padding: 14px 25px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.9em;
            border-left: 3px solid transparent;
        }

        .sidebar .nav-item:hover {
            background: rgba(255,255,255,0.05);
        }

        .sidebar .nav-item.active {
            background: rgba(102,126,234,0.2);
            border-left-color: var(--primary);
            color: var(--primary);
        }

        .sidebar .nav-item i {
            width: 20px;
            text-align: center;
        }

        .sidebar .nav-item .badge {
            background: var(--danger);
            color: white;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.75em;
            margin-left: auto;
        }

        /* Main Content */
        .main-content {
            margin-left: var(--sidebar-width);
            flex: 1;
            padding: 20px;
            min-height: 100vh;
        }

        .main-content.hidden {
            display: none;
        }

        .top-bar {
            background: white;
            padding: 15px 25px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .top-bar h1 {
            font-size: 1.3em;
            color: var(--dark);
        }

        .logout-btn {
            padding: 8px 20px;
            background: var(--danger);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .logout-btn:hover {
            background: #c0392b;
        }

        .section {
            display: none;
        }

        .section.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .stat-card .stat-icon {
            font-size: 2em;
            margin-bottom: 8px;
        }

        .stat-card .stat-value {
            font-size: 1.8em;
            font-weight: 700;
            color: var(--dark);
        }

        .stat-card .stat-label {
            font-size: 0.8em;
            color: var(--gray);
        }

        /* Cards */
        .card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .card-title {
            font-size: 1.1em;
            font-weight: 600;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--dark);
        }

        /* Tables */
        .table-container {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85em;
        }

        th {
            background: #f8f9fa;
            padding: 12px 10px;
            text-align: left;
            font-weight: 600;
            color: var(--dark);
            border-bottom: 2px solid #dee2e6;
            white-space: nowrap;
        }

        td {
            padding: 10px;
            border-bottom: 1px solid #f0f0f0;
        }

        tr:hover {
            background: #f8f9ff;
        }

        /* Badges */
        .badge {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.75em;
            font-weight: 600;
            white-space: nowrap;
        }

        .badge-success { background: #d4edda; color: #155724; }
        .badge-warning { background: #fff3cd; color: #856404; }
        .badge-danger { background: #f8d7da; color: #721c24; }
        .badge-info { background: #d1ecf1; color: #0c5460; }
        .badge-primary { background: #e8eaff; color: #4a5acf; }

        /* Buttons */
        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.8em;
            transition: all 0.3s;
            white-space: nowrap;
        }

        .btn-sm {
            padding: 5px 10px;
            font-size: 0.75em;
        }

        .btn-success { background: var(--success); color: white; }
        .btn-success:hover { background: #27ae60; }

        .btn-danger { background: var(--danger); color: white; }
        .btn-danger:hover { background: #c0392b; }

        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-dark); }

        .btn-warning { background: var(--warning); color: white; }
        .btn-warning:hover { background: #e67e22; }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Modals */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal-box {
            background: white;
            border-radius: 15px;
            padding: 25px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            animation: fadeIn 0.3s;
        }

        .modal-box h3 {
            margin-bottom: 15px;
            color: var(--dark);
        }

        .modal-box .form-group {
            margin-bottom: 12px;
        }

        .modal-box .form-group label {
            display: block;
            margin-bottom: 4px;
            font-weight: 600;
            font-size: 0.85em;
        }

        .modal-box .form-group input,
        .modal-box .form-group select {
            width: 100%;
            padding: 10px;
            border: 2px solid #e1e5e9;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
        }

        .modal-box .form-group input:focus,
        .modal-box .form-group select:focus {
            border-color: var(--primary);
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            justify-content: flex-end;
        }

        /* Search */
        .search-box {
            margin-bottom: 15px;
            display: flex;
            gap: 10px;
        }

        .search-box input {
            flex: 1;
            padding: 10px 15px;
            border: 2px solid #e1e5e9;
            border-radius: 10px;
            font-size: 14px;
            outline: none;
        }

        .search-box input:focus {
            border-color: var(--primary);
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 25px;
            right: 25px;
            background: var(--dark);
            color: white;
            padding: 14px 24px;
            border-radius: 10px;
            font-weight: 500;
            z-index: 2000;
            animation: slideUp 0.3s ease;
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
        }

        @keyframes slideUp {
            from { transform: translateY(100px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .loading-spinner {
            text-align: center;
            padding: 40px;
        }

        .spinner {
            width: 35px;
            height: 35px;
            border: 3px solid #e1e5e9;
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* User detail */
        .detail-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .detail-item {
            padding: 10px;
            background: #f8f9fa;
            border-radius: 8px;
        }

        .detail-item .detail-label {
            font-size: 0.7em;
            color: var(--gray);
            text-transform: uppercase;
        }

        .detail-item .detail-value {
            font-weight: 600;
            color: var(--dark);
            font-size: 0.95em;
        }

        /* Tabs inside sections */
        .sub-tabs {
            display: flex;
            gap: 5px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .sub-tab {
            padding: 8px 16px;
            background: #f0f0f0;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.8em;
            transition: all 0.3s;
        }

        .sub-tab.active {
            background: var(--primary);
            color: white;
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 60px;
            }
            .sidebar .nav-item span {
                display: none;
            }
            .sidebar .logo {
                font-size: 1em;
            }
            .main-content {
                margin-left: 60px;
            }
            .detail-grid {
                grid-template-columns: 1fr;
            }
            .stats-grid {
                grid-template-columns: 1fr 1fr;
            }
        }
    </style>
</head>
<body>

    <!-- ==================== LOGIN SCREEN ==================== -->
    <div class="login-screen" id="loginScreen">
        <div class="login-box">
            <h2>🔐 Admin Login</h2>
            <p class="subtitle">SAFE Platform Management</p>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="adminEmail" placeholder="admin@safe.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="adminPassword" placeholder="Enter password">
            </div>
            <button class="login-btn" onclick="adminLogin()">
                <i class="fas fa-sign-in-alt"></i> Login
            </button>
            <div class="error-msg" id="loginError">Invalid credentials</div>
        </div>
    </div>

    <!-- ==================== SIDEBAR ==================== -->
    <div class="sidebar hidden" id="sidebar">
        <div class="logo">⚡ SAFE Admin</div>
        <div class="nav-item active" onclick="showSection('dashboard')">
            <i class="fas fa-tachometer-alt"></i> <span>Dashboard</span>
        </div>
        <div class="nav-item" onclick="showSection('users')">
            <i class="fas fa-users"></i> <span>Users</span>
        </div>
        <div class="nav-item" onclick="showSection('deposits')">
            <i class="fas fa-arrow-down"></i> <span>Deposits</span>
            <span class="badge" id="pendingDepositBadge">0</span>
        </div>
        <div class="nav-item" onclick="showSection('withdrawals')">
            <i class="fas fa-arrow-up"></i> <span>Withdrawals</span>
            <span class="badge" id="pendingWithdrawBadge">0</span>
        </div>
        <div class="nav-item" onclick="showSection('investments')">
            <i class="fas fa-chart-line"></i> <span>Investments</span>
        </div>
        <div class="nav-item" onclick="showSection('referrals')">
            <i class="fas fa-link"></i> <span>Referrals</span>
        </div>
        <div class="nav-item" onclick="showSection('history')">
            <i class="fas fa-history"></i> <span>History</span>
        </div>
        <div class="nav-item" onclick="showSection('notifications')">
            <i class="fas fa-bell"></i> <span>Notifications</span>
        </div>
    </div>

    <!-- ==================== MAIN CONTENT ==================== -->
    <div class="main-content hidden" id="mainContent">
        <div class="top-bar">
            <h1 id="sectionTitle">Dashboard</h1>
            <button class="logout-btn" onclick="adminLogout()">
                <i class="fas fa-sign-out-alt"></i> Logout
            </button>
        </div>

        <!-- Dashboard Section -->
        <div class="section active" id="dashboardSection">
            <div class="stats-grid" id="dashboardStats">
                <div class="loading-spinner"><div class="spinner"></div><p>Loading stats...</p></div>
            </div>
            <div class="card">
                <div class="card-title"><i class="fas fa-clock"></i> Pending Actions</div>
                <div class="sub-tabs">
                    <button class="sub-tab active" onclick="showPendingTab('deposits')">Pending Deposits <span id="pendingDepositCount">0</span></button>
                    <button class="sub-tab" onclick="showPendingTab('withdrawals')">Pending Withdrawals <span id="pendingWithdrawCount">0</span></button>
                </div>
                <div class="table-container" id="pendingTable"></div>
            </div>
        </div>

        <!-- Users Section -->
        <div class="section" id="usersSection">
            <div class="card">
                <div class="card-title"><i class="fas fa-users"></i> All Users</div>
                <div class="search-box">
                    <input type="text" id="userSearch" placeholder="Search by name or email..." oninput="filterUsers()">
                    <button class="btn btn-primary" onclick="loadUsers()"><i class="fas fa-sync-alt"></i> Refresh</button>
                </div>
                <div class="table-container" id="usersTable">
                    <div class="loading-spinner"><div class="spinner"></div></div>
                </div>
            </div>
        </div>

        <!-- Deposits Section -->
        <div class="section" id="depositsSection">
            <div class="sub-tabs">
                <button class="sub-tab active" onclick="showDepositTab('all')">All</button>
                <button class="sub-tab" onclick="showDepositTab('pending')">Pending</button>
                <button class="sub-tab" onclick="showDepositTab('approved')">Approved</button>
                <button class="sub-tab" onclick="showDepositTab('rejected')">Rejected</button>
                <button class="btn btn-primary" onclick="loadAllDeposits()"><i class="fas fa-sync-alt"></i> Refresh</button>
            </div>
            <div class="card">
                <div class="table-container" id="depositsTable">
                    <div class="loading-spinner"><div class="spinner"></div></div>
                </div>
            </div>
        </div>

        <!-- Withdrawals Section -->
        <div class="section" id="withdrawalsSection">
            <div class="sub-tabs">
                <button class="sub-tab active" onclick="showWithdrawTab('all')">All</button>
                <button class="sub-tab" onclick="showWithdrawTab('pending')">Pending</button>
                <button class="sub-tab" onclick="showWithdrawTab('completed')">Completed</button>
                <button class="sub-tab" onclick="showWithdrawTab('rejected')">Rejected</button>
                <button class="btn btn-primary" onclick="loadAllWithdrawals()"><i class="fas fa-sync-alt"></i> Refresh</button>
            </div>
            <div class="card">
                <div class="table-container" id="withdrawalsTable">
                    <div class="loading-spinner"><div class="spinner"></div></div>
                </div>
            </div>
        </div>

        <!-- Investments Section -->
        <div class="section" id="investmentsSection">
            <div class="card">
                <div class="card-title"><i class="fas fa-chart-line"></i> All Investments</div>
                <button class="btn btn-primary" onclick="loadAllInvestments()" style="margin-bottom:15px;">
                    <i class="fas fa-sync-alt"></i> Refresh
                </button>
                <div class="table-container" id="investmentsTable">
                    <div class="loading-spinner"><div class="spinner"></div></div>
                </div>
            </div>
        </div>

        <!-- Referrals Section -->
        <div class="section" id="referralsSection">
            <div class="card">
                <div class="card-title"><i class="fas fa-link"></i> All Referrals</div>
                <button class="btn btn-primary" onclick="loadAllReferrals()" style="margin-bottom:15px;">
                    <i class="fas fa-sync-alt"></i> Refresh
                </button>
                <div class="table-container" id="referralsTable">
                    <div class="loading-spinner"><div class="spinner"></div></div>
                </div>
            </div>
        </div>

        <!-- History Section -->
        <div class="section" id="historySection">
            <div class="card">
                <div class="card-title"><i class="fas fa-history"></i> Global History</div>
                <button class="btn btn-primary" onclick="loadAllHistory()" style="margin-bottom:15px;">
                    <i class="fas fa-sync-alt"></i> Refresh
                </button>
                <div class="table-container" id="historyTable">
                    <div class="loading-spinner"><div class="spinner"></div></div>
                </div>
            </div>
        </div>

        <!-- Notifications Section -->
        <div class="section" id="notificationsSection">
            <div class="card">
                <div class="card-title"><i class="fas fa-bell"></i> Send Notification</div>
                <div class="form-group">
                    <label>User ID</label>
                    <input type="text" id="notifUserId" placeholder="User ID or 'all' for everyone">
                </div>
                <div class="form-group">
                    <label>Message</label>
                    <input type="text" id="notifMessage" placeholder="Notification message">
                </div>
                <button class="btn btn-primary" onclick="sendNotification()">
                    <i class="fas fa-paper-plane"></i> Send
                </button>
            </div>
        </div>
    </div>

    <!-- ==================== MODALS ==================== -->
    
    <!-- User Detail Modal -->
    <div class="modal-overlay" id="userDetailModal">
        <div class="modal-box" id="userDetailContent"></div>
    </div>

    <!-- Edit User Modal -->
    <div class="modal-overlay" id="editUserModal">
        <div class="modal-box">
            <h3>✏️ Edit User</h3>
            <input type="hidden" id="editUserId">
            <div class="form-group">
                <label>Field</label>
                <select id="editField" onchange="updateEditValueType()">
                    <option value="fullName">Full Name</option>
                    <option value="email">Email</option>
                    <option value="phone">Phone</option>
                    <option value="depositBalance">Deposit Balance</option>
                    <option value="taskEarnings">Task Earnings</option>
                    <option value="points">Points</option>
                    <option value="referralCount">Referral Count</option>
                    <option value="referralBonus">Referral Bonus</option>
                    <option value="status">Status</option>
                    <option value="firstDepositCompleted">First Deposit Completed</option>
                    <option value="securityCode">Security Code</option>
                </select>
            </div>
            <div class="form-group">
                <label id="editValueLabel">New Value</label>
                <input type="text" id="editValue">
                <select id="editValueSelect" style="display:none;">
                    <option value="active">Active</option>
                    <option value="suspended">Suspended</option>
                    <option value="banned">Banned</option>
                </select>
                <select id="editValueBool" style="display:none;">
                    <option value="true">True</option>
                    <option value="false">False</option>
                </select>
            </div>
            <div class="modal-actions">
                <button class="btn btn-primary" onclick="saveUserEdit()">Save</button>
                <button class="btn btn-danger" onclick="closeModal('editUserModal')">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        // ============================================
        // CONFIGURATION
        // ============================================
        const API_BASE = window.location.origin;
        
        // Simple admin credentials (since Firebase rules are open)
        const ADMIN_EMAIL = 'admin@safe.com';
        const ADMIN_PASSWORD = 'admin123';

        // ============================================
        // GLOBAL STATE
        // ============================================
        let allUsers = [];
        let allDeposits = [];
        let allWithdrawals = [];
        let allInvestments = [];
        let allReferrals = [];
        let allHistory = [];
        let currentDepositTab = 'all';
        let currentWithdrawTab = 'all';
        let currentPendingTab = 'deposits';

        // ============================================
        // ADMIN LOGIN
        // ============================================
        function adminLogin() {
            const email = document.getElementById('adminEmail').value.trim();
            const password = document.getElementById('adminPassword').value;
            
            if (email === ADMIN_EMAIL && password === ADMIN_PASSWORD) {
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('sidebar').classList.remove('hidden');
                document.getElementById('mainContent').classList.remove('hidden');
                
                // Load dashboard
                showSection('dashboard');
                loadDashboard();
                
                showToast('✅ Welcome Admin!');
            } else {

        function openEditUser(userId) {
            document.getElementById('editUserId').value = userId;
            document.getElementById('editField').value = 'depositBalance';
            updateEditValueType();
            document.getElementById('editUserModal').classList.add('show');
        }

        function updateEditValueType() {
            const field = document.getElementById('editField').value;
            const input = document.getElementById('editValue');
            const select = document.getElementById('editValueSelect');
            const boolSelect = document.getElementById('editValueBool');
            const label = document.getElementById('editValueLabel');
            
            input.style.display = 'block';
            select.style.display = 'none';
            boolSelect.style.display = 'none';
            input.value = '';
            label.textContent = 'New Value';
            
            if (field === 'status') {
                input.style.display = 'none';
                select.style.display = 'block';
                label.textContent = 'Status';
            } else if (field === 'firstDepositCompleted') {
                input.style.display = 'none';
                boolSelect.style.display = 'block';
                label.textContent = 'First Deposit Completed';
            } else if (field === 'depositBalance' || field === 'taskEarnings' || field === 'referralBonus') {
                input.type = 'number';
                input.step = '0.01';
                label.textContent = 'Amount (USDT)';
            } else if (field === 'points' || field === 'referralCount') {
                input.type = 'number';
                input.step = '1';
                label.textContent = 'Value';
            } else {
                input.type = 'text';
                label.textContent = 'New Value';
            }
        }

        async function saveUserEdit() {
            const userId = document.getElementById('editUserId').value;
            const field = document.getElementById('editField').value;
            let value;
            
            if (field === 'status') {
                value = document.getElementById('editValueSelect').value;
            } else if (field === 'firstDepositCompleted') {
                value = document.getElementById('editValueBool').value;
            } else {
                value = document.getElementById('editValue').value;
            }
            
            if (!value && value !== '0') {
                showToast('Please enter a value');
                return;
            }
            
            try {
                const response = await fetch(`${API_BASE}/api/user/${userId}/update`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ field, value })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showToast(`✅ Updated ${field} successfully!`);
                    closeModal('editUserModal');
                    loadUsers();
                } else {
                    showToast('❌ ' + (data.error || 'Failed to update'));
                }
            } catch (error) {
                showToast('Error updating user');
            }
        }

                                <th>Duration</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${allInvestments.map(i => `
                                <tr>
                                    <td>${new Date(i.timestamp || i.purchaseDate).toLocaleString()}</td>
                                    <td>${esc(i.userName || i.userEmail || 'N/A')}</td>
                                    <td><strong>${esc(i.productName || 'N/A')}</strong></td>
                                    <td>$${(i.amount || 0).toFixed(2)}</td>
                                    <td>${i.isFixed ? '$' + i.dailyEarnings : i.dailyEarnings + '%'}</td>
                                    <td>$${(i.totalEarned || 0).toFixed(2)}</td>

                document.getElementById('investmentsTable').innerHTML = '<p style="color:red;">Error loading investments</p>';
            }

                                <th>Bonus Earned</th>
                                <th>Points Awarded</th>
                                <th>Status</th>

                        </thead>
                        <tbody>
                            ${allReferrals.map(r => `

                                    <td style="color:var(--warning);">${r.pointsAwarded || 0} pts</td>

        // ============================================
        // HISTORY
        // ============================================
        async function loadAllHistory() {
            try {
                const response = await fetch(`${API_BASE}/api/history/all`);
                const data = await response.json();
                allHistory = data.history || [];
                
                if (allHistory.length === 0) {
                    document.getElementById('historyTable').innerHTML = '<p style="text-align:center;padding:20px;">No history found</p>';
                    return;
                }
                
                document.getElementById('historyTable').innerHTML = `
                    <table>
                        <thead>
                            <tr>
                                <th>Date</th>

                                <th>Type</th>
                                <th>Description</th>
                                <th>Amount</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${allHistory.slice(0, 200).map(h => `

        // ============================================
        // SEND NOTIFICATION
        // ============================================
        async function sendNotification() {
            const userId = document.getElementById('notifUserId').value.trim();
            const message = document.getElementById('notifMessage').value.trim();
            
            if (!userId || !message) {
                showToast('Please fill all fields');
                return;
            }
            
            try {
                const response = await fetch(`${API_BASE}/api/notifications/read-all`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId, message })
                });
                
                showToast('✅ Notification sent!');
                document.getElementById('notifMessage').value = '';
            } catch (error) {
                showToast('Error sending notification');
            }
        }

        // ============================================
        // UTILITIES
        // ============================================
        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('show');
        }

        function showToast(msg) {
            const existing = document.querySelector('.toast');
            if (existing) existing.remove();
            
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = msg;
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transition = 'opacity 0.3s';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        function esc(str) {
            const div = document.createElement('div');
            div.textContent = str || '';
            return div.innerHTML;
        }

        // Close modals on outside click
        document.addEventListener('click', function(e) {
            if (e.target.classList.contains('modal-overlay')) {
                e.target.classList.remove('show');
            }
        });

        // Allow Enter key for login
        document.getElementById('adminPassword').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') adminLogin();
        });

        console.log('✅ Admin Panel Ready');
        console.log('🔑 Login: admin@safe.com / admin123');
        console.log('🔗 API Base:', API_BASE);
    </script>
