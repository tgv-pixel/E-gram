<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Telegram Account</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: #0e1621;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
        }

        .login-container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }

        .login-card {
            background: #17212b;
            border-radius: 16px;
            padding: 32px 24px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
            border: 1px solid #2b3945;
        }

        .login-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .login-header h1 {
            font-size: 1.8rem;
            margin-bottom: 8px;
            color: #fff;
        }

        .login-header p {
            color: #8e9fad;
            font-size: 0.95rem;
        }

        .telegram-icon {
            font-size: 3rem;
            margin-bottom: 16px;
            color: #4c9ce0;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #8e9fad;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .country-code {
            position: absolute;
            left: 16px;
            color: #8e9fad;
            font-weight: 500;
        }

        .form-control {
            width: 100%;
            padding: 14px 16px;
            background: #242f3d;
            border: 1px solid #2b3945;
            border-radius: 12px;
            color: #fff;
            font-size: 1rem;
            transition: all 0.2s;
            outline: none;
        }

        .form-control:focus {
            border-color: #4c9ce0;
            box-shadow: 0 0 0 2px rgba(76, 156, 224, 0.2);
        }

        .phone-input {
            padding-left: 70px;
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary {
            background: #4c9ce0;
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            background: #6ab2f2;
            transform: translateY(-1px);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: #2b3945;
            color: #6ab2f2;
        }

        .btn-secondary:hover:not(:disabled) {
            background: #3a4a5a;
        }

        .btn-link {
            background: transparent;
            color: #6ab2f2;
            padding: 8px;
            font-size: 0.9rem;
            text-decoration: none;
            display: inline-block;
        }

        .btn-link:hover {
            text-decoration: underline;
        }

        .step-indicator {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 24px;
        }

        .step-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #2b3945;
            transition: all 0.2s;
        }

        .step-dot.active {
            background: #4c9ce0;
            transform: scale(1.3);
        }

        .step-dot.completed {
            background: #4c9ce0;
        }

        .error-message {
            background: #8e2b2b;
            color: white;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .success-message {
            background: #1e4a2b;
            color: white;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            display: none;
        }

        .success-message.show {
            display: block;
        }

        .info-text {
            color: #8e9fad;
            font-size: 0.85rem;
            margin-top: 8px;
            text-align: center;
        }

        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .footer-links {
            margin-top: 24px;
            text-align: center;
        }

        .footer-links a {
            color: #6ab2f2;
            text-decoration: none;
            font-size: 0.9rem;
        }

        .footer-links a:hover {
            text-decoration: underline;
        }

        .resend-timer {
            color: #8e9fad;
            font-size: 0.85rem;
            margin-top: 8px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="telegram-icon">📱</div>
                <h1>Add Telegram Account</h1>
                <p>Connect your Telegram account to start messaging</p>
            </div>

            <!-- Step indicators -->
            <div class="step-indicator">
                <div class="step-dot active" id="step1-dot"></div>
                <div class="step-dot" id="step2-dot"></div>
                <div class="step-dot" id="step3-dot"></div>
            </div>

            <!-- Error/Success messages -->
            <div class="error-message" id="errorMessage"></div>
            <div class="success-message" id="successMessage"></div>

            <!-- Step 1: Phone Number -->
            <div id="step1" style="display: block;">
                <div class="form-group">
                    <label>Phone Number (with country code)</label>
                    <div class="input-wrapper">
                        <span class="country-code">+</span>
                        <input type="tel" class="form-control phone-input" id="phone" placeholder="1234567890" value="">
                    </div>
                    <div class="info-text">Enter your phone number in international format</div>
                </div>
                <button class="btn btn-primary" id="sendCodeBtn" onclick="sendCode()">
                    <span>Send Code</span>
                </button>
            </div>

            <!-- Step 2: Verification Code -->
            <div id="step2" style="display: none;">
                <div class="form-group">
                    <label>Verification Code</label>
                    <input type="text" class="form-control" id="code" placeholder="Enter 5-digit code" maxlength="6">
                </div>
                <div class="form-group" id="passwordGroup" style="display: none;">
                    <label>Two-Factor Authentication Password</label>
                    <input type="password" class="form-control" id="password" placeholder="Enter your 2FA password">
                    <div class="info-text">This account has 2FA enabled</div>
                </div>
                <button class="btn btn-primary" id="verifyBtn" onclick="verifyCode()">
                    <span>Verify & Add Account</span>
                </button>
                <button class="btn btn-link" onclick="backToPhone()">
                    ← Back
                </button>
                <div class="resend-timer" id="resendTimer"></div>
            </div>

            <!-- Step 3: Success -->
            <div id="step3" style="display: none; text-align: center;">
                <div style="font-size: 4rem; margin: 20px 0;">✅</div>
                <h2 style="margin-bottom: 16px;">Account Added!</h2>
                <p style="color: #8e9fad; margin-bottom: 24px;" id="successAccountInfo"></p>
                <a href="/dashboard" class="btn btn-primary" style="text-decoration: none; display: block;">
                    Go to Dashboard
                </a>
                <button class="btn btn-link" onclick="addAnotherAccount()">
                    Add Another Account
                </button>
            </div>

            <div class="footer-links">
                <a href="/dashboard">← Back to Dashboard</a>
            </div>
        </div>
    </div>

    <script>
        let timerInterval;
        let timeLeft = 60;
        let currentSessionId = null;

        function showError(message) {
            const errorEl = document.getElementById('errorMessage');
            errorEl.textContent = message;
            errorEl.classList.add('show');
            setTimeout(() => {
                errorEl.classList.remove('show');
            }, 5000);
        }

        function showSuccess(message) {
            const successEl = document.getElementById('successMessage');
            successEl.textContent = message;
            successEl.classList.add('show');
            setTimeout(() => {
                successEl.classList.remove('show');
            }, 3000);
        }

        function setLoading(button, isLoading) {
            const originalText = button.querySelector('span').textContent;
            if (isLoading) {
                button.disabled = true;
                button.innerHTML = '<span class="loading-spinner"></span><span> Please wait...</span>';
            } else {
                button.disabled = false;
                button.innerHTML = `<span>${originalText}</span>`;
            }
        }

        function startResendTimer() {
            timeLeft = 60;
            const timerEl = document.getElementById('resendTimer');
            
            if (timerInterval) {
                clearInterval(timerInterval);
            }
            
            timerInterval = setInterval(() => {
                timeLeft--;
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    timerEl.innerHTML = '<button class="btn btn-link" onclick="resendCode()" style="margin-top:8px;">Resend Code</button>';
                } else {
                    timerEl.textContent = `Resend code in ${timeLeft}s`;
                }
            }, 1000);
        }

        async function sendCode() {
            const phoneInput = document.getElementById('phone');
            const phone = '+' + phoneInput.value.trim().replace(/\s+/g, '');
            
            if (!phoneInput.value.trim()) {
                showError('Please enter your phone number');
                return;
            }

            const button = document.getElementById('sendCodeBtn');
            setLoading(button, true);

            try {
                const response = await fetch('/api/add-account', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ phone: phone })
                });

                const data = await response.json();

                if (data.success) {
                    currentSessionId = data.session_id;
                    
                    // Move to step 2
                    document.getElementById('step1').style.display = 'none';
                    document.getElementById('step2').style.display = 'block';
                    
                    document.getElementById('step1-dot').classList.remove('active');
                    document.getElementById('step1-dot').classList.add('completed');
                    document.getElementById('step2-dot').classList.add('active');
                    
                    startResendTimer();
                    showSuccess('Code sent successfully!');
                } else {
                    showError(data.error || 'Failed to send code');
                }
            } catch (error) {
                console.error('Error:', error);
                showError('Network error. Please try again.');
            } finally {
                setLoading(button, false);
            }
        }

        async function verifyCode() {
            const code = document.getElementById('code').value.trim();
            const password = document.getElementById('password').value;
            
            if (!code) {
                showError('Please enter the verification code');
                return;
            }

            const button = document.getElementById('verifyBtn');
            setLoading(button, true);

            try {
                const response = await fetch('/api/verify-code', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ 
                        code: code,
                        session_id: currentSessionId,
                        password: password
                    })
                });

                const data = await response.json();

                if (data.success) {
                    // Move to success step
                    document.getElementById('step2').style.display = 'none';
                    document.getElementById('step3').style.display = 'block';
                    
                    document.getElementById('step2-dot').classList.remove('active');
                    document.getElementById('step2-dot').classList.add('completed');
                    document.getElementById('step3-dot').classList.add('active');
                    
                    document.getElementById('successAccountInfo').innerHTML = 
                        `Account added successfully!`;
                    
                    if (timerInterval) {
                        clearInterval(timerInterval);
                    }
                } else {
                    if (data.need_password) {
                        document.getElementById('passwordGroup').style.display = 'block';
                        showError('2FA is enabled. Please enter your password.');
                    } else {
                        showError(data.error || 'Verification failed');
                    }
                }
            } catch (error) {
                console.error('Error:', error);
                showError('Network error. Please try again.');
            } finally {
                setLoading(button, false);
            }
        }

        async function resendCode() {
            if (!currentSessionId) {
                backToPhone();
                return;
            }

            // For resend, we need to restart the process
            backToPhone();
            showError('Please request code again');
        }

        function backToPhone() {
            document.getElementById('step1').style.display = 'block';
            document.getElementById('step2').style.display = 'none';
            document.getElementById('step3').style.display = 'none';
            
            document.getElementById('step1-dot').classList.add('active');
            document.getElementById('step1-dot').classList.remove('completed');
            document.getElementById('step2-dot').classList.remove('active', 'completed');
            document.getElementById('step3-dot').classList.remove('active', 'completed');
            
            document.getElementById('code').value = '';
            document.getElementById('password').value = '';
            document.getElementById('passwordGroup').style.display = 'none';
            
            if (timerInterval) {
                clearInterval(timerInterval);
            }
        }

        function addAnotherAccount() {
            backToPhone();
            document.getElementById('phone').value = '';
            currentSessionId = null;
        }

        document.getElementById('phone').addEventListener('input', function(e) {
            this.value = this.value.replace(/[^\d]/g, '');
        });

        document.getElementById('code').addEventListener('input', function(e) {
            this.value = this.value.replace(/[^\d]/g, '');
        });

        document.getElementById('phone').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                sendCode();
            }
        });

        document.getElementById('code').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                verifyCode();
            }
        });

        document.getElementById('password').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                verifyCode();
            }
        });
    </script>
</body>
</html>
