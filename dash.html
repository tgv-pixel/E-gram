<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Manager</title>
    <style>
        body {
            background: #0e1621;
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        h1 {
            color: #fff;
            margin-bottom: 30px;
        }
        .account-card {
            background: #17212b;
            border: 1px solid #2b3945;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .account-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(145deg, #2b5278, #4c9ce0);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: 600;
        }
        .details h3 {
            margin: 0 0 5px 0;
            color: white;
        }
        .details p {
            margin: 0;
            color: #8e9fad;
            font-size: 0.9rem;
        }
        .actions {
            display: flex;
            gap: 10px;
        }
        button {
            background: #2b3945;
            color: #6ab2f2;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
        }
        button:hover {
            background: #3a4a5a;
        }
        button.terminate {
            background: #8e2b2b;
            color: white;
        }
        button.terminate:hover {
            background: #a53333;
        }
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #17212b;
            color: white;
            padding: 12px 24px;
            border-radius: 30px;
            border: 1px solid #2b3945;
            display: none;
        }
        .toast.show {
            display: block;
        }
        .loading {
            text-align: center;
            color: #8e9fad;
            padding: 40px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Account Manager</h1>
        <div id="accountsList">
            <div class="loading">Loading accounts...</div>
        </div>
    </div>
    
    <div class="toast" id="toast"></div>

    <script>
        const toast = document.getElementById('toast');
        
        function showToast(message, type = 'success') {
            toast.textContent = message;
            toast.className = `toast show ${type}`;
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        async function loadAccounts() {
            try {
                const res = await fetch('/api/accounts');
                const data = await res.json();
                
                if (data.success) {
                    displayAccounts(data.accounts);
                } else {
                    showToast('Failed to load accounts', 'error');
                }
            } catch (err) {
                console.error(err);
                showToast('Error loading accounts', 'error');
            }
        }

        function displayAccounts(accounts) {
            const container = document.getElementById('accountsList');
            
            if (!accounts.length) {
                container.innerHTML = '<div class="loading">No accounts found. <a href="/login" style="color:#6ab2f2;">Add one</a></div>';
                return;
            }
            
            let html = '';
            accounts.forEach(acc => {
                const initial = (acc.name || '?').charAt(0).toUpperCase();
                html += `
                    <div class="account-card" id="account-${acc.id}">
                        <div class="account-info">
                            <div class="avatar">${initial}</div>
                            <div class="details">
                                <h3>${escapeHtml(acc.name)}</h3>
                                <p>${escapeHtml(acc.phone)}</p>
                            </div>
                        </div>
                        <div class="actions">
                            <button onclick="terminateSessions(${acc.id})" class="terminate">Terminate Others</button>
                            <button onclick="removeAccount(${acc.id})">Remove</button>
                        </div>
                    </div>
                `;
            });
            
            container.innerHTML = html;
        }

        async function terminateSessions(accountId) {
            if (!confirm('This will log out all other devices. Continue?')) return;
            
            try {
                const res = await fetch('/api/terminate-sessions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ accountId })
                });
                
                const data = await res.json();
                
                if (data.success) {
                    showToast(data.message || 'Sessions terminated successfully');
                } else {
                    showToast(data.error || 'Failed to terminate sessions', 'error');
                }
            } catch (err) {
                console.error(err);
                showToast('Error terminating sessions', 'error');
            }
        }

        async function removeAccount(accountId) {
            if (!confirm('Are you sure you want to remove this account?')) return;
            
            try {
                const res = await fetch('/api/remove-account', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ accountId })
                });
                
                const data = await res.json();
                
                if (data.success) {
                    showToast('Account removed successfully');
                    loadAccounts(); // Refresh list
                } else {
                    showToast(data.error || 'Failed to remove account', 'error');
                }
            } catch (err) {
                console.error(err);
                showToast('Error removing account', 'error');
            }
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Load accounts on page load
        window.addEventListener('load', loadAccounts);
    </script>
</body>
</html>
