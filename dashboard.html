<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Telegram Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: #0e1621;
            height: 100vh;
            display: flex;
            flex-direction: column;
            color: #fff;
            overflow: hidden;
        }

        /* Header - Telegram Style */
        .app-header {
            background: #17212b;
            padding: 8px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #2b3945;
            flex-shrink: 0;
            height: 56px;
            z-index: 10;
        }

        /* Search Container - In Header */
        .search-container {
            flex: 1;
            max-width: 400px;
            margin: 0 20px;
            position: relative;
        }

        .search-input {
            width: 100%;
            background: #242f3d;
            border: none;
            border-radius: 28px;
            padding: 10px 16px 10px 40px;
            color: #fff;
            font-size: 0.9rem;
            outline: none;
            transition: all 0.2s;
        }

        .search-input:focus {
            background: #2b3945;
        }

        .search-input::placeholder {
            color: #8e9fad;
        }

        .search-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #8e9fad;
            font-size: 1rem;
        }

        .search-results-dropdown {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: #17212b;
            border: 1px solid #2b3945;
            border-radius: 12px;
            margin-top: 8px;
            max-height: 400px;
            overflow-y: auto;
            display: none;
            z-index: 200;
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
        }

        .search-results-dropdown.show {
            display: block;
        }

        /* Account Switcher */
        .account-switcher {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            padding: 6px 12px;
            border-radius: 30px;
            background: #242f3d;
            position: relative;
        }

        .account-switcher:hover {
            background: #2b3945;
        }

        .current-avatar {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: linear-gradient(145deg, #2b5278, #4c9ce0);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            font-weight: 600;
        }

        .current-info {
            display: flex;
            flex-direction: column;
        }

        .current-name {
            font-size: 0.95rem;
            font-weight: 600;
        }

        .current-phone {
            font-size: 0.7rem;
            color: #8e9fad;
        }

        .dropdown-icon {
            color: #8e9fad;
            font-size: 1rem;
        }

        /* Dropdown */
        .account-dropdown {
            position: absolute;
            top: 50px;
            left: 0;
            background: #17212b;
            border: 1px solid #2b3945;
            border-radius: 12px;
            width: 280px;
            display: none;
            z-index: 100;
            max-height: 400px;
            overflow-y: auto;
        }

        .account-dropdown.show {
            display: block;
        }

        .dropdown-item {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            gap: 12px;
            cursor: pointer;
            transition: background 0.2s;
            border-bottom: 1px solid #2b3945;
        }

        .dropdown-item:hover {
            background: #242f3d;
        }

        .dropdown-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #2b5278;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
        }

        .header-actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .icon-btn {
            background: #2b3945;
            border: none;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.2rem;
            transition: 0.2s;
            color: #6ab2f2;
        }

        .icon-btn:hover {
            background: #3a4a5a;
        }

        /* Main Layout */
        .main-layout {
            display: flex;
            flex: 1;
            overflow: hidden;
            height: calc(100vh - 56px);
        }

        /* Chats Panel */
        .chats-panel {
            width: 360px;
            background: #17212b;
            border-right: 1px solid #2b3945;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chats-header {
            padding: 16px;
            border-bottom: 1px solid #2b3945;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chats-header h3 {
            color: #8e9fad;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .chats-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }

        .chat-item {
            display: flex;
            align-items: center;
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            transition: background 0.2s;
            margin-bottom: 2px;
        }

        .chat-item:hover {
            background: #242f3d;
        }

        .chat-item.active {
            background: #2b5278;
        }

        .chat-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(145deg, #2b5278, #4c9ce0);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            font-weight: 600;
            margin-right: 12px;
            flex-shrink: 0;
        }

        .chat-info {
            flex: 1;
            min-width: 0;
        }

        .chat-name-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 4px;
        }

        .chat-name {
            font-weight: 600;
            font-size: 0.95rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .chat-time {
            font-size: 0.7rem;
            color: #8e9fad;
            flex-shrink: 0;
            margin-left: 8px;
        }

        .chat-last-msg {
            font-size: 0.8rem;
            color: #8e9fad;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .chat-unread {
            background: #4c9ce0;
            color: white;
            font-size: 0.7rem;
            padding: 2px 6px;
            border-radius: 12px;
            margin-left: 8px;
        }

        /* Messages Panel */
        .messages-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #0e1621;
            overflow: hidden;
        }

        .messages-header {
            background: #17212b;
            padding: 12px 20px;
            border-bottom: 1px solid #2b3945;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 60px;
        }

        .chat-header-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .chat-header-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(145deg, #2b5278, #4c9ce0);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            font-weight: 600;
        }

        .chat-header-title {
            font-weight: 600;
            font-size: 1rem;
        }

        .chat-header-status {
            font-size: 0.7rem;
            color: #8e9fad;
        }

        .messages-list {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .message-wrapper {
            display: flex;
            flex-direction: column;
            max-width: 75%;
        }

        .message-wrapper.outgoing {
            align-self: flex-end;
        }

        .message-wrapper.incoming {
            align-self: flex-start;
        }

        .message-bubble {
            padding: 8px 12px;
            border-radius: 18px;
            word-wrap: break-word;
            line-height: 1.4;
            font-size: 0.9rem;
        }

        .incoming .message-bubble {
            background: #17212b;
            border-bottom-left-radius: 4px;
        }

        .outgoing .message-bubble {
            background: #2b5278;
            border-bottom-right-radius: 4px;
        }

        .message-meta {
            display: flex;
            justify-content: flex-end;
            gap: 4px;
            margin-top: 4px;
            font-size: 0.65rem;
            color: #8e9fad;
        }

        .compose-area {
            background: #17212b;
            padding: 12px 20px;
            border-top: 1px solid #2b3945;
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .message-input {
            flex: 1;
            background: #242f3d;
            border: none;
            border-radius: 24px;
            padding: 12px 18px;
            color: #fff;
            font-size: 0.95rem;
            outline: none;
        }

        .send-btn {
            background: #4c9ce0;
            border: none;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.2rem;
            transition: 0.2s;
        }

        .send-btn:hover {
            background: #6ab2f2;
        }

        /* Settings Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: #17212b;
            border-radius: 16px;
            width: 90%;
            max-width: 450px;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-header {
            padding: 20px;
            border-bottom: 1px solid #2b3945;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h3 {
            font-size: 1.2rem;
        }

        .modal-body {
            padding: 20px;
        }

        .modal-footer {
            padding: 16px 20px;
            border-top: 1px solid #2b3945;
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }

        .settings-section {
            margin-bottom: 24px;
        }

        .settings-section h4 {
            color: #8e9fad;
            font-size: 0.8rem;
            text-transform: uppercase;
            margin-bottom: 12px;
        }

        .settings-item {
            background: #242f3d;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: background 0.2s;
        }

        .settings-item:hover {
            background: #2b3945;
        }

        .settings-item-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .settings-item-icon {
            font-size: 1.3rem;
        }

        .settings-item-info h5 {
            font-size: 0.95rem;
            margin-bottom: 2px;
        }

        .settings-item-info p {
            font-size: 0.75rem;
            color: #8e9fad;
        }

        .device-item {
            background: #242f3d;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
        }

        .device-item.current {
            border: 1px solid #4c9ce0;
        }

        .device-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .device-name {
            font-weight: 600;
        }

        .device-badge {
            background: #4c9ce0;
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 12px;
        }

        .device-details {
            font-size: 0.8rem;
            color: #8e9fad;
        }

        .terminate-btn {
            background: #8e2b2b;
            border: none;
            padding: 6px 12px;
            border-radius: 20px;
            color: white;
            cursor: pointer;
            font-size: 0.8rem;
            margin-top: 8px;
        }

        .btn {
            padding: 10px 20px;
            border-radius: 30px;
            border: none;
            cursor: pointer;
            font-size: 0.9rem;
            transition: 0.2s;
        }

        .btn-primary {
            background: #4c9ce0;
            color: white;
        }

        .btn-secondary {
            background: #2b3945;
            color: #6ab2f2;
        }

        .btn-danger {
            background: #8e2b2b;
            color: white;
        }

        input, select {
            background: #242f3d;
            border: 1px solid #2b3945;
            border-radius: 12px;
            padding: 12px;
            color: #fff;
            width: 100%;
            margin-bottom: 12px;
            outline: none;
        }

        input:focus {
            border-color: #4c9ce0;
        }

        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: #17212b;
            color: white;
            padding: 12px 24px;
            border-radius: 30px;
            border: 1px solid #2b3945;
            z-index: 1100;
            display: none;
        }

        .toast.show {
            display: block;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #8e9fad;
        }

        .loading-spinner {
            display: inline-block;
            width: 30px;
            height: 30px;
            border: 3px solid #2b3945;
            border-radius: 50%;
            border-top-color: #4c9ce0;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .chats-panel {
                width: 100%;
                position: absolute;
                left: 0;
                top: 56px;
                bottom: 0;
                z-index: 10;
                transform: translateX(0);
                transition: transform 0.3s;
            }
            
            .chats-panel.hide {
                transform: translateX(-100%);
            }
            
            .messages-panel {
                width: 100%;
            }
            
            .search-container {
                max-width: 200px;
            }
        }
    </style>
</head>
<body>
    <div class="app-header">
        <div class="account-switcher" id="accountSwitcher">
            <div class="current-avatar" id="currentAvatar">?</div>
            <div class="current-info">
                <span class="current-name" id="currentName">Loading...</span>
                <span class="current-phone" id="currentPhone"></span>
            </div>
            <span class="dropdown-icon">▼</span>
        </div>

        <div class="account-dropdown" id="accountDropdown"></div>

        <div class="search-container">
            <span class="search-icon">🔍</span>
            <input type="text" class="search-input" id="searchInput" placeholder="Search messages or users...">
            <div class="search-results-dropdown" id="searchResults"></div>
        </div>

        <div class="header-actions">
            <button class="icon-btn" onclick="openSettings()">⚙️</button>
            <a href="/login" class="icon-btn">➕</a>
        </div>
    </div>

    <div class="main-layout">
        <div class="chats-panel" id="chatsPanel">
            <div class="chats-header">
                <h3>CHATS</h3>
                <span class="badge" id="totalChats">0</span>
            </div>
            <div class="chats-list" id="chatsList">
                <div class="loading">Loading chats...</div>
            </div>
        </div>

        <div class="messages-panel" id="messagesPanel">
            <div class="messages-header" id="messagesHeader" style="display: none;">
                <div class="chat-header-info">
                    <div class="chat-header-avatar" id="chatHeaderAvatar">?</div>
                    <div>
                        <div class="chat-header-title" id="currentChatTitle"></div>
                        <div class="chat-header-status" id="chatHeaderStatus">Click to view messages</div>
                    </div>
                </div>
                <button class="icon-btn" onclick="openChatSettings()">⋮</button>
            </div>
            <div class="messages-list" id="messagesList">
                <div class="loading">Select a chat to start messaging</div>
            </div>
            <div class="compose-area" id="composeArea" style="display: none;">
                <input type="text" class="message-input" id="messageInput" placeholder="Type a message..." autocomplete="off">
                <button class="send-btn" onclick="sendMessage()">📤</button>
            </div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div class="modal" id="settingsModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Settings</h3>
                <button class="icon-btn" onclick="closeSettings()">✕</button>
            </div>
            <div class="modal-body" id="settingsBody">
                <div class="settings-section">
                    <h4>Security</h4>
                    <div class="settings-item" onclick="show2FASettings()">
                        <div class="settings-item-left">
                            <span class="settings-item-icon">🔐</span>
                            <div class="settings-item-info">
                                <h5>Two-Step Verification</h5>
                                <p id="2faStatus">Check status</p>
                            </div>
                        </div>
                        <span>→</span>
                    </div>
                    <div class="settings-item" onclick="showEmailSettings()">
                        <div class="settings-item-left">
                            <span class="settings-item-icon">📧</span>
                            <div class="settings-item-info">
                                <h5>Recovery Email</h5>
                                <p id="emailStatus">Not set</p>
                            </div>
                        </div>
                        <span>→</span>
                    </div>
                </div>

                <div class="settings-section">
                    <h4>Devices</h4>
                    <div id="devicesList"></div>
                    <button class="btn btn-secondary" onclick="terminateAllSessions()" style="width: 100%; margin-top: 12px;">Terminate All Other Sessions</button>
                </div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        // State
        let accounts = [];
        let currentAccount = null;
        let currentChat = null;
        let chats = [];
        let currentMessages = [];
        let refreshInterval = null;
        let searchTimeout = null;
        let isLoadingMessages = false;

        // DOM Elements
        const toast = document.getElementById('toast');
        const dropdown = document.getElementById('accountDropdown');
        const switcher = document.getElementById('accountSwitcher');
        const currentAvatar = document.getElementById('currentAvatar');
        const currentName = document.getElementById('currentName');
        const currentPhone = document.getElementById('currentPhone');
        const chatsListDiv = document.getElementById('chatsList');
        const messagesHeader = document.getElementById('messagesHeader');
        const currentChatTitle = document.getElementById('currentChatTitle');
        const chatHeaderAvatar = document.getElementById('chatHeaderAvatar');
        const chatHeaderStatus = document.getElementById('chatHeaderStatus');
        const messagesListDiv = document.getElementById('messagesList');
        const composeArea = document.getElementById('composeArea');
        const messageInput = document.getElementById('messageInput');
        const totalChatsSpan = document.getElementById('totalChats');
        const searchInput = document.getElementById('searchInput');
        const searchResults = document.getElementById('searchResults');
        const settingsModal = document.getElementById('settingsModal');

        function showToast(message, type = 'success') {
            toast.textContent = message;
            toast.className = `toast show ${type}`;
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatTime(timestamp) {
            if (!timestamp) return '';
            const date = new Date(timestamp * 1000);
            const now = new Date();
            const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
            
            if (date >= today) {
                return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            } else {
                return date.toLocaleDateString([], { month: 'short', day: 'numeric' });
            }
        }

        // Load Accounts
        async function loadAccounts() {
            try {
                const res = await fetch('/api/accounts');
                const data = await res.json();
                
                if (data.success) {
                    accounts = data.accounts || [];
                    
                    if (accounts.length > 0) {
                        const lastAccountId = localStorage.getItem('lastSelectedAccount');
                        if (lastAccountId) {
                            currentAccount = accounts.find(a => a.id == lastAccountId) || accounts[0];
                        } else {
                            currentAccount = accounts[0];
                        }
                        
                        updateHeader();
                        renderDropdown();
                        await loadChats();
                        await load2FAStatus();
                    } else {
                        currentAccount = null;
                        updateHeader();
                        renderDropdown();
                        showNoAccountState();
                    }
                }
            } catch (err) {
                console.error('Error:', err);
            }
        }

        function updateHeader() {
            if (!currentAccount) {
                currentAvatar.textContent = '?';
                currentName.textContent = 'No Account';
                currentPhone.textContent = '';
                return;
            }
            
            const name = currentAccount.name || 'User';
            const phone = currentAccount.phone || '';
            const initial = name.charAt(0).toUpperCase() || '?';
            
            currentAvatar.textContent = initial;
            currentName.textContent = name;
            currentPhone.textContent = phone;
            localStorage.setItem('lastSelectedAccount', currentAccount.id);
        }

        function renderDropdown() {
            if (!accounts.length) {
                dropdown.innerHTML = '<div class="dropdown-item">No accounts</div>';
                return;
            }
            
            let html = '';
            accounts.forEach(acc => {
                const initial = (acc.name || '?').charAt(0).toUpperCase();
                const isCurrent = acc.id === currentAccount?.id ? '✓' : '';
                
                html += `
                    <div class="dropdown-item" onclick="switchAccount(${acc.id})">
                        <div class="dropdown-avatar">${escapeHtml(initial)}</div>
                        <div class="dropdown-info">
                            <div class="dropdown-name">${escapeHtml(acc.name || 'Unknown')}</div>
                            <div class="dropdown-phone">${escapeHtml(acc.phone || '')}</div>
                        </div>
                        <span style="color:#6ab2f2;">${isCurrent}</span>
                    </div>
                `;
            });
            
            dropdown.innerHTML = html;
        }

        window.switchAccount = async function(accountId) {
            accountId = parseInt(accountId);
            const newAccount = accounts.find(a => a.id === accountId);
            if (!newAccount) return;
            
            currentAccount = newAccount;
            currentChat = null;
            
            updateHeader();
            renderDropdown();
            dropdown.classList.remove('show');
            
            messagesHeader.style.display = 'none';
            composeArea.style.display = 'none';
            messagesListDiv.innerHTML = '<div class="loading">Select a chat to start messaging</div>';
            
            await loadChats();
            await load2FAStatus();
        };

        // Load Chats (40+ chats)
        async function loadChats() {
            if (!currentAccount) return;
            
            chatsListDiv.innerHTML = '<div class="loading"><div class="loading-spinner"></div>Loading chats...</div>';
            
            try {
                const res = await fetch('/api/get-messages', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ accountId: currentAccount.id })
                });
                
                const data = await res.json();
                
                if (data.success) {
                    chats = data.chats || [];
                    totalChatsSpan.textContent = chats.length;
                    displayChats();
                    
                    if (currentChat) {
                        const stillExists = chats.find(c => c.id === currentChat.id);
                        if (stillExists) {
                            await loadMessages(currentChat.id);
                        }
                    }
                } else {
                    chatsListDiv.innerHTML = '<div class="empty-state">Failed to load chats</div>';
                }
            } catch (err) {
                chatsListDiv.innerHTML = '<div class="empty-state">Error loading chats</div>';
            }
        }

        function displayChats() {
            if (!chats.length) {
                chatsListDiv.innerHTML = '<div class="empty-state">No chats found</div>';
                return;
            }
            
            let html = '';
            chats.forEach(chat => {
                const activeClass = (currentChat && currentChat.id === chat.id) ? 'active' : '';
                const time = chat.lastMessageDate ? formatTime(chat.lastMessageDate) : '';
                const unread = chat.unread ? `<span class="chat-unread">${chat.unread}</span>` : '';
                const avatarLetter = (chat.title || '?').charAt(0).toUpperCase();
                
                html += `
                    <div class="chat-item ${activeClass}" onclick="selectChat('${escapeHtml(chat.id)}', '${escapeHtml(chat.title)}')">
                        <div class="chat-avatar">${escapeHtml(avatarLetter)}</div>
                        <div class="chat-info">
                            <div class="chat-name-row">
                                <span class="chat-name">${escapeHtml(chat.title || 'Unknown')}</span>
                                <span class="chat-time">${escapeHtml(time)}</span>
                            </div>
                            <div class="chat-last-msg">
                                ${escapeHtml(chat.lastMessage || 'No messages')}
                                ${unread}
                            </div>
                        </div>
                    </div>
                `;
            });
            
            chatsListDiv.innerHTML = html;
        }

        // Load Messages (40+ messages)
        window.selectChat = async function(chatId, chatTitle) {
            currentChat = { id: chatId, title: chatTitle };
            
            currentChatTitle.textContent = chatTitle;
            chatHeaderAvatar.textContent = chatTitle.charAt(0).toUpperCase();
            chatHeaderStatus.textContent = 'Loading messages...';
            
            messagesHeader.style.display = 'flex';
            composeArea.style.display = 'flex';
            messageInput.disabled = false;
            
            displayChats();
            await loadMessages(chatId);
            
            if (window.innerWidth <= 768) {
                document.getElementById('chatsPanel').classList.add('hide');
            }
        };

        async function loadMessages(chatId) {
            if (isLoadingMessages) return;
            isLoadingMessages = true;
            
            messagesListDiv.innerHTML = '<div class="loading"><div class="loading-spinner"></div>Loading messages...</div>';
            
            try {
                // Get conversation history from database
                const res = await fetch(`/api/conversation-history?accountId=${currentAccount.id}&chatId=${encodeURIComponent(chatId)}`);
                const data = await res.json();
                
                if (data.success && data.history) {
                    currentMessages = data.history;
                    displayMessages(currentMessages);
                    chatHeaderStatus.textContent = `${currentMessages.length} messages`;
                } else {
                    messagesListDiv.innerHTML = '<div class="empty-state">No messages yet. Start a conversation!</div>';
                    chatHeaderStatus.textContent = 'No messages';
                }
            } catch (err) {
                console.error('Error loading messages:', err);
                messagesListDiv.innerHTML = '<div class="empty-state">Failed to load messages</div>';
            } finally {
                isLoadingMessages = false;
            }
        }

        function displayMessages(messages) {
            if (!messages || messages.length === 0) {
                messagesListDiv.innerHTML = '<div class="empty-state">No messages yet</div>';
                return;
            }
            
            let html = '';
            messages.forEach(msg => {
                const role = msg.role || 'user';
                const bubbleClass = role === 'user' ? 'outgoing' : 'incoming';
                const time = msg.time ? new Date(msg.time).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : '';
                
                html += `
                    <div class="message-wrapper ${bubbleClass}">
                        <div class="message-bubble">
                            ${escapeHtml(msg.message)}
                            <div class="message-meta">
                                <span>${escapeHtml(time)}</span>
                                ${role === 'user' ? '✓' : ''}
                            </div>
                        </div>
                    </div>
                `;
            });
            
            messagesListDiv.innerHTML = html;
            setTimeout(() => {
                messagesListDiv.scrollTop = messagesListDiv.scrollHeight;
            }, 100);
        }

        // Send Message
        async function sendMessage() {
            const message = messageInput.value.trim();
            if (!message || !currentAccount || !currentChat) return;
            
            messageInput.value = '';
            messageInput.disabled = true;
            
            // Add to UI immediately
            const tempMsg = {
                role: 'user',
                message: message,
                time: new Date().toISOString()
            };
            currentMessages.push(tempMsg);
            displayMessages(currentMessages);
            
            try {
                const res = await fetch('/api/send-message', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        accountId: currentAccount.id,
                        chatId: currentChat.id,
                        message: message
                    })
                });
                
                const data = await res.json();
                
                if (data.success) {
                    showToast('Message sent');
                    await loadMessages(currentChat.id);
                } else {
                    showToast(data.error || 'Failed to send', 'error');
                    await loadMessages(currentChat.id);
                }
            } catch (err) {
                showToast('Error sending message', 'error');
                await loadMessages(currentChat.id);
            } finally {
                messageInput.disabled = false;
                messageInput.focus();
            }
        }

        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // Search
        searchInput.addEventListener('input', () => {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => performSearch(), 500);
        });

        async function performSearch() {
            const query = searchInput.value.trim();
            if (!query) {
                searchResults.classList.remove('show');
                return;
            }
            
            searchResults.innerHTML = '<div class="loading"><div class="loading-spinner"></div>Searching...</div>';
            searchResults.classList.add('show');
            
            try {
                const res = await fetch('/api/search', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        accountId: currentAccount?.id,
                        query: query
                    })
                });
                
                const data = await res.json();
                
                if (data.success && data.results && data.results.length > 0) {
                    searchResults.innerHTML = data.results.map(item => `
                        <div class="dropdown-item" onclick="joinEntity('${escapeHtml(item.id)}', '${escapeHtml(item.title)}')">
                            <div class="dropdown-avatar">${item.type === 'user' ? '👤' : (item.type === 'channel' ? '📢' : '👥')}</div>
                            <div class="dropdown-info">
                                <div class="dropdown-name">${escapeHtml(item.title)}</div>
                                <div class="dropdown-phone">${item.type}${item.members ? ' · ' + item.members + ' members' : ''}</div>
                            </div>
                            <button class="join-btn">Join</button>
                        </div>
                    `).join('');
                } else {
                    searchResults.innerHTML = '<div class="dropdown-item">No results found</div>';
                }
            } catch (err) {
                searchResults.innerHTML = '<div class="dropdown-item">Search failed</div>';
            }
        }

        async function joinEntity(entityId, title) {
            if (!confirm(`Join "${title}"?`)) return;
            
            try {
                const res = await fetch('/api/join-entity', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        accountId: currentAccount.id,
                        entityId: entityId
                    })
                });
                
                const data = await res.json();
                if (data.success) {
                    showToast(`Joined ${title}`);
                    searchResults.classList.remove('show');
                    searchInput.value = '';
                    await loadChats();
                } else {
                    showToast(data.error || 'Failed to join', 'error');
                }
            } catch (err) {
                showToast('Error joining', 'error');
            }
        }

        // 2FA Settings
        async function load2FAStatus() {
            try {
                const res = await fetch('/api/account-info', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ accountId: currentAccount.id })
                });
                const data = await res.json();
                document.getElementById('2faStatus').textContent = 'Set up two-step verification';
            } catch (err) {
                console.error('Error:', err);
            }
        }

        function show2FASettings() {
            const modalContent = document.getElementById('settingsBody');
            const originalContent = modalContent.innerHTML;
            
            modalContent.innerHTML = `
                <div class="settings-section">
                    <h4>Two-Step Verification</h4>
                    <input type="password" id="currentPassword" placeholder="Current password (if set)">
                    <input type="password" id="newPassword" placeholder="New password">
                    <input type="password" id="confirmPassword" placeholder="Confirm new password">
                    <input type="text" id="hint" placeholder="Password hint (optional)">
                    <button class="btn btn-primary" onclick="update2FA()">Save Changes</button>
                    <button class="btn btn-secondary" onclick="close2FASettings()" style="margin-top: 8px;">Back</button>
                </div>
            `;
        }

        async function update2FA() {
            const currentPassword = document.getElementById('currentPassword')?.value || '';
            const newPassword = document.getElementById('newPassword')?.value || '';
            const confirmPassword = document.getElementById('confirmPassword')?.value || '';
            
            if (newPassword && newPassword !== confirmPassword) {
                showToast('Passwords do not match', 'error');
                return;
            }
            
            try {
                const res = await fetch('/api/update-2fa', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        accountId: currentAccount.id,
                        currentPassword: currentPassword,
                        newPassword: newPassword
                    })
                });
                
                const data = await res.json();
                if (data.success) {
                    showToast(data.message || '2FA updated');
                    closeSettings();
                } else {
                    showToast(data.error || 'Failed to update 2FA', 'error');
                }
            } catch (err) {
                showToast('Error updating 2FA', 'error');
            }
        }

        function close2FASettings() {
            closeSettings();
            openSettings();
        }

        // Email Settings
        function showEmailSettings() {
            const modalContent = document.getElementById('settingsBody');
            
            modalContent.innerHTML = `
                <div class="settings-section">
                    <h4>Recovery Email</h4>
                    <input type="email" id="recoveryEmail" placeholder="Enter recovery email">
                    <button class="btn btn-primary" onclick="updateEmail()">Save Email</button>
                    <button class="btn btn-secondary" onclick="closeEmailSettings()" style="margin-top: 8px;">Back</button>
                </div>
            `;
        }

        async function updateEmail() {
            const email = document.getElementById('recoveryEmail')?.value;
            if (!email) {
                showToast('Please enter an email', 'error');
                return;
            }
            
            try {
                const res = await fetch('/api/update-email', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        accountId: currentAccount.id,
                        email: email
                    })
                });
                
                const data = await res.json();
                if (data.success) {
                    showToast('Recovery email updated');
                    document.getElementById('emailStatus').textContent = email;
                    closeSettings();
                } else {
                    showToast(data.error || 'Failed to update email', 'error');
                }
            } catch (err) {
                showToast('Error updating email', 'error');
            }
        }

        function closeEmailSettings() {
            closeSettings();
            openSettings();
        }

        // Device Management
        async function loadDevices() {
            try {
                const res = await fetch('/api/get-sessions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ accountId: currentAccount.id })
                });
                
                const data = await res.json();
                if (data.success && data.sessions) {
                    const devicesList = document.getElementById('devicesList');
                    devicesList.innerHTML = data.sessions.map(session => `
                        <div class="device-item ${session.current ? 'current' : ''}">
                            <div class="device-header">
                                <span class="device-name">${escapeHtml(session.device_model || 'Unknown')}</span>
                                ${session.current ? '<span class="device-badge">Current</span>' : ''}
                            </div>
                            <div class="device-details">
                                ${escapeHtml(session.platform || 'Unknown')} · ${escapeHtml(session.ip || 'Unknown IP')}<br>
                                ${escapeHtml(session.country || 'Unknown')}<br>
                                Last active: ${new Date(session.date_active * 1000).toLocaleString()}
                            </div>
                            ${!session.current ? `<button class="terminate-btn" onclick="terminateSession('${session.hash}')">Terminate</button>` : ''}
                        </div>
                    `).join('');
                }
            } catch (err) {
                console.error('Error loading devices:', err);
            }
        }

        async function terminateSession(hash) {
            if (!confirm('Terminate this session?')) return;
            
            try {
                const res = await fetch('/api/terminate-session', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        accountId: currentAccount.id,
                        hash: hash
                    })
                });
                
                const data = await res.json();
                if (data.success) {
                    showToast('Session terminated');
                    await loadDevices();
                } else {
                    showToast(data.error || 'Failed to terminate', 'error');
                }
            } catch (err) {
                showToast('Error terminating session', 'error');
            }
        }

        async function terminateAllSessions() {
            if (!confirm('Terminate all other sessions?')) return;
            
            try {
                const res = await fetch('/api/terminate-sessions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ accountId: currentAccount.id })
                });
                
                const data = await res.json();
                if (data.success) {
                    showToast(data.message || 'Sessions terminated');
                    await loadDevices();
                } else {
                    showToast(data.error || 'Failed', 'error');
                }
            } catch (err) {
                showToast('Error', 'error');
            }
        }

        // Modal Functions
        function openSettings() {
            settingsModal.classList.add('show');
            loadDevices();
        }

        function closeSettings() {
            settingsModal.classList.remove('show');
        }

        function openChatSettings() {
            if (currentChat) {
                openSettings();
            }
        }

        function showNoAccountState() {
            chatsListDiv.innerHTML = '<div class="empty-state">No accounts. <a href="/login" style="color:#6ab2f2;">Add one</a>.</div>';
            messagesHeader.style.display = 'none';
            composeArea.style.display = 'none';
            messagesListDiv.innerHTML = '<div class="empty-state">Add an account to start messaging</div>';
        }

        // Close dropdown
        document.addEventListener('click', function(event) {
            if (!switcher.contains(event.target) && !dropdown.contains(event.target)) {
                dropdown.classList.remove('show');
            }
            if (!searchInput.contains(event.target) && !searchResults.contains(event.target)) {
                searchResults.classList.remove('show');
            }
        });

        switcher.addEventListener('click', function(event) {
            event.stopPropagation();
            dropdown.classList.toggle('show');
        });

        // Initialize
        window.addEventListener('load', () => {
            loadAccounts();
            
            refreshInterval = setInterval(() => {
                if (currentAccount) {
                    loadChats();
                    if (currentChat) {
                        loadMessages(currentChat.id);
                    }
                }
            }, 30000);
        });

        window.addEventListener('beforeunload', () => {
            if (refreshInterval) clearInterval(refreshInterval);
        });
    </script>
</body>
</html>
