<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Manager</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        body { background: #0e1621; height: 100vh; display: flex; flex-direction: column; color: #fff; overflow: hidden; }
        
        .header { background: #17212b; padding: 8px 16px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #2b3945; height: 60px; }
        .account-selector { display: flex; align-items: center; gap: 12px; cursor: pointer; padding: 6px 12px; border-radius: 30px; background: #242f3d; position: relative; }
        .avatar { width: 42px; height: 42px; border-radius: 50%; background: linear-gradient(145deg, #2b5278, #4c9ce0); display: flex; align-items: center; justify-content: center; font-size: 1.4rem; font-weight: 600; background-size: cover; background-position: center; }
        .account-info { display: flex; flex-direction: column; }
        .account-name { font-size: 1rem; font-weight: 600; }
        .account-phone { font-size: 0.75rem; color: #8e9fad; }
        .dropdown { position: absolute; top: 60px; left: 16px; background: #17212b; border: 1px solid #2b3945; border-radius: 12px; width: 260px; display: none; z-index: 100; max-height: 400px; overflow-y: auto; }
        .dropdown.show { display: block; }
        .dropdown-item { display: flex; align-items: center; padding: 12px 16px; gap: 12px; cursor: pointer; border-bottom: 1px solid #2b3945; }
        .dropdown-item:hover { background: #242f3d; }
        .header-buttons { display: flex; gap: 8px; }
        .header-buttons button { background: #2b3945; color: #6ab2f2; border: none; padding: 8px 16px; border-radius: 30px; cursor: pointer; }
        .icon-btn { width: 40px; height: 40px; border-radius: 50%; padding: 0; font-size: 1.2rem; }
        
        .main { display: flex; flex: 1; overflow: hidden; }
        .chats-panel { width: 320px; background: #17212b; border-right: 1px solid #2b3945; display: flex; flex-direction: column; overflow: hidden; }
        .chats-header { padding: 16px; border-bottom: 1px solid #2b3945; display: flex; justify-content: space-between; }
        .chats-list { flex: 1; overflow-y: auto; padding: 8px; }
        .chat-item { display: flex; align-items: center; padding: 12px; border-radius: 12px; cursor: pointer; margin-bottom: 4px; }
        .chat-item:hover { background: #242f3d; }
        .chat-item.active { background: #2b5278; }
        .chat-avatar { width: 48px; height: 48px; border-radius: 50%; background: linear-gradient(145deg, #2b5278, #4c9ce0); display: flex; align-items: center; justify-content: center; font-size: 1.3rem; font-weight: 600; margin-right: 12px; background-size: cover; background-position: center; }
        .chat-details { flex: 1; min-width: 0; }
        .chat-title { font-weight: 600; font-size: 1rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .chat-preview { font-size: 0.8rem; color: #8e9fad; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .chat-time { font-size: 0.7rem; color: #8e9fad; }
        
        .messages-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .messages-header { background: #17212b; padding: 12px 20px; border-bottom: 1px solid #2b3945; display: flex; align-items: center; gap: 12px; height: 60px; }
        .messages-header-avatar { width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(145deg, #2b5278, #4c9ce0); display: flex; align-items: center; justify-content: center; font-size: 1.2rem; font-weight: 600; background-size: cover; background-position: center; }
        .messages-header-info { flex: 1; }
        .messages-header-title { font-weight: 600; }
        .messages-header-status { font-size: 0.7rem; color: #8e9fad; }
        .messages-list { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .message { display: flex; flex-direction: column; max-width: 80%; }
        .message.outgoing { align-self: flex-end; }
        .message.incoming { align-self: flex-start; }
        .message-bubble { padding: 8px 12px; border-radius: 18px; word-wrap: break-word; }
        .incoming .message-bubble { background: #17212b; border-bottom-left-radius: 4px; }
        .outgoing .message-bubble { background: #2b5278; border-bottom-right-radius: 4px; }
        .message-time { font-size: 0.65rem; color: #8e9fad; margin-top: 2px; text-align: right; }
        .media-image { max-width: 250px; max-height: 200px; border-radius: 12px; cursor: pointer; }
        
        .compose { background: #17212b; padding: 12px 20px; border-top: 1px solid #2b3945; display: flex; gap: 12px; align-items: center; }
        .compose-input { flex: 1; background: #242f3d; border: none; border-radius: 30px; padding: 12px 18px; color: #fff; font-size: 1rem; outline: none; }
        .send-btn { background: #4c9ce0; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; color: white; font-size: 1.2rem; }
        .attach-btn { background: #2b3945; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; font-size: 1.2rem; color: #6ab2f2; }
        
        .settings-panel { width: 350px; background: #17212b; border-left: 1px solid #2b3945; display: none; flex-direction: column; overflow-y: auto; }
        .settings-header { padding: 20px; border-bottom: 1px solid #2b3945; display: flex; justify-content: space-between; }
        .settings-content { padding: 20px; }
        .settings-section { margin-bottom: 24px; }
        .settings-section h4 { margin-bottom: 15px; }
        .profile-preview { display: flex; align-items: center; gap: 15px; padding: 15px; background: #242f3d; border-radius: 12px; margin-bottom: 20px; }
        .profile-avatar { width: 60px; height: 60px; border-radius: 50%; background: linear-gradient(145deg, #2b5278, #4c9ce0); display: flex; align-items: center; justify-content: center; font-size: 1.8rem; font-weight: 600; background-size: cover; background-position: center; }
        .settings-btn { width: 100%; padding: 12px; background: #2b3945; border: none; border-radius: 30px; color: #6ab2f2; cursor: pointer; margin-bottom: 10px; }
        .settings-btn.danger { background: #8e2b2b; color: white; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center; }
        .modal.show { display: flex; }
        .modal-content { background: #17212b; border-radius: 16px; padding: 24px; max-width: 400px; width: 90%; }
        .modal-content input { width: 100%; padding: 12px; background: #242f3d; border: 1px solid #2b3945; border-radius: 12px; color: #fff; margin: 10px 0; }
        .modal-actions { display: flex; gap: 12px; margin-top: 20px; }
        
        .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #17212b; padding: 12px 24px; border-radius: 30px; border: 1px solid #2b3945; z-index: 1000; display: none; }
        .toast.show { display: block; }
        .loading { text-align: center; padding: 40px; color: #8e9fad; }
        .empty { text-align: center; padding: 40px; color: #8e9fad; }
        
        @media (max-width: 700px) {
            .chats-panel { width: 100%; }
            .messages-panel { display: none; position: fixed; top: 60px; left: 0; right: 0; bottom: 0; z-index: 20; background: #0e1621; }
            .messages-panel.show { display: flex; }
            .settings-panel { position: fixed; top: 0; right: 0; bottom: 0; width: 100%; transform: translateX(100%); transition: transform 0.3s; z-index: 30; }
            .settings-panel.show { transform: translateX(0); }
            .back-btn { background: transparent; color: #6ab2f2; border: none; font-size: 1.5rem; margin-right: 10px; cursor: pointer; }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="account-selector" id="accountSelector">
            <div class="avatar" id="currentAvatar">?</div>
            <div class="account-info">
                <span class="account-name" id="currentName">Loading...</span>
                <span class="account-phone" id="currentPhone"></span>
            </div>
            <span>▼</span>
        </div>
        <div class="dropdown" id="accountDropdown"></div>
        <div class="header-buttons">
            <button class="icon-btn" onclick="toggleSettings()">⚙️</button>
            <button class="icon-btn" onclick="refreshAll()">↻</button>
            <button onclick="location.href='/login'">➕ Add</button>
        </div>
    </div>

    <div class="main">
        <div class="chats-panel" id="chatsPanel">
            <div class="chats-header"><h3>CHATS</h3><span id="chatCount">0</span></div>
            <div class="chats-list" id="chatsList"><div class="loading">Loading...</div></div>
        </div>

        <div class="messages-panel" id="messagesPanel">
            <div class="messages-header" id="messagesHeader" style="display:none">
                <button class="back-btn" onclick="showChats()">←</button>
                <div class="messages-header-avatar" id="msgAvatar">?</div>
                <div class="messages-header-info">
                    <div class="messages-header-title" id="msgTitle"></div>
                    <div class="messages-header-status" id="msgStatus"></div>
                </div>
                <button onclick="showChatInfo()" style="background:#2b3945; border:none; width:36px; height:36px; border-radius:50%; cursor:pointer;">ℹ️</button>
            </div>
            <div class="messages-list" id="messagesList"><div class="empty">Select a chat</div></div>
            <div class="compose" id="composeArea" style="display:none">
                <button class="attach-btn" onclick="document.getElementById('fileInput').click()">📎</button>
                <input type="text" class="compose-input" id="messageInput" placeholder="Type a message...">
                <button class="send-btn" onclick="sendMessage()">📤</button>
            </div>
            <input type="file" id="fileInput" style="display:none">
        </div>

        <div class="settings-panel" id="settingsPanel">
            <div class="settings-header"><h3>Settings</h3><button onclick="toggleSettings()">✕</button></div>
            <div class="settings-content">
                <div class="settings-section">
                    <h4>Profile</h4>
                    <div class="profile-preview"><div class="profile-avatar" id="profileAvatar">?</div><div><div id="profileName"></div><div id="profileUsername"></div><div id="profilePhone"></div></div></div>
                    <button class="settings-btn" onclick="editProfile()">Edit Name</button>
                    <button class="settings-btn" onclick="editUsername()">Change Username</button>
                </div>
                <div class="settings-section">
                    <h4>Security</h4>
                    <button class="settings-btn" onclick="show2FA()">Two-Step Verification</button>
                    <button class="settings-btn" onclick="showSessions()">Active Sessions</button>
                </div>
                <div class="settings-section">
                    <h4>Auto-Add</h4>
                    <button class="settings-btn" onclick="showAutoAdd()">Auto-Add Settings</button>
                </div>
                <div class="settings-section">
                    <h4>Danger</h4>
                    <button class="settings-btn danger" onclick="removeAccount()">Remove Account</button>
                </div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>
    <div class="modal" id="modal"><div class="modal-content" id="modalContent"></div></div>

    <script>
        let accounts = [], currentAccount = null, currentChat = null, chats = [], pendingFile = null;

        function showToast(msg, type='success') { let t=document.getElementById('toast'); t.textContent=msg; t.className=`toast show ${type}`; setTimeout(()=>t.classList.remove('show'),3000); }
        function escapeHtml(t){if(!t)return '';let d=document.createElement('div');d.textContent=t;return d.innerHTML;}
        function formatTime(ts){if(!ts)return '';return new Date(ts*1000).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});}
        function formatDate(ts){if(!ts)return '';let d=new Date(ts*1000);return d.toDateString()===new Date().toDateString()?formatTime(ts):d.toLocaleDateString();}
        function showChats(){if(window.innerWidth<=700){document.getElementById('chatsPanel').style.display='block';document.getElementById('messagesPanel').classList.remove('show');}}
        function showMessages(){if(window.innerWidth<=700){document.getElementById('chatsPanel').style.display='none';document.getElementById('messagesPanel').classList.add('show');}}
        function toggleSettings(){let p=document.getElementById('settingsPanel');if(window.innerWidth<=700)p.classList.toggle('show');else p.style.display=p.style.display==='none'?'flex':'none';}
        function closeModal(){document.getElementById('modal').classList.remove('show');}

        async function loadAccounts(){
            try{
                let res=await fetch('/api/accounts');
                let data=await res.json();
                if(data.success){
                    accounts=data.accounts||[];
                    if(accounts.length){
                        let last=localStorage.getItem('lastAccount');
                        currentAccount=accounts.find(a=>a.id==last)||accounts[0];
                        updateHeader();
                        renderDropdown();
                        await loadChats();
                        await loadProfile();
                    }else document.getElementById('chatsList').innerHTML='<div class="empty">No accounts.<br><button onclick="location.href=\'/login\'" style="background:#4c9ce0;border:none;padding:10px 20px;border-radius:30px;margin-top:10px;cursor:pointer;">Add Account</button></div>';
                }
            }catch(e){console.error(e);}
        }

        function updateHeader(){
            if(!currentAccount)return;
            document.getElementById('currentAvatar').textContent=(currentAccount.name||'?').charAt(0).toUpperCase();
            document.getElementById('currentName').textContent=currentAccount.name||'User';
            document.getElementById('currentPhone').textContent=currentAccount.phone||'';
            localStorage.setItem('lastAccount',currentAccount.id);
        }

        function renderDropdown(){
            if(!accounts.length){document.getElementById('accountDropdown').innerHTML='<div class="dropdown-item">No accounts</div>';return;}
            let html='';
            accounts.forEach(a=>{
                let initial=(a.name||'?').charAt(0).toUpperCase();
                let isCurrent=a.id===currentAccount?.id?'✓':'';
                html+=`<div class="dropdown-item" onclick="switchAccount(${a.id})"><div class="avatar" style="width:36px;height:36px;">${initial}</div><div><div>${escapeHtml(a.name)}</div><div style="font-size:0.7rem;color:#8e9fad;">${escapeHtml(a.phone)}</div></div><span>${isCurrent}</span></div>`;
            });
            html+=`<div class="dropdown-item" style="color:#ff6b6b;" onclick="removeAccount()">🗑️ Remove Account</div>`;
            document.getElementById('accountDropdown').innerHTML=html;
        }

        window.switchAccount=async function(id){
            let acc=accounts.find(a=>a.id==id);
            if(!acc)return;
            currentAccount=acc;currentChat=null;
            updateHeader();renderDropdown();
            document.getElementById('accountDropdown').classList.remove('show');
            document.getElementById('messagesHeader').style.display='none';
            document.getElementById('composeArea').style.display='none';
            await loadChats();await loadProfile();
        };

        async function loadProfile(){
            if(!currentAccount)return;
            try{
                let res=await fetch('/api/account-info',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({accountId:currentAccount.id})});
                let data=await res.json();
                if(data.success){
                    document.getElementById('profileName').textContent=data.name;
                    document.getElementById('profileUsername').textContent=data.username?'@'+data.username:'No username';
                    document.getElementById('profilePhone').textContent=data.phone;
                    if(data.photo){
                        let url=`data:image/jpeg;base64,${data.photo}`;
                        let pa=document.getElementById('profileAvatar');
                        pa.style.backgroundImage=`url(${url})`;pa.style.backgroundSize='cover';pa.textContent='';
                    }
                }
            }catch(e){}
        }

        async function loadChats(){
            if(!currentAccount)return;
            document.getElementById('chatsList').innerHTML='<div class="loading">Loading...</div>';
            try{
                let res=await fetch('/api/get-messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({accountId:currentAccount.id})});
                let data=await res.json();
                if(data.success){
                    chats=data.chats||[];
                    document.getElementById('chatCount').textContent=chats.length;
                    displayChats();
                    if(currentChat){let exists=chats.find(c=>c.id===currentChat.id);if(exists)await loadMessages(currentChat.id);}
                }else document.getElementById('chatsList').innerHTML=`<div class="empty">Error: ${escapeHtml(data.error)}</div>`;
            }catch(e){document.getElementById('chatsList').innerHTML='<div class="empty">Failed</div>';}
        }

        function displayChats(){
            if(!chats.length){document.getElementById('chatsList').innerHTML='<div class="empty">No chats</div>';return;}
            let html='';
            chats.forEach(chat=>{
                let active=(currentChat&&currentChat.id===chat.id)?'active':'';
                let time=chat.lastMessageDate?formatDate(chat.lastMessageDate):'';
                let letter=(chat.title||'?').charAt(0).toUpperCase();
                html+=`<div class="chat-item ${active}" onclick="selectChat('${escapeHtml(chat.id)}','${escapeHtml(chat.title)}')">
                    <div class="chat-avatar" data-chat-id="${escapeHtml(chat.id)}">${letter}</div>
                    <div class="chat-details">
                        <div class="chat-title">${escapeHtml(chat.title)}</div>
                        <div class="chat-preview">${escapeHtml(chat.lastMessage||'No messages')}</div>
                    </div>
                    <div class="chat-time">${time}</div>
                </div>`;
            });
            document.getElementById('chatsList').innerHTML=html;
            chats.forEach(chat=>loadChatPhoto(chat.id));
        }

        async function loadChatPhoto(chatId){
            try{
                let res=await fetch('/api/get-chat-photo',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({accountId:currentAccount.id,chatId:chatId})});
                let data=await res.json();
                if(data.success&&data.photo){
                    let av=document.querySelector(`.chat-avatar[data-chat-id="${chatId}"]`);
                    if(av){av.style.backgroundImage=`url(data:image/jpeg;base64,${data.photo})`;av.style.backgroundSize='cover';av.textContent='';}
                }
            }catch(e){}
        }

        window.selectChat=async function(id,title){
            currentChat={id:id,title:title};
            document.getElementById('msgTitle').textContent=title;
            document.getElementById('msgAvatar').textContent=title.charAt(0).toUpperCase();
            document.getElementById('messagesHeader').style.display='flex';
            document.getElementById('composeArea').style.display='flex';
            await loadMessages(id);
            await loadChatHeaderPhoto(id);
            showMessages();
            displayChats();
        };

        async function loadChatHeaderPhoto(id){
            try{
                let res=await fetch('/api/get-chat-photo',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({accountId:currentAccount.id,chatId:id})});
                let data=await res.json();
                if(data.success&&data.photo){
                    let av=document.getElementById('msgAvatar');
                    av.style.backgroundImage=`url(data:image/jpeg;base64,${data.photo})`;
                    av.style.backgroundSize='cover';av.textContent='';
                }
            }catch(e){}
        }

        async function loadMessages(chatId){
            document.getElementById('messagesList').innerHTML='<div class="loading">Loading...</div>';
            try{
                let res=await fetch('/api/get-chat-messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({accountId:currentAccount.id,chatId:chatId,limit:50})});
                let data=await res.json();
                if(data.success){
                    let msgs=data.messages||[];
                    if(msgs.length)displayMessages(msgs);
                    else document.getElementById('messagesList').innerHTML='<div class="empty">No messages yet</div>';
                    if(data.chat_info){
                        if(data.chat_info.online)document.getElementById('msgStatus').innerHTML='<span style="color:#4c9ce0;">● online</span>';
                        else if(data.chat_info.last_seen)document.getElementById('msgStatus').innerHTML=`last seen ${formatDate(data.chat_info.last_seen)}`;
                        else document.getElementById('msgStatus').innerHTML=data.chat_info.type||'user';
                    }
                }else document.getElementById('messagesList').innerHTML=`<div class="empty">Error</div>`;
            }catch(e){document.getElementById('messagesList').innerHTML='<div class="empty">Failed</div>';}
        }

        function displayMessages(msgs){
            let html='';
            msgs.forEach(m=>{
                let time=formatTime(m.date);
                let bubble=m.out?'outgoing':'incoming';
                let content='';
                if(m.media_type==='photo'&&m.media_data)content=`<div onclick="showMedia('${m.media_data}')"><img class="media-image" src="data:image/jpeg;base64,${m.media_data}"></div>`;
                else if(m.text)content=`<div>${escapeHtml(m.text)}</div>`;
                else if(m.has_media)content=`<div><em>Media</em></div>`;
                else content=`<div><em>Empty</em></div>`;
                html+=`<div class="message ${bubble}"><div class="message-bubble">${content}<div class="message-time">${time}</div></div></div>`;
            });
            document.getElementById('messagesList').innerHTML=html;
            setTimeout(()=>{let el=document.getElementById('messagesList');el.scrollTop=el.scrollHeight;},100);
        }

        function showMedia(data){let m=document.getElementById('mediaModal');if(m){m.innerHTML=`<div style="position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.95);display:flex;align-items:center;justify-content:center;z-index:2000;"><img src="data:image/jpeg;base64,${data}" style="max-width:90%;max-height:90%;" onclick="this.parentElement.remove()"><div style="position:absolute;top:20px;right:20px;color:white;font-size:2rem;cursor:pointer;" onclick="this.parentElement.remove()">✕</div></div>`;}}

        async function sendMessage(){
            let msg=document.getElementById('messageInput').value.trim();
            if(!msg&&!pendingFile)return;
            let inp=document.getElementById('messageInput');inp.disabled=true;
            try{
                let res;
                if(pendingFile){
                    let fd=new FormData();
                    fd.append('accountId',currentAccount.id);
                    fd.append('chatId',currentChat.id);
                    fd.append('file',pendingFile);
                    if(msg)fd.append('caption',msg);
                    res=await fetch('/api/send-media',{method:'POST',body:fd});
                    pendingFile=null;
                }else{
                    res=await fetch('/api/send-message',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({accountId:currentAccount.id,chatId:currentChat.id,message:msg})});
                }
                let data=await res.json();
                if(data.success){inp.value='';showToast('Sent');await loadMessages(currentChat.id);}
                else showToast(data.error||'Failed','error');
            }catch(e){showToast('Error','error');}
            finally{inp.disabled=false;inp.focus();}
        }

        document.getElementById('fileInput').onchange=function(e){
            if(e.target.files&&e.target.files[0]){pendingFile=e.target.files[0];showToast(`Selected: ${pendingFile.name}`);}
            e.target.value='';
        };
        document.getElementById('messageInput').addEventListener('keypress',e=>{if(e.key==='Enter')sendMessage();});

        function editProfile(){let n=prompt('New name:',document.getElementById('profileName').textContent);if(n)updateProfile(n);}
        async function updateProfile(n){
            try{
                let res=await fetch('/api/update-profile',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({accountId:currentAccount.id,firstName:n})});
                let data=await res.json();
                if(data.success){showToast('Updated');currentAccount.name=n;updateHeader();await loadProfile();}
                else showToast(data.error,'error');
            }catch(e){showToast('Error','error');}
        }

        function editUsername(){let u=prompt('Username (without @):');if(u)updateUsername(u);}
        async function updateUsername(u){
            try{
                let res=await fetch('/api/update-username',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({accountId:currentAccount.id,username:u})});
                let data=await res.json();
                if(data.success)showToast('Username updated');
                else showToast(data.error,'error');
            }catch(e){showToast('Error','error');}
        }

        function show2FA(){
            document.getElementById('modalContent').innerHTML=`<h3>Two-Step Verification</h3><input type="password" id="curPwd" placeholder="Current password"><input type="password" id="newPwd" placeholder="New password"><input type="text" id="hint" placeholder="Hint"><input type="email" id="email" placeholder="Recovery email"><div class="modal-actions"><button class="settings-btn" onclick="set2FA()">Enable</button><button onclick="closeModal()">Cancel</button></div>`;
            document.getElementById('modal').classList.add('show');
        }

        async function set2FA(){
            let cur=document.getElementById('curPwd').value,newPwd=document.getElementById('newPwd').value,hint=document.getElementById('hint').value,email=document.getElementById('email').value;
            if(!newPwd){showToast('Enter password','error');return;}
            try{
                let res=await fetch('/api/set-2fa',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({accountId:currentAccount.id,currentPassword:cur,newPassword:newPwd,hint:hint,email:email})});
                let data=await res.json();
                if(data.success){showToast('2FA enabled');closeModal();}
                else showToast(data.error,'error');
            }catch(e){showToast('Error','error');}
        }

        async function showSessions(){
            try{
                let res=await fetch('/api/get-sessions',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({accountId:currentAccount.id})});
                let data=await res.json();
                if(data.success&&data.sessions){
                    let list='Active Sessions:\n\n';
                    data.sessions.forEach(s=>{list+=`${s.device_model} (${s.platform})\nIP: ${s.ip} · ${s.country}\nLast: ${new Date(s.date_active*1000).toLocaleString()}\n${s.current?'➡️ CURRENT\n':''}---\n`;});
                    alert(list);
                }
            }catch(e){showToast('Error','error');}
        }

        function showAutoAdd(){
            document.getElementById('modalContent').innerHTML=`<h3>Auto-Add Settings</h3><input type="text" id="targetGroup" placeholder="Target group" value="Abe_armygroup"><input type="number" id="dailyLimit" placeholder="Daily limit" value="30"><input type="number" id="delay" placeholder="Delay seconds" value="45"><div class="modal-actions"><button class="settings-btn" onclick="saveAutoAdd()">Save</button><button onclick="closeModal()">Cancel</button></div>`;
            document.getElementById('modal').classList.add('show');
        }

        async function saveAutoAdd(){
            let target=document.getElementById('targetGroup').value,daily=parseInt(document.getElementById('dailyLimit').value),delay=parseInt(document.getElementById('delay').value);
            try{
                let res=await fetch('/api/auto-add-settings',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({accountId:currentAccount.id,enabled:true,target_group:target,daily_limit:daily,delay_seconds:delay})});
                let data=await res.json();
                if(data.success){showToast('Auto-add enabled');closeModal();}
                else showToast(data.error,'error');
            }catch(e){showToast('Error','error');}
        }

        async function removeAccount(){
            if(!confirm(`Remove "${currentAccount.name}"?`))return;
            try{
                let res=await fetch('/api/remove-account',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({accountId:currentAccount.id})});
                if(res.ok){showToast('Removed');await loadAccounts();}
            }catch(e){showToast('Error','error');}
        }

        function refreshAll(){if(currentAccount){loadChats();if(currentChat)loadMessages(currentChat.id);}showToast('Refreshed');}
        function showChatInfo(){if(currentChat)alert(`Chat: ${currentChat.title}\nID: ${currentChat.id}`);}

        document.querySelector('.account-selector').addEventListener('click',e=>{e.stopPropagation();document.getElementById('accountDropdown').classList.toggle('show');});
        document.addEventListener('click',()=>document.getElementById('accountDropdown').classList.remove('show'));
        window.addEventListener('load',()=>{loadAccounts();setInterval(()=>{if(currentAccount)loadChats();},30000);});
    </script>
</body>
</html>
