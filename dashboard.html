<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Multi-Account</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: #0e1621;
            color: #fff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Header */
        .header {
            background: #17212b;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #2b3945;
            height: 65px;
        }

        .account-info {
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
            padding: 5px 15px;
            border-radius: 30px;
            background: #242f3d;
            position: relative;
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #2b5278;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 600;
        }

        .account-details {
            line-height: 1.3;
        }

        .account-name {
            font-weight: 600;
            font-size: 14px;
        }

        .account-phone {
            font-size: 12px;
            color: #8e9fad;
        }

        .dropdown-icon {
            color: #8e9fad;
            font-size: 12px;
            margin-left: 5px;
        }

        /* Dropdown menu */
        .dropdown-menu {
            position: absolute;
            top: 50px;
            left: 0;
            background: #17212b;
            border: 1px solid #2b3945;
            border-radius: 12px;
            width: 250px;
            display: none;
            z-index: 1000;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        .dropdown-menu.show {
            display: block;
        }

        .dropdown-item {
            padding: 12px 15px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            border-bottom: 1px solid #2b3945;
        }

        .dropdown-item:last-child {
            border-bottom: none;
        }

        .dropdown-item:hover {
            background: #242f3d;
        }

        .dropdown-avatar {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            background: #2b5278;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }

        .dropdown-info h4 {
            font-size: 14px;
            margin-bottom: 2px;
        }

        .dropdown-info p {
            font-size: 11px;
            color: #8e9fad;
        }

        .remove-item {
            color: #ff6b6b;
            border-top: 1px solid #2b3945;
        }

        .header-buttons {
            display: flex;
            gap: 10px;
        }

        .btn {
            background: #2b3945;
            color: #6ab2f2;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            text-decoration: none;
        }

        .btn:hover {
            background: #3a4a5a;
        }

        .refresh-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #2b3945;
            color: #6ab2f2;
            border: none;
            cursor: pointer;
            font-size: 18px;
        }

        .refresh-btn:hover {
            background: #3a4a5a;
        }

        /* Main container */
        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
            height: calc(100vh - 65px);
        }

        /* Chats sidebar */
        .chats-sidebar {
            width: 350px;
            background: #17212b;
            border-right: 1px solid #2b3945;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chats-header {
            padding: 15px;
            border-bottom: 1px solid #2b3945;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chats-header h3 {
            color: #8e9fad;
            font-size: 14px;
            font-weight: 500;
        }

        .chats-count {
            background: #2b3945;
            color: #fff;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 12px;
        }

        .chats-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .chat-item {
            display: flex;
            align-items: center;
            padding: 12px;
            border-radius: 10px;
            cursor: pointer;
            margin-bottom: 5px;
            transition: background 0.2s;
        }

        .chat-item:hover {
            background: #242f3d;
        }

        .chat-item.active {
            background: #2b5278;
        }

        .chat-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(145deg, #2b5278, #4c9ce0);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 600;
            margin-right: 12px;
            position: relative;
        }

        /* Chat type indicators */
        .chat-avatar.user {
            background: #2b5278;
        }
        .chat-avatar.bot {
            background: #854c9e;
        }
        .chat-avatar.bot::after {
            content: '🤖';
            position: absolute;
            bottom: -5px;
            right: -5px;
            font-size: 14px;
            background: #17212b;
            border-radius: 50%;
            padding: 2px;
        }
        .chat-avatar.group {
            background: #4c9e7a;
        }
        .chat-avatar.group::after {
            content: '👥';
            position: absolute;
            bottom: -5px;
            right: -5px;
            font-size: 14px;
            background: #17212b;
            border-radius: 50%;
            padding: 2px;
        }
        .chat-avatar.channel {
            background: #9e7a4c;
        }
        .chat-avatar.channel::after {
            content: '📢';
            position: absolute;
            bottom: -5px;
            right: -5px;
            font-size: 14px;
            background: #17212b;
            border-radius: 50%;
            padding: 2px;
        }

        .chat-info {
            flex: 1;
            min-width: 0;
        }

        .chat-title-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
        }

        .chat-title {
            font-weight: 600;
            font-size: 15px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 180px;
        }

        .chat-time {
            font-size: 11px;
            color: #8e9fad;
        }

        .chat-last-msg {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-last-text {
            font-size: 13px;
            color: #8e9fad;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 180px;
        }

        .chat-unread {
            background: #4c9ce0;
            color: white;
            font-size: 11px;
            font-weight: 600;
            padding: 2px 6px;
            border-radius: 12px;
            min-width: 20px;
            text-align: center;
        }

        /* Messages panel */
        .messages-panel {
            flex: 1;
            background: #0e1621;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .messages-header {
            background: #17212b;
            padding: 12px 20px;
            border-bottom: 1px solid #2b3945;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 60px;
        }

        .messages-header-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .back-btn {
            display: none;
            background: none;
            border: none;
            color: #6ab2f2;
            font-size: 24px;
            cursor: pointer;
        }

        .current-chat-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #2b5278;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 600;
        }

        .current-chat-info h2 {
            font-size: 16px;
            margin-bottom: 2px;
        }

        .current-chat-info p {
            font-size: 12px;
            color: #8e9fad;
        }

        .messages-list {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .message {
            max-width: 70%;
            display: flex;
            flex-direction: column;
        }

        .message.outgoing {
            align-self: flex-end;
        }

        .message.incoming {
            align-self: flex-start;
        }

        .message-bubble {
            padding: 10px 14px;
            border-radius: 18px;
            word-wrap: break-word;
            font-size: 14px;
            line-height: 1.4;
        }

        .incoming .message-bubble {
            background: #17212b;
            color: #fff;
            border-bottom-left-radius: 4px;
        }

        .outgoing .message-bubble {
            background: #2b5278;
            color: #fff;
            border-bottom-right-radius: 4px;
        }

        .message-meta {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 5px;
            margin-top: 3px;
            font-size: 10px;
            color: #8e9fad;
        }

        /* Media styles */
        .media-message {
            max-width: 250px;
        }

        .media-image {
            max-width: 100%;
            max-height: 200px;
            border-radius: 12px;
            cursor: pointer;
        }

        .media-video {
            max-width: 100%;
            max-height: 200px;
            border-radius: 12px;
        }

        .media-audio {
            width: 100%;
            height: 40px;
            border-radius: 20px;
        }

        .media-document {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255,255,255,0.1);
            padding: 10px;
            border-radius: 10px;
            cursor: pointer;
        }

        .media-icon {
            font-size: 24px;
        }

        .media-name {
            font-size: 13px;
            font-weight: 500;
        }

        .emoji-message {
            font-size: 48px;
            padding: 5px;
        }

        /* Compose area */
        .compose-area {
            background: #17212b;
            padding: 12px 20px;
            border-top: 1px solid #2b3945;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .compose-input {
            flex: 1;
            background: #242f3d;
            border: none;
            border-radius: 25px;
            padding: 12px 18px;
            color: #fff;
            font-size: 14px;
            outline: none;
        }

        .compose-input::placeholder {
            color: #8e9fad;
        }

        .compose-input:disabled {
            opacity: 0.5;
        }

        .send-btn {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: #4c9ce0;
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .send-btn:hover:not(:disabled) {
            background: #6ab2f2;
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .attach-btn {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: #2b3945;
            border: none;
            color: #6ab2f2;
            font-size: 20px;
            cursor: pointer;
        }

        /* Loading states */
        .loading {
            text-align: center;
            padding: 40px;
            color: #8e9fad;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #8e9fad;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #17212b;
            color: white;
            padding: 12px 24px;
            border-radius: 30px;
            border: 1px solid #2b3945;
            z-index: 2000;
            display: none;
        }

        .toast.show {
            display: block;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.9);
            z-index: 3000;
            align-items: center;
            justify-content: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            max-width: 90%;
            max-height: 90%;
        }

        .modal-image {
            max-width: 100%;
            max-height: 90vh;
            border-radius: 8px;
        }

        .modal-close {
            position: absolute;
            top: 20px;
            right: 20px;
            color: white;
            font-size: 30px;
            cursor: pointer;
            width: 50px;
            height: 50px;
            background: rgba(0,0,0,0.5);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Mobile responsive */
        @media (max-width: 768px) {
            .chats-sidebar {
                width: 100%;
                display: block;
            }
            
            .messages-panel {
                display: none;
                width: 100%;
                position: fixed;
                top: 65px;
                left: 0;
                right: 0;
                bottom: 0;
                background: #0e1621;
            }
            
            .messages-panel.show {
                display: flex;
            }
            
            .back-btn {
                display: block;
            }
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #2b3945;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <div class="account-info" id="accountInfo">
            <div class="avatar" id="currentAvatar">?</div>
            <div class="account-details">
                <div class="account-name" id="currentName">Loading...</div>
                <div class="account-phone" id="currentPhone"></div>
            </div>
            <span class="dropdown-icon">▼</span>
            
            <!-- Dropdown -->
            <div class="dropdown-menu" id="accountDropdown"></div>
        </div>
        
        <div class="header-buttons">
            <button class="refresh-btn" id="refreshBtn" title="Refresh">↻</button>
            <a href="/login" class="btn">➕ Add</a>
        </div>
    </div>

    <!-- Main Container -->
    <div class="main-container">
        <!-- Chats Sidebar -->
        <div class="chats-sidebar" id="chatsSidebar">
            <div class="chats-header">
                <h3>CHATS</h3>
                <span class="chats-count" id="chatsCount">0</span>
            </div>
            <div class="chats-list" id="chatsList">
                <div class="loading">Loading chats...</div>
            </div>
        </div>

        <!-- Messages Panel -->
        <div class="messages-panel" id="messagesPanel">
            <div class="messages-header" id="messagesHeader" style="display: none;">
                <div class="messages-header-left">
                    <button class="back-btn" onclick="showChats()">←</button>
                    <div class="current-chat-avatar" id="chatAvatar">?</div>
                    <div class="current-chat-info">
                        <h2 id="chatTitle"></h2>
                        <p id="chatType"></p>
                    </div>
                </div>
                <button class="refresh-btn" onclick="refreshMessages()" title="Refresh">↻</button>
            </div>
            
            <div class="messages-list" id="messagesList">
                <div class="empty-state">👈 Select a chat to start</div>
            </div>
            
            <div class="compose-area" id="composeArea" style="display: none;">
                <input type="text" class="compose-input" id="messageInput" placeholder="Type a message..." disabled>
                <button class="attach-btn" onclick="alert('Coming soon!')">📎</button>
                <button class="send-btn" id="sendBtn" onclick="sendMessage()" disabled>📤</button>
            </div>
        </div>
    </div>

    <!-- Modal for media -->
    <div class="modal" id="mediaModal" onclick="hideModal()">
        <div class="modal-close">✕</div>
        <div class="modal-content" id="modalContent"></div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script>
        // State
        let accounts = [];
        let currentAccount = null;
        let currentChat = null;
        let chats = [];
        let messages = [];
        let refreshTimer = null;

        // DOM elements
        const accountInfo = document.getElementById('accountInfo');
        const dropdown = document.getElementById('accountDropdown');
        const currentAvatar = document.getElementById('currentAvatar');
        const currentName = document.getElementById('currentName');
        const currentPhone = document.getElementById('currentPhone');
        const chatsList = document.getElementById('chatsList');
        const chatsCount = document.getElementById('chatsCount');
        const messagesPanel = document.getElementById('messagesPanel');
        const messagesHeader = document.getElementById('messagesHeader');
        const messagesList = document.getElementById('messagesList');
        const composeArea = document.getElementById('composeArea');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const chatTitle = document.getElementById('chatTitle');
        const chatType = document.getElementById('chatType');
        const chatAvatar = document.getElementById('chatAvatar');
        const refreshBtn = document.getElementById('refreshBtn');
        const toast = document.getElementById('toast');

        // Helper functions
        function showToast(msg, type = 'success') {
            toast.textContent = msg;
            toast.className = 'toast show';
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        function showError(msg) {
            showToast(msg, 'error');
        }

        function formatTime(timestamp) {
            if (!timestamp) return '';
            try {
                const date = new Date(timestamp * 1000);
                const now = new Date();
                if (date.toDateString() === now.toDateString()) {
                    return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                }
                return date.toLocaleDateString([], { month: 'short', day: 'numeric' });
            } catch {
                return '';
            }
        }

        // Toggle dropdown
        accountInfo.addEventListener('click', (e) => {
            e.stopPropagation();
            dropdown.classList.toggle('show');
        });

        document.addEventListener('click', () => {
            dropdown.classList.remove('show');
        });

        // Load accounts
        async function loadAccounts() {
            try {
                const res = await fetch('/api/accounts');
                const data = await res.json();
                
                if (data.success) {
                    accounts = data.accounts || [];
                    
                    if (accounts.length > 0) {
                        const savedId = localStorage.getItem('lastAccount');
                        currentAccount = accounts.find(a => a.id == savedId) || accounts[0];
                        updateAccountHeader();
                        renderDropdown();
                        await loadChats();
                    } else {
                        showNoAccounts();
                    }
                }
            } catch (err) {
                console.error('Error:', err);
                showError('Failed to load accounts');
            }
        }

        function updateAccountHeader() {
            if (!currentAccount) return;
            
            const name = currentAccount.name || 'User';
            const phone = currentAccount.phone || '';
            const initial = name.charAt(0).toUpperCase();
            
            currentAvatar.textContent = initial;
            currentName.textContent = name;
            currentPhone.textContent = phone;
            
            localStorage.setItem('lastAccount', currentAccount.id);
        }

        function renderDropdown() {
            let html = '';
            
            accounts.forEach(acc => {
                const name = acc.name || 'User';
                const phone = acc.phone || '';
                const initial = name.charAt(0).toUpperCase();
                const isCurrent = acc.id === currentAccount?.id ? '✓' : '';
                
                html += `
                    <div class="dropdown-item" onclick="switchAccount(${acc.id})">
                        <div class="dropdown-avatar">${initial}</div>
                        <div class="dropdown-info">
                            <h4>${escapeHtml(name)}</h4>
                            <p>${escapeHtml(phone)}</p>
                        </div>
                        <span style="color:#6ab2f2;">${isCurrent}</span>
                    </div>
                `;
            });
            
            if (accounts.length > 0) {
                html += `
                    <div class="dropdown-item remove-item" onclick="showRemoveModal()">
                        <div class="dropdown-avatar" style="background:#8e2b2b;">−</div>
                        <div class="dropdown-info">
                            <h4>Remove Account</h4>
                            <p>Remove current account</p>
                        </div>
                    </div>
                `;
            }
            
            dropdown.innerHTML = html;
        }

        function showNoAccounts() {
            currentAvatar.textContent = '?';
            currentName.textContent = 'No Account';
            currentPhone.textContent = '';
            chatsList.innerHTML = '<div class="empty-state">No accounts. <a href="/login" style="color:#6ab2f2;">Add one</a>.</div>';
            chatsCount.textContent = '0';
            messagesHeader.style.display = 'none';
            composeArea.style.display = 'none';
            messagesList.innerHTML = '<div class="empty-state">Add an account to start</div>';
        }

        // Switch account
        window.switchAccount = async (id) => {
            const acc = accounts.find(a => a.id === id);
            if (!acc || acc.id === currentAccount?.id) {
                dropdown.classList.remove('show');
                return;
            }
            
            currentAccount = acc;
            currentChat = null;
            
            updateAccountHeader();
            renderDropdown();
            dropdown.classList.remove('show');
            
            messagesHeader.style.display = 'none';
            composeArea.style.display = 'none';
            messagesList.innerHTML = '<div class="empty-state">👈 Select a chat</div>';
            
            await loadChats();
        };

        // Load chats
        async function loadChats(showLoading = true) {
            if (!currentAccount) return;
            
            if (showLoading) {
                chatsList.innerHTML = '<div class="loading">Loading chats...</div>';
            }
            
            try {
                const res = await fetch('/api/get-messages', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ accountId: currentAccount.id })
                });
                
                const data = await res.json();
                
                if (data.success) {
                    chats = data.chats || [];
                    messages = data.messages || [];
                    
                    chatsCount.textContent = chats.length;
                    displayChats();
                    
                    if (currentChat) {
                        const exists = chats.find(c => c.id === currentChat.id);
                        if (exists) {
                            selectChat(currentChat.id, currentChat.title);
                        } else {
                            currentChat = null;
                        }
                    }
                } else {
                    chatsList.innerHTML = `<div class="empty-state">Error: ${data.error || 'Failed'}</div>`;
                }
            } catch (err) {
                console.error('Error:', err);
                chatsList.innerHTML = '<div class="empty-state">Failed to load chats</div>';
            }
        }

        function displayChats() {
            if (!chats || chats.length === 0) {
                chatsList.innerHTML = '<div class="empty-state">No chats found</div>';
                return;
            }
            
            let html = '';
            
            chats.forEach(chat => {
                const isActive = currentChat && currentChat.id === chat.id;
                const lastMsg = chat.lastMessage || 'No messages';
                const time = formatTime(chat.lastMessageDate);
                const unread = chat.unread ? `<span class="chat-unread">${chat.unread}</span>` : '';
                const initial = (chat.title || '?').charAt(0).toUpperCase();
                
                // Get icon based on type
                let typeIcon = '';
                if (chat.type === 'bot') typeIcon = '🤖';
                else if (chat.type === 'group') typeIcon = '👥';
                else if (chat.type === 'channel') typeIcon = '📢';
                else typeIcon = '👤';
                
                html += `
                    <div class="chat-item ${isActive ? 'active' : ''}" onclick="selectChat('${chat.id}', '${escapeHtml(chat.title)}')">
                        <div class="chat-avatar ${chat.type}">
                            ${initial}
                        </div>
                        <div class="chat-info">
                            <div class="chat-title-row">
                                <span class="chat-title">${escapeHtml(chat.title)} ${typeIcon}</span>
                                <span class="chat-time">${escapeHtml(time)}</span>
                            </div>
                            <div class="chat-last-msg">
                                <span class="chat-last-text">${escapeHtml(lastMsg)}</span>
                                ${unread}
                            </div>
                        </div>
                    </div>
                `;
            });
            
            chatsList.innerHTML = html;
        }

        // Select chat
        window.selectChat = (id, title) => {
            currentChat = { id, title };
            
            const chat = chats.find(c => c.id === id);
            
            // Update header
            chatTitle.textContent = title;
            
            let typeText = 'User';
            if (chat?.type === 'bot') typeText = 'Bot';
            else if (chat?.type === 'group') typeText = 'Group';
            else if (chat?.type === 'channel') typeText = 'Channel';
            
            chatType.textContent = typeText;
            chatAvatar.textContent = title.charAt(0).toUpperCase();
            
            messagesHeader.style.display = 'flex';
            composeArea.style.display = 'flex';
            messageInput.disabled = false;
            sendBtn.disabled = false;
            
            displayMessages(id);
            displayChats();
            
            // Mobile view
            if (window.innerWidth <= 768) {
                document.getElementById('chatsSidebar').style.display = 'none';
                messagesPanel.classList.add('show');
            }
        };

        window.showChats = () => {
            document.getElementById('chatsSidebar').style.display = 'block';
            messagesPanel.classList.remove('show');
        };

        // Display messages
        function displayMessages(chatId) {
            const chatMessages = messages
                .filter(m => m.chatId === chatId)
                .sort((a, b) => a.date - b.date);
            
            if (!chatMessages.length) {
                messagesList.innerHTML = '<div class="empty-state">No messages yet</div>';
                return;
            }
            
            let html = '';
            
            chatMessages.forEach(msg => {
                const time = formatTime(msg.date);
                const isOutgoing = msg.out ? 'outgoing' : 'incoming';
                
                let content = '';
                
                if (msg.mediaType) {
                    // Media message
                    const mediaMap = {
                        'photo': '📷 Photo',
                        'video': '🎥 Video',
                        'audio': '🎵 Audio',
                        'document': '📎 Document',
                        'link': '🔗 Link'
                    };
                    content = `<div>${mediaMap[msg.mediaType] || '📎 Media'}</div>`;
                    if (msg.text && msg.text.length < 50) {
                        content += `<div style="margin-top:5px;">${escapeHtml(msg.text)}</div>`;
                    }
                } else if (msg.text) {
                    // Text message
                    if (msg.text.length === 1 && isEmoji(msg.text)) {
                        content = `<div class="emoji-message">${escapeHtml(msg.text)}</div>`;
                    } else {
                        content = `<div>${escapeHtml(msg.text)}</div>`;
                    }
                } else {
                    content = '<div>📎 Media</div>';
                }
                
                html += `
                    <div class="message ${isOutgoing}">
                        <div class="message-bubble">
                            ${content}
                            <div class="message-meta">
                                <span>${escapeHtml(time)}</span>
                                ${msg.out ? '✓✓' : ''}
                            </div>
                        </div>
                    </div>
                `;
            });
            
            messagesList.innerHTML = html;
            messagesList.scrollTop = messagesList.scrollHeight;
        }

        function isEmoji(str) {
            const emojiRegex = /[\u{1F600}-\u{1F64F}|\u{1F300}-\u{1F5FF}|\u{1F680}-\u{1F6FF}|\u{1F700}-\u{1F77F}|\u{1F780}-\u{1F7FF}|\u{1F800}-\u{1F8FF}|\u{1F900}-\u{1F9FF}|\u{1FA00}-\u{1FA6F}|\u{1FA70}-\u{1FAFF}|\u{2600}-\u{26FF}|\u{2700}-\u{27BF}]/u;
            return emojiRegex.test(str);
        }

        // Send message
        window.sendMessage = async () => {
            const text = messageInput.value.trim();
            
            if (!text || !currentAccount || !currentChat) return;
            
            messageInput.value = '';
            messageInput.disabled = true;
            sendBtn.disabled = true;
            
            try {
                const res = await fetch('/api/send-message', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        accountId: currentAccount.id,
                        chatId: currentChat.id,
                        message: text
                    })
                });
                
                const data = await res.json();
                
                if (data.success) {
                    // Add to local messages
                    messages.push({
                        chatId: currentChat.id,
                        text: text,
                        date: Date.now() / 1000,
                        out: true,
                        id: Date.now()
                    });
                    
                    displayMessages(currentChat.id);
                    showToast('Message sent');
                } else {
                    showError('Failed to send');
                    messageInput.value = text;
                }
            } catch (err) {
                console.error('Error:', err);
                showError('Error sending message');
                messageInput.value = text;
            } finally {
                messageInput.disabled = false;
                sendBtn.disabled = false;
                messageInput.focus();
            }
        };

        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                sendMessage();
            }
        });

        // Refresh
        window.refreshMessages = () => {
            if (currentChat) {
                loadChats(false);
                showToast('Refreshed');
            }
        };

        refreshBtn.addEventListener('click', () => {
            if (currentAccount) {
                loadChats(true);
                showToast('Refreshing...');
            }
        });

        // Remove account
        function showRemoveModal() {
            if (!currentAccount) return;
            if (confirm(`Remove account "${currentAccount.name}"?`)) {
                removeAccount();
            }
        }

        async function removeAccount() {
            try {
                const res = await fetch('/api/remove-account', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ accountId: currentAccount.id })
                });
                
                const data = await res.json();
                
                if (data.success) {
                    showToast('Account removed');
                    await loadAccounts();
                } else {
                    showError('Failed to remove');
                }
            } catch (err) {
                console.error('Error:', err);
                showError('Error removing account');
            }
        }

        // Modal
        window.showModal = (src) => {
            document.getElementById('modalContent').innerHTML = `<img src="${src}" class="modal-image">`;
            document.getElementById('mediaModal').classList.add('show');
        };

        window.hideModal = () => {
            document.getElementById('mediaModal').classList.remove('show');
        };

        // Escape HTML
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Auto refresh
        setInterval(() => {
            if (currentAccount) {
                loadChats(false);
            }
        }, 30000);

        // Load on start
        window.addEventListener('load', loadAccounts);
    </script>
</body>
    </html>
