<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Telegram · Multi‑Account</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: #0e1621;
            height: 100vh;
            display: flex;
            flex-direction: column;
            color: #fff;
            overflow: hidden;
        }

        /* ----- Header with account switcher ----- */
        .app-header {
            background: #17212b;
            padding: 8px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #2b3945;
            flex-shrink: 0;
            z-index: 10;
        }

        .account-switcher {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            padding: 6px 12px;
            border-radius: 30px;
            transition: background 0.2s;
            position: relative;
        }

        .account-switcher:hover {
            background: #242f3d;
        }

        .current-avatar {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: linear-gradient(145deg, #2b5278, #4c9ce0);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            font-weight: 600;
            color: white;
        }

        .current-info {
            display: flex;
            flex-direction: column;
        }

        .current-name {
            font-size: 1rem;
            font-weight: 600;
            color: #fff;
        }

        .current-phone {
            font-size: 0.75rem;
            color: #8e9fad;
        }

        .dropdown-icon {
            color: #8e9fad;
            font-size: 1.2rem;
            margin-left: 8px;
        }

        /* Dropdown menu */
        .account-dropdown {
            position: absolute;
            top: 60px;
            left: 16px;
            background: #17212b;
            border: 1px solid #2b3945;
            border-radius: 12px;
            width: 260px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
            display: none;
            z-index: 100;
        }

        .account-dropdown.show {
            display: block;
        }

        .dropdown-item {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            gap: 12px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .dropdown-item:hover {
            background: #242f3d;
        }

        .dropdown-item:first-child {
            border-top-left-radius: 12px;
            border-top-right-radius: 12px;
        }

        .dropdown-item:last-child {
            border-bottom-left-radius: 12px;
            border-bottom-right-radius: 12px;
        }

        .dropdown-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #2b5278;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            color: white;
            flex-shrink: 0;
        }

        .dropdown-info {
            flex: 1;
            min-width: 0;
        }

        .dropdown-name {
            font-weight: 600;
            font-size: 0.95rem;
            color: #fff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .dropdown-phone {
            font-size: 0.7rem;
            color: #8e9fad;
        }

        .header-actions {
            display: flex;
            gap: 8px;
        }

        .header-actions a {
            background: #2b3945;
            color: #6ab2f2;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 0.9rem;
            font-weight: 500;
            transition: 0.2s;
            white-space: nowrap;
        }

        .header-actions a:hover {
            background: #3a4a5a;
        }

        /* ----- Main layout (two columns) ----- */
        .main-layout {
            display: flex;
            flex: 1;
            overflow: hidden;
            min-height: 0;  /* critical for flex children to scroll */
        }

        /* Chats sidebar */
        .chats-panel {
            width: 360px;
            background: #17212b;
            border-right: 1px solid #2b3945;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        .chats-panel-header {
            padding: 16px;
            border-bottom: 1px solid #2b3945;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chats-panel-header h3 {
            color: #8e9fad;
            font-weight: 500;
            font-size: 0.95rem;
            letter-spacing: 0.5px;
        }

        .chats-panel-header .badge {
            background: #2b5278;
            color: white;
            padding: 4px 8px;
            border-radius: 20px;
            font-size: 0.75rem;
        }

        .chats-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }

        .chat-item {
            display: flex;
            align-items: center;
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            transition: background 0.2s;
            margin-bottom: 4px;
        }

        .chat-item:hover {
            background: #242f3d;
        }

        .chat-item.active {
            background: #2b5278;
        }

        .chat-avatar {
            width: 54px;
            height: 54px;
            border-radius: 50%;
            background: linear-gradient(145deg, #2b5278, #4c9ce0);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: 600;
            color: white;
            margin-right: 12px;
            flex-shrink: 0;
        }

        .chat-info {
            flex: 1;
            min-width: 0;
        }

        .chat-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
        }

        .chat-name {
            font-weight: 600;
            font-size: 1rem;
            color: #fff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 180px;
        }

        .chat-time {
            font-size: 0.75rem;
            color: #8e9fad;
            flex-shrink: 0;
            margin-left: 8px;
        }

        .chat-last-msg {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-last-text {
            font-size: 0.85rem;
            color: #8e9fad;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 200px;
        }

        .chat-unread {
            background: #4c9ce0;
            color: white;
            font-size: 0.7rem;
            font-weight: 600;
            padding: 2px 6px;
            border-radius: 12px;
            min-width: 20px;
            text-align: center;
            margin-left: 8px;
        }

        /* Messages panel */
        .messages-panel {
            flex: 1;
            background: #0e1621;
            display: flex;
            flex-direction: column;
            min-width: 0; /* prevents overflow */
        }

        .messages-header {
            background: #17212b;
            padding: 16px 20px;
            border-bottom: 1px solid #2b3945;
            flex-shrink: 0;
        }

        .messages-header h2 {
            font-size: 1.2rem;
            font-weight: 500;
            color: #fff;
        }

        .messages-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message-wrapper {
            display: flex;
            flex-direction: column;
        }

        .message-wrapper.outgoing {
            align-items: flex-end;
        }

        .message-bubble {
            max-width: 75%;
            padding: 12px 16px;
            border-radius: 20px;
            word-wrap: break-word;
            line-height: 1.5;
            font-size: 0.95rem;
            position: relative;
        }

        .incoming .message-bubble {
            background: #17212b;
            color: #fff;
            border-bottom-left-radius: 4px;
        }

        .outgoing .message-bubble {
            background: #2b5278;
            color: #fff;
            border-bottom-right-radius: 4px;
        }

        .message-meta {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 4px;
            margin-top: 4px;
            font-size: 0.7rem;
            color: #8e9fad;
            padding-right: 4px;
        }

        .outgoing .message-meta {
            color: #a0c0e0;
        }

        .compose-area {
            background: #17212b;
            padding: 16px 20px;
            border-top: 1px solid #2b3945;
            display: flex;
            gap: 12px;
            align-items: center;
            flex-shrink: 0;  /* ensures it stays at bottom */
        }

        .compose-input {
            flex: 1;
            background: #242f3d;
            border: none;
            border-radius: 30px;
            padding: 14px 18px;
            color: #fff;
            font-size: 1rem;
            outline: none;
        }

        .compose-input::placeholder {
            color: #8e9fad;
        }

        .send-btn {
            background: #4c9ce0;
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.2s;
            color: white;
            font-size: 1.3rem;
        }

        .send-btn:hover {
            background: #6ab2f2;
        }

        .loading, .empty-state {
            text-align: center;
            padding: 40px;
            color: #8e9fad;
            font-size: 1rem;
        }

        /* Responsive */
        @media (max-width: 700px) {
            .chats-panel {
                width: 280px;
            }
        }

        @media (max-width: 550px) {
            .main-layout {
                flex-direction: column;
            }
            .chats-panel {
                width: 100%;
                height: 40%;
                border-right: none;
                border-bottom: 1px solid #2b3945;
            }
            .messages-panel {
                height: 60%;
            }
        }
    </style>
</head>
<body>
    <div class="app-header">
        <!-- Account switcher (clickable) -->
        <div class="account-switcher" id="accountSwitcher" onclick="toggleDropdown(event)">
            <div class="current-avatar" id="currentAvatar">?</div>
            <div class="current-info">
                <span class="current-name" id="currentName">Loading...</span>
                <span class="current-phone" id="currentPhone"></span>
            </div>
            <span class="dropdown-icon">▼</span>
        </div>

        <!-- Dropdown menu (hidden by default) -->
        <div class="account-dropdown" id="accountDropdown"></div>

        <div class="header-actions">
            <a href="/">➕ Add</a>
        </div>
    </div>

    <div class="main-layout">
        <!-- Chats Panel -->
        <div class="chats-panel">
            <div class="chats-panel-header">
                <h3>CHATS</h3>
                <span class="badge" id="totalChats">0</span>
            </div>
            <div class="chats-scroll" id="chatsList">
                <div class="loading">Loading chats...</div>
            </div>
        </div>

        <!-- Messages Panel -->
        <div class="messages-panel">
            <div class="messages-header" id="messagesHeader" style="display: none;">
                <h2 id="currentChatTitle"></h2>
            </div>
            <div class="messages-scroll" id="messagesList">
                <div class="empty-state">👈 Select a chat to start messaging</div>
            </div>
            <div class="compose-area" id="composeArea" style="display: none;">
                <input type="text" class="compose-input" id="messageInput" placeholder="Type a message..." onkeypress="if(event.key==='Enter') sendMessage()">
                <button class="send-btn" onclick="sendMessage()">📤</button>
            </div>
        </div>
    </div>

    <script>
        // ---------- State ----------
        let accounts = [];
        let currentAccount = null;
        let currentChat = null;
        let chats = [];
        let messages = [];

        // ---------- DOM elements ----------
        const dropdown = document.getElementById('accountDropdown');
        const switcher = document.getElementById('accountSwitcher');
        const currentAvatar = document.getElementById('currentAvatar');
        const currentName = document.getElementById('currentName');
        const currentPhone = document.getElementById('currentPhone');
        const chatsListDiv = document.getElementById('chatsList');
        const messagesHeader = document.getElementById('messagesHeader');
        const currentChatTitle = document.getElementById('currentChatTitle');
        const messagesListDiv = document.getElementById('messagesList');
        const composeArea = document.getElementById('composeArea');
        const messageInput = document.getElementById('messageInput');
        const totalChatsSpan = document.getElementById('totalChats');

        // ---------- Helper: close dropdown when clicking outside ----------
        document.addEventListener('click', function(event) {
            if (!switcher.contains(event.target) && !dropdown.contains(event.target)) {
                dropdown.classList.remove('show');
            }
        });

        function toggleDropdown(event) {
            event.stopPropagation();
            dropdown.classList.toggle('show');
        }

        // ---------- Load all accounts on startup ----------
        window.addEventListener('load', async () => {
            await fetchAccounts();
        });

        async function fetchAccounts() {
            try {
                const res = await fetch('/api/accounts');
                const data = await res.json();
                if (data.success && data.accounts.length > 0) {
                    accounts = data.accounts;
                    // Default to the first account
                    currentAccount = accounts[0];
                    updateHeaderForCurrentAccount();
                    renderDropdown();
                    await loadChatsForCurrentAccount();
                } else {
                    chatsListDiv.innerHTML = '<div class="empty-state">No accounts. <a href="/" style="color:#6ab2f2;">Add one</a>.</div>';
                }
            } catch (err) {
                console.error(err);
                chatsListDiv.innerHTML = '<div class="empty-state">Failed to load accounts</div>';
            }
        }

        function updateHeaderForCurrentAccount() {
            if (!currentAccount) return;
            const name = currentAccount.name || 'User';
            const phone = currentAccount.phone || '';
            const initial = name.charAt(0).toUpperCase();
            currentAvatar.textContent = initial;
            currentName.textContent = name;
            currentPhone.textContent = phone;
        }

        function renderDropdown() {
            if (!accounts.length) return;
            let html = '';
            accounts.forEach(acc => {
                const accName = acc.name || 'User';
                const accPhone = acc.phone || '';
                const initial = accName.charAt(0).toUpperCase();
                const isCurrent = acc.id === currentAccount?.id ? '✓' : '';
                html += `
                    <div class="dropdown-item" onclick="switchAccount('${acc.id}')">
                        <div class="dropdown-avatar">${initial}</div>
                        <div class="dropdown-info">
                            <div class="dropdown-name">${escapeHtml(accName)}</div>
                            <div class="dropdown-phone">${escapeHtml(accPhone)}</div>
                        </div>
                        <span style="color:#6ab2f2;">${isCurrent}</span>
                    </div>
                `;
            });
            dropdown.innerHTML = html;
        }

        // Switch to another account
        window.switchAccount = async function(accountId) {
            accountId = parseInt(accountId);
            const newAccount = accounts.find(a => a.id === accountId);
            if (!newAccount || newAccount.id === currentAccount?.id) {
                dropdown.classList.remove('show');
                return;
            }
            currentAccount = newAccount;
            updateHeaderForCurrentAccount();
            renderDropdown();
            dropdown.classList.remove('show');
            // Reset chat selection
            currentChat = null;
            messagesHeader.style.display = 'none';
            composeArea.style.display = 'none';
            messagesListDiv.innerHTML = '<div class="empty-state">👈 Select a chat</div>';
            await loadChatsForCurrentAccount();
        };

        async function loadChatsForCurrentAccount() {
            if (!currentAccount) return;
            chatsListDiv.innerHTML = '<div class="loading">Loading chats...</div>';
            try {
                const res = await fetch('/api/get-messages', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ accountId: currentAccount.id })
                });
                const data = await res.json();
                if (data.success) {
                    chats = data.chats || [];
                    messages = data.messages || [];
                    totalChatsSpan.textContent = chats.length;
                    displayChats();
                } else {
                    chatsListDiv.innerHTML = '<div class="empty-state">Error loading chats</div>';
                }
            } catch (err) {
                console.error(err);
                chatsListDiv.innerHTML = '<div class="empty-state">Failed to load chats</div>';
            }
        }

        function displayChats() {
            if (!chats.length) {
                chatsListDiv.innerHTML = '<div class="empty-state">No chats found</div>';
                return;
            }
            let html = '';
            chats.forEach(chat => {
                const activeClass = (currentChat && currentChat.id === chat.id) ? 'active' : '';
                const lastMsg = chat.lastMessage || '';
                const time = chat.lastMessageDate ? formatTime(chat.lastMessageDate) : '';
                const unread = chat.unread ? `<span class="chat-unread">${chat.unread}</span>` : '';
                const avatarLetter = chat.title ? chat.title.charAt(0).toUpperCase() : '?';
                html += `
                    <div class="chat-item ${activeClass}" onclick="selectChat('${chat.id}', '${escapeJsString(chat.title)}')">
                        <div class="chat-avatar">${avatarLetter}</div>
                        <div class="chat-info">
                            <div class="chat-row">
                                <span class="chat-name" title="${escapeHtml(chat.title)}">${escapeHtml(chat.title)}</span>
                                <span class="chat-time">${time}</span>
                            </div>
                            <div class="chat-last-msg">
                                <span class="chat-last-text">${escapeHtml(lastMsg)}</span>
                                ${unread}
                            </div>
                        </div>
                    </div>
                `;
            });
            chatsListDiv.innerHTML = html;
        }

        window.selectChat = function(chatId, chatTitle) {
            currentChat = { id: chatId, title: chatTitle };
            currentChatTitle.textContent = chatTitle;
            messagesHeader.style.display = 'block';
            composeArea.style.display = 'flex';
            displayMessages(chatId);
            // Re-render chats to highlight active one
            displayChats();
        };

        function displayMessages(chatId) {
            const chatMessages = messages
                .filter(m => m.chatId === chatId)
                .sort((a, b) => a.date - b.date); // oldest first
            if (!chatMessages.length) {
                messagesListDiv.innerHTML = '<div class="empty-state">No messages in this chat</div>';
                return;
            }
            let html = '';
            chatMessages.forEach(msg => {
                const date = new Date(msg.date * 1000);
                const timeStr = date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                const bubbleClass = msg.out ? 'outgoing' : 'incoming';
                html += `
                    <div class="message-wrapper ${bubbleClass}">
                        <div class="message-bubble">
                            <div>${escapeHtml(msg.text)}</div>
                            <div class="message-meta">
                                <span>${timeStr}</span>
                                ${msg.out ? '✓✓' : ''}
                            </div>
                        </div>
                    </div>
                `;
            });
            messagesListDiv.innerHTML = html;
            // scroll to bottom
            messagesListDiv.scrollTop = messagesListDiv.scrollHeight;
        }

        window.sendMessage = async function() {
            const message = messageInput.value.trim();
            if (!message || !currentAccount || !currentChat) return;
            messageInput.value = '';
            try {
                await fetch('/api/send-message', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        accountId: currentAccount.id,
                        chatId: currentChat.id,
                        message: message
                    })
                });
                // optimistic update
                const newMsg = {
                    chatId: currentChat.id,
                    text: message,
                    date: Date.now() / 1000,
                    out: true
                };
                messages.push(newMsg);
                displayMessages(currentChat.id);
            } catch (err) {
                console.error(err);
            }
        };

        // Helper: format timestamp
        function formatTime(timestamp) {
            if (!timestamp) return '';
            const d = new Date(timestamp * 1000);
            const now = new Date();
            if (d.toDateString() === now.toDateString()) {
                return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            }
            return d.toLocaleDateString([], { month: 'short', day: 'numeric' });
        }

        // Escape helpers
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function escapeJsString(str) {
            return str.replace(/'/g, "\\'").replace(/"/g, '&quot;');
        }
    </script>
</body>
</html>
