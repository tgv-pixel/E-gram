<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        
        body {
            background: #0e1621;
            color: white;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        /* Header */
        .header {
            background: #17212b;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #2b3945;
        }
        
        .account-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #2b5278;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: bold;
        }
        
        .account-details {
            display: flex;
            flex-direction: column;
        }
        
        .account-name {
            font-weight: 600;
        }
        
        .account-phone {
            font-size: 12px;
            color: #8e9fad;
        }
        
        .header-actions {
            display: flex;
            gap: 10px;
        }
        
        .header-actions button, .header-actions a {
            background: #2b3945;
            color: #6ab2f2;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            text-decoration: none;
            font-size: 14px;
        }
        
        .refresh-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        /* Main layout */
        .main {
            display: flex;
            flex: 1;
            overflow: hidden;
        }
        
        /* Chats sidebar */
        .chats-sidebar {
            width: 350px;
            background: #17212b;
            border-right: 1px solid #2b3945;
            display: flex;
            flex-direction: column;
        }
        
        .chats-header {
            padding: 15px;
            border-bottom: 1px solid #2b3945;
            display: flex;
            justify-content: space-between;
        }
        
        .chats-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }
        
        .chat-item {
            display: flex;
            align-items: center;
            padding: 10px;
            border-radius: 10px;
            cursor: pointer;
            margin-bottom: 5px;
            transition: background 0.2s;
        }
        
        .chat-item:hover {
            background: #242f3d;
        }
        
        .chat-item.active {
            background: #2b5278;
        }
        
        .chat-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #2b5278;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            margin-right: 10px;
            flex-shrink: 0;
        }
        
        .chat-info {
            flex: 1;
            min-width: 0;
        }
        
        .chat-name {
            font-weight: 600;
            margin-bottom: 3px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .chat-last {
            font-size: 13px;
            color: #8e9fad;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .chat-time {
            font-size: 11px;
            color: #8e9fad;
            margin-left: 5px;
        }
        
        /* Messages panel */
        .messages-panel {
            flex: 1;
            background: #0e1621;
            display: flex;
            flex-direction: column;
        }
        
        .messages-header {
            background: #17212b;
            padding: 15px 20px;
            border-bottom: 1px solid #2b3945;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .message {
            max-width: 70%;
            padding: 8px 12px;
            border-radius: 15px;
            word-wrap: break-word;
        }
        
        .message.incoming {
            background: #17212b;
            align-self: flex-start;
        }
        
        .message.outgoing {
            background: #2b5278;
            align-self: flex-end;
        }
        
        .message-time {
            font-size: 10px;
            color: #8e9fad;
            margin-top: 3px;
            text-align: right;
        }
        
        /* Compose area */
        .compose-area {
            background: #17212b;
            padding: 15px 20px;
            border-top: 1px solid #2b3945;
            display: flex;
            gap: 10px;
        }
        
        .compose-input {
            flex: 1;
            background: #242f3d;
            border: none;
            border-radius: 25px;
            padding: 12px 18px;
            color: white;
            outline: none;
        }
        
        .send-btn {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: #2b5278;
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
        }
        
        /* Loading and empty states */
        .loading, .empty-state {
            text-align: center;
            padding: 40px;
            color: #8e9fad;
        }
        
        .error {
            color: #ff6b6b;
            text-align: center;
            padding: 20px;
        }
        
        /* Account switcher */
        .account-switcher {
            position: relative;
        }
        
        .account-dropdown {
            position: absolute;
            top: 50px;
            left: 0;
            background: #17212b;
            border: 1px solid #2b3945;
            border-radius: 10px;
            width: 300px;
            display: none;
            z-index: 100;
        }
        
        .account-dropdown.show {
            display: block;
        }
        
        .dropdown-item {
            display: flex;
            align-items: center;
            padding: 12px;
            gap: 10px;
            cursor: pointer;
        }
        
        .dropdown-item:hover {
            background: #242f3d;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="account-info" id="accountSwitcher">
            <div class="avatar" id="currentAvatar">?</div>
            <div class="account-details">
                <span class="account-name" id="currentName">Loading...</span>
                <span class="account-phone" id="currentPhone"></span>
            </div>
            <span style="color: #8e9fad; margin-left: 5px;">▼</span>
        </div>
        
        <div class="account-dropdown" id="accountDropdown"></div>
        
        <div class="header-actions">
            <button class="refresh-btn" id="refreshBtn">↻</button>
            <a href="/login">+ Add Account</a>
        </div>
    </div>
    
    <div class="main">
        <!-- Chats Sidebar -->
        <div class="chats-sidebar">
            <div class="chats-header">
                <h3>CHATS</h3>
                <span id="totalChats">0</span>
            </div>
            <div class="chats-list" id="chatsList">
                <div class="loading">Loading chats...</div>
            </div>
        </div>
        
        <!-- Messages Panel -->
        <div class="messages-panel">
            <div class="messages-header" id="messagesHeader" style="display: none;">
                <div class="avatar" id="chatAvatar">?</div>
                <div>
                    <div id="chatTitle"></div>
                    <div style="font-size: 12px; color: #8e9fad;" id="chatType"></div>
                </div>
            </div>
            
            <div class="messages-container" id="messagesList">
                <div class="empty-state">👈 Select a chat to start messaging</div>
            </div>
            
            <div class="compose-area" id="composeArea" style="display: none;">
                <input type="text" class="compose-input" id="messageInput" placeholder="Type a message...">
                <button class="send-btn" id="sendBtn">➤</button>
            </div>
        </div>
    </div>
    
    <script>
        // State
        let accounts = [];
        let currentAccount = null;
        let currentChat = null;
        let chats = [];
        let messages = [];
        
        // DOM elements
        const dropdown = document.getElementById('accountDropdown');
        const switcher = document.getElementById('accountSwitcher');
        const currentAvatar = document.getElementById('currentAvatar');
        const currentName = document.getElementById('currentName');
        const currentPhone = document.getElementById('currentPhone');
        const chatsList = document.getElementById('chatsList');
        const messagesList = document.getElementById('messagesList');
        const messagesHeader = document.getElementById('messagesHeader');
        const chatAvatar = document.getElementById('chatAvatar');
        const chatTitle = document.getElementById('chatTitle');
        const chatType = document.getElementById('chatType');
        const composeArea = document.getElementById('composeArea');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const totalChats = document.getElementById('totalChats');
        const refreshBtn = document.getElementById('refreshBtn');
        
        // Toggle dropdown
        switcher.addEventListener('click', (e) => {
            e.stopPropagation();
            dropdown.classList.toggle('show');
        });
        
        document.addEventListener('click', () => {
            dropdown.classList.remove('show');
        });
        
        // Load accounts on page load
        window.addEventListener('load', async () => {
            await loadAccounts();
            // Auto refresh every 30 seconds
            setInterval(() => {
                if (currentAccount) loadChats();
            }, 30000);
        });
        
        // Load accounts
        async function loadAccounts() {
            try {
                const res = await fetch('/api/accounts');
                const data = await res.json();
                
                if (data.success) {
                    accounts = data.accounts || [];
                    
                    if (accounts.length > 0) {
                        currentAccount = accounts[0];
                        updateHeader();
                        renderDropdown();
                        await loadChats();
                    } else {
                        showNoAccounts();
                    }
                }
            } catch (err) {
                console.error(err);
                chatsList.innerHTML = '<div class="error">Failed to load accounts</div>';
            }
        }
        
        function updateHeader() {
            if (!currentAccount) return;
            
            const name = currentAccount.name || 'User';
            const phone = currentAccount.phone || '';
            const initial = name.charAt(0).toUpperCase();
            
            currentAvatar.textContent = initial;
            currentName.textContent = name;
            currentPhone.textContent = phone;
        }
        
        function renderDropdown() {
            let html = '';
            accounts.forEach(acc => {
                const name = acc.name || 'User';
                const phone = acc.phone || '';
                const initial = name.charAt(0).toUpperCase();
                const isCurrent = acc.id === currentAccount?.id ? '✓' : '';
                
                html += `
                    <div class="dropdown-item" onclick="switchAccount(${acc.id})">
                        <div class="avatar" style="width: 35px; height: 35px;">${initial}</div>
                        <div>
                            <div>${name}</div>
                            <div style="font-size: 12px; color: #8e9fad;">${phone}</div>
                        </div>
                        <span style="margin-left: auto; color: #6ab2f2;">${isCurrent}</span>
                    </div>
                `;
            });
            dropdown.innerHTML = html;
        }
        
        window.switchAccount = async function(accountId) {
            const newAccount = accounts.find(a => a.id === accountId);
            if (!newAccount || newAccount.id === currentAccount?.id) return;
            
            currentAccount = newAccount;
            currentChat = null;
            
            updateHeader();
            renderDropdown();
            dropdown.classList.remove('show');
            
            messagesHeader.style.display = 'none';
            composeArea.style.display = 'none';
            messagesList.innerHTML = '<div class="empty-state">👈 Select a chat</div>';
            
            await loadChats();
        };
        
        async function loadChats() {
            if (!currentAccount) return;
            
            chatsList.innerHTML = '<div class="loading">Loading chats...</div>';
            
            try {
                const res = await fetch('/api/get-messages', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ accountId: currentAccount.id })
                });
                
                const data = await res.json();
                
                if (data.success) {
                    chats = data.chats || [];
                    messages = data.messages || [];
                    totalChats.textContent = chats.length;
                    displayChats();
                } else {
                    chatsList.innerHTML = `<div class="error">Error: ${data.error || 'Failed to load chats'}</div>`;
                }
            } catch (err) {
                console.error(err);
                chatsList.innerHTML = '<div class="error">Failed to load chats</div>';
            }
        }
        
        function displayChats() {
            if (!chats.length) {
                chatsList.innerHTML = '<div class="empty-state">No chats found</div>';
                return;
            }
            
            let html = '';
            chats.forEach(chat => {
                const active = currentChat && currentChat.id === chat.id ? 'active' : '';
                const lastMsg = chat.lastMessage || 'No messages';
                const initial = (chat.title || '?').charAt(0).toUpperCase();
                
                html += `
                    <div class="chat-item ${active}" onclick="selectChat('${chat.id}', '${chat.title}')">
                        <div class="chat-avatar">${initial}</div>
                        <div class="chat-info">
                            <div class="chat-name">${chat.title || 'Unknown'}</div>
                            <div class="chat-last">${lastMsg}</div>
                        </div>
                    </div>
                `;
            });
            
            chatsList.innerHTML = html;
        }
        
        window.selectChat = function(chatId, title) {
            currentChat = { id: chatId, title: title };
            
            chatTitle.textContent = title;
            chatAvatar.textContent = title.charAt(0).toUpperCase();
            
            messagesHeader.style.display = 'flex';
            composeArea.style.display = 'flex';
            displayMessages(chatId);
            displayChats(); // Update active state
        };
        
        function displayMessages(chatId) {
            const chatMessages = messages
                .filter(m => m.chatId === chatId)
                .sort((a, b) => a.date - b.date);
            
            if (!chatMessages.length) {
                messagesList.innerHTML = '<div class="empty-state">No messages</div>';
                return;
            }
            
            let html = '';
            chatMessages.forEach(msg => {
                const time = new Date(msg.date * 1000).toLocaleTimeString();
                const type = msg.out ? 'outgoing' : 'incoming';
                
                html += `
                    <div class="message ${type}">
                        <div>${msg.text || 'Media message'}</div>
                        <div class="message-time">${time}</div>
                    </div>
                `;
            });
            
            messagesList.innerHTML = html;
            messagesList.scrollTop = messagesList.scrollHeight;
        }
        
        async function sendMessage() {
            const text = messageInput.value.trim();
            if (!text || !currentAccount || !currentChat) return;
            
            messageInput.value = '';
            
            try {
                const res = await fetch('/api/send-message', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        accountId: currentAccount.id,
                        chatId: currentChat.id,
                        message: text
                    })
                });
                
                const data = await res.json();
                
                if (data.success) {
                    // Add message to local list
                    messages.push({
                        chatId: currentChat.id,
                        text: text,
                        date: Date.now() / 1000,
                        out: true,
                        id: Date.now()
                    });
                    displayMessages(currentChat.id);
                }
            } catch (err) {
                console.error(err);
            }
        }
        
        sendBtn.addEventListener('click', sendMessage);
        
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
        
        refreshBtn.addEventListener('click', () => {
            if (currentAccount) loadChats();
        });
        
        function showNoAccounts() {
            currentAvatar.textContent = '?';
            currentName.textContent = 'No Account';
            currentPhone.textContent = '';
            chatsList.innerHTML = '<div class="empty-state">No accounts. <a href="/login" style="color:#6ab2f2;">Add one</a></div>';
            messagesList.innerHTML = '<div class="empty-state">Add an account to start</div>';
        }
    </script>
</body>
    </html>
