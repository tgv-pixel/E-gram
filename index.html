<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup - SAFE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
        }

        .container {
            background: white;
            padding: 35px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 420px;
        }

        .logo {
            text-align: center;
            margin-bottom: 25px;
            font-size: 2.2em;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .tab-container {
            display: flex;
            background: #f5f5f5;
            border-radius: 12px;
            padding: 4px;
            margin-bottom: 25px;
            gap: 4px;
        }

        .tab {
            flex: 1;
            padding: 12px;
            border: none;
            background: transparent;
            color: #666;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            border-radius: 10px;
            transition: all 0.3s ease;
        }

        .tab.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .form-container {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .form-container.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 22px;
            text-align: center;
        }

        .input-group {
            margin-bottom: 16px;
        }

        .input-group label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-size: 13px;
            font-weight: 500;
        }

        .input-group input {
            width: 100%;
            padding: 13px 15px;
            border: 2px solid #e1e5e9;
            border-radius: 12px;
            font-size: 15px;
            transition: all 0.3s ease;
            outline: none;
            background: #fafafa;
        }

        .input-group input:focus {
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        /* Referral Box */
        .referral-box {
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 15px;
            text-align: center;
            font-size: 13px;
            animation: fadeIn 0.3s ease;
        }

        .referral-box.has-ref {
            background: #e8f5e9;
            border: 2px solid #4caf50;
            color: #2e7d32;
        }

        .referral-box.no-ref {
            background: #f8f9fa;
            border: 2px dashed #dee2e6;
            color: #6c757d;
        }

        .referral-box .ref-name {
            font-weight: 700;
            color: #1b5e20;
        }

        .captcha-container {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 18px 0;
            padding: 12px;
            background: #f8f9fa;
            border-radius: 12px;
        }

        .captcha-challenge {
            font-size: 18px;
            font-weight: 700;
            color: #333;
            background: white;
            padding: 10px 18px;
            border-radius: 8px;
            border: 2px dashed #667eea;
            min-width: 90px;
            text-align: center;
            user-select: none;
            letter-spacing: 1px;
        }

        .refresh-captcha {
            background: none;
            border: none;
            color: #667eea;
            cursor: pointer;
            font-size: 22px;
            padding: 8px;
            border-radius: 50%;
            transition: all 0.3s;
        }

        .refresh-captcha:hover {
            background: rgba(102, 126, 234, 0.1);
            transform: rotate(180deg);
        }

        #captcha-input {
            flex: 1;
            min-width: 0;
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none !important;
        }

        .btn .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 2px solid white;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
        }

        .btn.loading .spinner {
            display: inline-block;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .message {
            margin: 12px 0;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            font-weight: 500;
            font-size: 13px;
            display: none;
        }

        .message.show {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
        }

        .link-text {
            text-align: center;
            margin-top: 18px;
            color: #666;
            font-size: 14px;
        }

        .link-text a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
        }

        /* Loading overlay */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .loading-overlay .spinner-big {
            width: 50px;
            height: 50px;
            border: 4px solid #667eea;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @media (max-width: 480px) {
            .container {
                padding: 25px 20px;
            }
            
            .captcha-container {
                flex-wrap: wrap;
            }
        }
    </style>
</head>
<body>
    <!-- Loading overlay (shown while checking auth) -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner-big"></div>
    </div>

    <div class="container" id="mainContainer" style="display: none;">
        <div class="logo">SAFE</div>
        
        <div class="tab-container">
            <button class="tab active" id="signupTab" onclick="switchTab('signup')">Sign Up</button>
            <button class="tab" id="loginTab" onclick="switchTab('login')">Login</button>
        </div>

        <!-- Signup Form -->
        <div id="signup-form" class="form-container active">
            <h2>Create Account</h2>
            <div class="message" id="signupMessage"></div>
            
            <!-- Referral Box -->
            <div class="referral-box no-ref" id="referralBox">
                <i class="fas fa-link"></i> No referral code detected
            </div>
            
            <div class="input-group">
                <label for="fullName">Full Name</label>
                <input type="text" id="fullName" placeholder="Enter your full name" required autocomplete="name">
            </div>
            
            <div class="input-group">
                <label for="signupEmail">Email Address</label>
                <input type="email" id="signupEmail" placeholder="you@example.com" required autocomplete="email">
            </div>
            
            <div class="input-group">
                <label for="signupPassword">Password</label>
                <input type="password" id="signupPassword" placeholder="Min 6 characters" required minlength="6" autocomplete="new-password">
            </div>
            
            <div class="input-group">
                <label for="phone">Phone (Optional)</label>
                <input type="text" id="phone" placeholder="+251..." autocomplete="tel">
            </div>
            
            <input type="hidden" id="referralCodeHidden" value="">
            
            <div class="captcha-container">
                <div class="captcha-challenge" id="captchaChallenge">?</div>
                <button type="button" class="refresh-captcha" onclick="generateCaptcha()" title="Refresh">↻</button>
                <input type="text" id="captchaInput" class="captcha-input" placeholder="Answer" required>
            </div>
            
            <button class="btn" id="signupBtn" onclick="signUp()">
                <span class="spinner"></span> Create Account
            </button>
            
            <div class="link-text">
                Already have an account? <a onclick="switchTab('login')">Login</a>
            </div>
        </div>

        <!-- Login Form -->
        <div id="login-form" class="form-container">
            <h2>Welcome Back</h2>
            <div class="message" id="loginMessage"></div>
            
            <div class="input-group">
                <label for="loginEmail">Email Address</label>
                <input type="email" id="loginEmail" placeholder="you@example.com" required autocomplete="email">
            </div>
            
            <div class="input-group">
                <label for="loginPassword">Password</label>
                <input type="password" id="loginPassword" placeholder="Enter password" required autocomplete="current-password">
            </div>
            
            <button class="btn" id="loginBtn" onclick="login()">
                <span class="spinner"></span> Sign In
            </button>
            
            <div class="link-text">
                Don't have an account? <a onclick="switchTab('signup')">Sign up</a>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js';
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js';
        import { getDatabase, ref, set, push } from 'https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js';
        import { getFirestore, doc, setDoc, getDoc, addDoc, collection, serverTimestamp } from 'https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js';

        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyD4t4GUzN1xkyia0o3zx9i2cX2004Epv7A",
            authDomain: "webapp-fc856.firebaseapp.com",
            projectId: "webapp-fc856",
            storageBucket: "webapp-fc856.appspot.com",
            messagingSenderId: "892830607693",
            appId: "1:892830607693:web:a3a886c142586665fc2f04"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const rtdb = getDatabase(app);
        const firestore = getFirestore(app);

        console.log('✅ Firebase ready');

        // ============================================
        // CHECK AUTH STATE - Redirect if logged in
        // ============================================
        onAuthStateChanged(auth, (user) => {
            const loadingOverlay = document.getElementById('loadingOverlay');
            const mainContainer = document.getElementById('mainContainer');
            
            if (user) {
                // User is already signed in, redirect to /home
                console.log('✅ User already authenticated, redirecting to /home');
                window.location.href = 'home.html';
            } else {
                // No user signed in, show the auth page
                console.log('👤 No authenticated user, showing auth page');
                loadingOverlay.style.display = 'none';
                mainContainer.style.display = 'block';
                
                // Initialize page components
                generateCaptcha();
                checkReferralCode();
            }
        });

        // ============================================
        // GLOBAL VARIABLES
        // ============================================
        let captchaAnswer = 0;
        let referredBy = null;

        // ============================================
        // REFERRAL DETECTION
        // ============================================
        function getReferralFromURL() {
            const params = new URLSearchParams(window.location.search);
            return params.get('ref');
        }

        async function checkReferralCode() {
            const refCode = getReferralFromURL();
            const referralBox = document.getElementById('referralBox');
            const referralCodeHidden = document.getElementById('referralCodeHidden');
            
            if (!refCode) {
                referralBox.className = 'referral-box no-ref';
                referralBox.innerHTML = '<i class="fas fa-link"></i> No referral code. <a onclick="switchTab(\'signup\')">Sign up</a> to get yours!';
                referredBy = null;
                return;
            }

            try {
                const userDoc = await getDoc(doc(firestore, 'users', refCode));
                
                if (userDoc.exists()) {
                    const userData = userDoc.data();
                    referredBy = refCode;
                    referralCodeHidden.value = refCode;
                    
                    referralBox.className = 'referral-box has-ref';
                    referralBox.innerHTML = `
                        🎉 Invited by <span class="ref-name">${userData.firstName || userData.fullName || 'Friend'}</span>!
                        <br><small>You both earn <b>10% Points</b> on your first deposit!</small>`;
                } else {
                    referralBox.className = 'referral-box no-ref';
                    referralBox.innerHTML = '⚠️ Invalid referral link. Continuing without referral.';
                    referredBy = null;
                }
            } catch (error) {
                console.log('Referral check skipped - continuing');
                referredBy = null;
            }
        }

        // ============================================
        // CAPTCHA
        // ============================================
        function generateCaptcha() {
            const num1 = Math.floor(Math.random() * 10) + 1;
            const num2 = Math.floor(Math.random() * 10) + 1;
            const operators = ['+', '-', '*'];
            const operator = operators[Math.floor(Math.random() * operators.length)];
            
            switch(operator) {
                case '+': captchaAnswer = num1 + num2; document.getElementById('captchaChallenge').textContent = `${num1} + ${num2} = ?`; break;
                case '-': captchaAnswer = num1 - num2; document.getElementById('captchaChallenge').textContent = `${num1} - ${num2} = ?`; break;
                case '*': captchaAnswer = num1 * num2; document.getElementById('captchaChallenge').textContent = `${num1} × ${num2} = ?`; break;
            }
        }

        // ============================================
        // TAB SWITCHING
        // ============================================
        function switchTab(tabName) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.form-container').forEach(f => f.classList.remove('active'));
            
            if (tabName === 'signup') {
                document.getElementById('signupTab').classList.add('active');
                document.getElementById('signup-form').classList.add('active');
            } else {
                document.getElementById('loginTab').classList.add('active');
                document.getElementById('login-form').classList.add('active');
            }
        }

        // ============================================
        // MESSAGES
        // ============================================
        function showSignupMessage(msg, type) {
            const el = document.getElementById('signupMessage');
            el.textContent = msg;
            el.className = `message ${type} show`;
            setTimeout(() => el.classList.remove('show'), 4000);
        }

        function showLoginMessage(msg, type) {
            const el = document.getElementById('loginMessage');
            el.textContent = msg;
            el.className = `message ${type} show`;
            setTimeout(() => el.classList.remove('show'), 4000);
        }

        // ============================================
        // GENERATE REFERRAL CODE
        // ============================================
        function generateReferralCode() {
            return Array.from({length: 8}, () => 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789'[Math.floor(Math.random() * 36)]).join('');
        }

        // ============================================
        // SIGN UP - NO EMAIL VERIFICATION
        // ============================================
        async function signUp() {
            const fullName = document.getElementById('fullName').value.trim();
            const email = document.getElementById('signupEmail').value.trim();
            const password = document.getElementById('signupPassword').value;
            const phone = document.getElementById('phone').value.trim();
            const captchaInput = document.getElementById('captchaInput').value;
            const btn = document.getElementById('signupBtn');
            
            // Quick validation
            if (!fullName || fullName.length < 2) {
                return showSignupMessage('Please enter your full name', 'error');
            }
            if (!email || !email.includes('@')) {
                return showSignupMessage('Please enter a valid email', 'error');
            }
            if (password.length < 6) {
                return showSignupMessage('Password must be at least 6 characters', 'error');
            }
            if (parseInt(captchaInput) !== captchaAnswer) {
                showSignupMessage('Wrong captcha answer. Try again.', 'error');
                generateCaptcha();
                document.getElementById('captchaInput').value = '';
                return;
            }

            // Show loading
            btn.disabled = true;
            btn.classList.add('loading');
            btn.innerHTML = '<span class="spinner"></span> Creating...';

            try {
                // Create auth user (no email verification sent)
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;
                const referralCode = generateReferralCode();
                
                const userData = {
                    fullName: fullName,
                    firstName: fullName.split(' ')[0],
                    lastName: fullName.split(' ').slice(1).join(' ') || '',
                    email: email,
                    phone: phone || '',
                    createdAt: serverTimestamp(),
                    status: 'active',
                    referralCode: referralCode,
                    referredBy: referredBy || null,
                    referralCount: 0,
                    referralBonus: 0,
                    totalReferralPoints: 0,
                    depositBalance: 0,
                    taskEarnings: 0,
                    points: 0,
                    lastLogin: null
                };

                // Save to Firestore
                await setDoc(doc(firestore, 'users', user.uid), userData);
                
                // Save to RTDB
                await set(ref(rtdb, 'users/' + user.uid), {
                    email: email,
                    fullName: fullName,
                    referralCode: referralCode,
                    referredBy: referredBy || null,
                    status: 'active',
                    lastLogin: null
                });

                // Handle referral if exists
                if (referredBy) {
                    try {
                        await push(ref(rtdb, 'referral_notifications/' + referredBy), {
                            type: 'new_signup',
                            email: email,
                            fullName: fullName,
                            userId: user.uid,
                            timestamp: Date.now(),
                            read: false,
                            claimed: false
                        });

                        await addDoc(collection(firestore, 'referrals'), {
                            referrerId: referredBy,
                            referredUserId: user.uid,
                            referredEmail: email,
                            referredName: fullName,
                            timestamp: serverTimestamp(),
                            status: 'pending_first_deposit',
                            pointsAwarded: 0,
                            bonusEarned: 0
                        });
                    } catch (refError) {
                        console.log('Referral save skipped');
                    }
                }

                // No email verification - account created and ready immediately
                showSignupMessage('✅ Account created! Redirecting...', 'success');
                
                // Fast redirect
                setTimeout(() => {
                    window.location.href = 'home.html';
                }, 1500);
                
            } catch (error) {
                console.error('Signup error:', error.code);
                let msg = error.message;
                if (error.code === 'auth/email-already-in-use') msg = 'Email already registered. Please login.';
                if (error.code === 'auth/weak-password') msg = 'Password too weak. Use 6+ characters.';
                if (error.code === 'auth/invalid-email') msg = 'Invalid email address.';
                
                showSignupMessage(msg, 'error');
                btn.disabled = false;
                btn.classList.remove('loading');
                btn.innerHTML = '<span class="spinner"></span> Create Account';
            } finally {
                generateCaptcha();
                document.getElementById('captchaInput').value = '';
            }
        }

        // ============================================
        // LOGIN
        // ============================================
        async function login() {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            const btn = document.getElementById('loginBtn');

            if (!email) return showLoginMessage('Please enter your email', 'error');
            if (!password) return showLoginMessage('Please enter your password', 'error');

            btn.disabled = true;
            btn.classList.add('loading');
            btn.innerHTML = '<span class="spinner"></span> Signing in...';

            try {
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                
                // Update last login (non-blocking)
                const uid = userCredential.user.uid;
                setDoc(doc(firestore, 'users', uid), { lastLogin: serverTimestamp() }, { merge: true }).catch(() => {});
                
                showLoginMessage('✅ Login successful!', 'success');
                
                setTimeout(() => {
                    window.location.href = 'home.html';
                }, 800);
                
            } catch (error) {
                console.error('Login error:', error.code);
                let msg = error.message;
                if (error.code === 'auth/user-not-found') msg = 'No account found with this email.';
                if (error.code === 'auth/wrong-password') msg = 'Incorrect password.';
                if (error.code === 'auth/invalid-email') msg = 'Invalid email address.';
                
                showLoginMessage(msg, 'error');
                btn.disabled = false;
                btn.classList.remove('loading');
                btn.innerHTML = '<span class="spinner"></span> Sign In';
            }
        }

        // ============================================
        // MAKE FUNCTIONS GLOBAL
        // ============================================
        window.switchTab = switchTab;
        window.signUp = signUp;
        window.login = login;
        window.generateCaptcha = generateCaptcha;

        console.log('✅ Page ready');
    </script>
</body>
</html>
