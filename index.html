<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup - SAFE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #667eea;
            --primary-dark: #764ba2;
            --success: #2ecc71;
            --warning: #f39c12;
            --danger: #e74c3c;
            --dark: #2c3e50;
            --light: #f8f9fa;
            --gray: #6c757d;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
        }

        .container {
            background: white;
            padding: 35px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 420px;
            animation: fadeInUp 0.5s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            text-align: center;
            margin-bottom: 25px;
            font-size: 2.2em;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .tab-container {
            display: flex;
            background: #f5f5f5;
            border-radius: 12px;
            padding: 4px;
            margin-bottom: 25px;
            gap: 4px;
        }

        .tab {
            flex: 1;
            padding: 12px;
            border: none;
            background: transparent;
            color: #666;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            border-radius: 10px;
            transition: all 0.3s ease;
        }

        .tab.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .form-container {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .form-container.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 22px;
            text-align: center;
        }

        .input-group {
            margin-bottom: 16px;
        }

        .input-group label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-size: 13px;
            font-weight: 500;
        }

        .input-group input {
            width: 100%;
            padding: 13px 15px;
            border: 2px solid #e1e5e9;
            border-radius: 12px;
            font-size: 15px;
            transition: all 0.3s ease;
            outline: none;
            background: #fafafa;
        }

        .input-group input:focus {
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        /* Referral Box */
        .referral-box {
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 15px;
            text-align: center;
            font-size: 14px;
            animation: fadeIn 0.3s ease;
            transition: all 0.3s ease;
        }

        .referral-box.has-ref {
            background: linear-gradient(135deg, #e8f5e9, #c8e6c9);
            border: 2px solid #4caf50;
            color: #1b5e20;
        }

        .referral-box.no-ref {
            background: #f8f9fa;
            border: 2px dashed #dee2e6;
            color: #6c757d;
        }

        .referral-box.invalid-ref {
            background: #fff3e0;
            border: 2px solid #ff9800;
            color: #e65100;
        }

        .referral-box.verifying {
            background: #e3f2fd;
            border: 2px solid #2196f3;
            color: #0d47a1;
        }

        .referral-box .ref-icon {
            font-size: 1.5em;
            display: block;
            margin-bottom: 5px;
        }

        .referral-box .ref-name {
            font-weight: 700;
            font-size: 1.1em;
        }

        .referral-box .ref-bonus-info {
            font-size: 0.85em;
            margin-top: 5px;
            opacity: 0.9;
        }

        .referral-box .ref-bonus-highlight {
            font-weight: 700;
            color: #1b5e20;
            background: rgba(76, 175, 80, 0.15);
            padding: 2px 8px;
            border-radius: 4px;
            display: inline-block;
            margin: 0 3px;
        }

        .captcha-container {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 18px 0;
            padding: 12px;
            background: #f8f9fa;
            border-radius: 12px;
        }

        .captcha-challenge {
            font-size: 18px;
            font-weight: 700;
            color: #333;
            background: white;
            padding: 10px 18px;
            border-radius: 8px;
            border: 2px dashed #667eea;
            min-width: 90px;
            text-align: center;
            user-select: none;
            letter-spacing: 1px;
        }

        .refresh-captcha {
            background: none;
            border: none;
            color: #667eea;
            cursor: pointer;
            font-size: 22px;
            padding: 8px;
            border-radius: 50%;
            transition: all 0.3s;
        }

        .refresh-captcha:hover {
            background: rgba(102, 126, 234, 0.1);
            transform: rotate(180deg);
        }

        #captcha-input {
            flex: 1;
            min-width: 0;
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none !important;
        }

        .btn .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 2px solid white;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        .btn.loading .spinner {
            display: inline-block;
        }

        .btn.loading .btn-text {
            display: none;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .message {
            margin: 12px 0;
            padding: 12px;
            border-radius: 10px;
            text-align: center;
            font-weight: 500;
            font-size: 13px;
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .message.show {
            display: block;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .message.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        .link-text {
            text-align: center;
            margin-top: 18px;
            color: #666;
            font-size: 14px;
        }

        .link-text a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
            transition: color 0.3s;
        }

        .link-text a:hover {
            color: #764ba2;
            text-decoration: underline;
        }

        /* Loading overlay */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            gap: 15px;
        }

        .loading-overlay .spinner-big {
            width: 50px;
            height: 50px;
            border: 4px solid #667eea;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        .loading-overlay .loading-text {
            color: #666;
            font-size: 14px;
        }

        /* Pulse animation for referral box */
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }

        .referral-box.has-ref {
            animation: pulse 2s infinite;
        }

        @media (max-width: 480px) {
            .container {
                padding: 25px 20px;
            }
            
            .captcha-container {
                flex-wrap: wrap;
            }
            
            .referral-box {
                padding: 12px;
                font-size: 13px;
            }
        }
    </style>
</head>
<body>
    <!-- Loading overlay (shown while checking auth) -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner-big"></div>
        <div class="loading-text">Loading...</div>
    </div>

    <div class="container" id="mainContainer" style="display: none;">
        <div class="logo">SAFE</div>
        
        <div class="tab-container">
            <button class="tab active" id="signupTab" onclick="switchTab('signup')">Sign Up</button>
            <button class="tab" id="loginTab" onclick="switchTab('login')">Login</button>
        </div>

        <!-- Signup Form -->
        <div id="signup-form" class="form-container active">
            <h2>Create Account</h2>
            <div class="message" id="signupMessage"></div>
            
            <!-- Referral Box -->
            <div class="referral-box verifying" id="referralBox">
                <span class="ref-icon"><i class="fas fa-spinner fa-spin"></i></span>
                <span>Checking referral link...</span>
            </div>
            
            <div class="input-group">
                <label for="fullName">Full Name</label>
                <input type="text" id="fullName" placeholder="Enter your full name" required autocomplete="name">
            </div>
            
            <div class="input-group">
                <label for="signupEmail">Email Address</label>
                <input type="email" id="signupEmail" placeholder="you@example.com" required autocomplete="email">
            </div>
            
            <div class="input-group">
                <label for="signupPassword">Password</label>
                <input type="password" id="signupPassword" placeholder="Min 6 characters" required minlength="6" autocomplete="new-password">
            </div>
            
            <div class="input-group">
                <label for="phone">Phone (Optional)</label>
                <input type="text" id="phone" placeholder="+251..." autocomplete="tel">
            </div>
            
            <input type="hidden" id="referralCodeHidden" value="">
            <input type="hidden" id="referrerNameHidden" value="">
            
            <div class="captcha-container">
                <div class="captcha-challenge" id="captchaChallenge">?</div>
                <button type="button" class="refresh-captcha" onclick="generateCaptcha()" title="Refresh">
                    <i class="fas fa-sync-alt"></i>
                </button>
                <input type="text" id="captchaInput" class="captcha-input" placeholder="Answer" required>
            </div>
            
            <button class="btn" id="signupBtn" onclick="signUp()">
                <span class="spinner"></span>
                <span class="btn-text">Create Account</span>
            </button>
            
            <div class="link-text">
                Already have an account? <a onclick="switchTab('login')">Login</a>
            </div>
        </div>

        <!-- Login Form -->
        <div id="login-form" class="form-container">
            <h2>Welcome Back</h2>
            <div class="message" id="loginMessage"></div>
            
            <!-- Referral Box for Login (if came from referral link) -->
            <div class="referral-box verifying" id="loginReferralBox" style="display: none;">
                <span class="ref-icon"><i class="fas fa-spinner fa-spin"></i></span>
                <span>Checking referral link...</span>
            </div>
            
            <div class="input-group">
                <label for="loginEmail">Email Address</label>
                <input type="email" id="loginEmail" placeholder="you@example.com" required autocomplete="email">
            </div>
            
            <div class="input-group">
                <label for="loginPassword">Password</label>
                <input type="password" id="loginPassword" placeholder="Enter password" required autocomplete="current-password">
            </div>
            
            <button class="btn" id="loginBtn" onclick="login()">
                <span class="spinner"></span>
                <span class="btn-text">Sign In</span>
            </button>
            
            <div class="link-text">
                Don't have an account? <a onclick="switchTab('signup')">Sign up</a>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js';
        import { 
            getAuth, 
            createUserWithEmailAndPassword, 
            signInWithEmailAndPassword, 
            onAuthStateChanged 
        } from 'https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js';
        import { 
            getDatabase, 
            ref, 
            set, 
            push 
        } from 'https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js';
        import { 
            getFirestore, 
            doc, 
            setDoc, 
            getDoc, 
            getDocs,
            query,
            where,
            collection, 
            serverTimestamp 
        } from 'https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js';

        // Firebase Config - Using the same as your project
        const firebaseConfig = {
            apiKey: "AIzaSyD4t4GUzN1xkyia0o3zx9i2cX2004Epv7A",
            authDomain: "webapp-fc856.firebaseapp.com",
            projectId: "webapp-fc856",
            storageBucket: "webapp-fc856.appspot.com",
            messagingSenderId: "892830607693",
            appId: "1:892830607693:web:a3a886c142586665fc2f04"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const rtdb = getDatabase(app);
        const firestore = getFirestore(app);

        console.log('✅ Firebase ready');

        // ============================================
        // GLOBAL VARIABLES
        // ============================================
        let captchaAnswer = 0;
        let referredBy = null;        // The referrer's user ID
        let referrerName = null;      // The referrer's name
        let referralValid = false;    // Is the referral code valid?
        let referralChecked = false;  // Has the referral been checked?

        // ============================================
        // CHECK AUTH STATE - Redirect if logged in
        // ============================================
        onAuthStateChanged(auth, (user) => {
            const loadingOverlay = document.getElementById('loadingOverlay');
            const mainContainer = document.getElementById('mainContainer');
            
            if (user) {
                // User is already signed in, redirect to /home
                console.log('✅ User already authenticated, redirecting to /home');
                window.location.href = 'home.html';
            } else {
                // No user signed in, show the auth page
                console.log('👤 No authenticated user, showing auth page');
                loadingOverlay.style.display = 'none';
                mainContainer.style.display = 'block';
                
                // Initialize page components
                generateCaptcha();
                
                // Check referral code from URL
                checkReferralCode();
            }
        });

        // ============================================
        // REFERRAL DETECTION - Get referral code from URL
        // ============================================
        function getReferralFromURL() {
            const params = new URLSearchParams(window.location.search);
            return params.get('ref');
        }

        // ============================================
        // CHECK REFERRAL CODE - Validate with Firestore
        // ============================================
        async function checkReferralCode() {
            const refCode = getReferralFromURL();
            const referralBox = document.getElementById('referralBox');
            const referralCodeHidden = document.getElementById('referralCodeHidden');
            const referrerNameHidden = document.getElementById('referrerNameHidden');
            const loginReferralBox = document.getElementById('loginReferralBox');
            
            // If no referral code in URL
            if (!refCode) {
                referralBox.className = 'referral-box no-ref';
                referralBox.innerHTML = `
                    <span class="ref-icon">🔗</span>
                    <span>No referral code detected</span>
                    <div class="ref-bonus-info">Sign up to get your own referral link and earn <span class="ref-bonus-highlight">10% points</span> from referrals!</div>
                `;
                referredBy = null;
                referrerName = null;
                referralValid = false;
                referralChecked = true;
                return;
            }

            // Show verifying state
            referralBox.className = 'referral-box verifying';
            referralBox.innerHTML = `
                <span class="ref-icon"><i class="fas fa-spinner fa-spin"></i></span>
                <span>Verifying referral code...</span>
            `;

            // Also show verifying on login tab if it was hidden
            loginReferralBox.style.display = 'block';
            loginReferralBox.className = 'referral-box verifying';
            loginReferralBox.innerHTML = `
                <span class="ref-icon"><i class="fas fa-spinner fa-spin"></i></span>
                <span>Verifying referral code...</span>
            `;

            try {
                console.log('🔍 Checking referral code:', refCode);
                
                // ============================================
                // METHOD 1: Query by referralCode field
                // ============================================
                const usersRef = collection(firestore, 'users');
                const q = query(usersRef, where('referralCode', '==', refCode));
                const querySnapshot = await getDocs(q);
                
                let foundReferrer = null;
                let foundReferrerId = null;
                
                if (!querySnapshot.empty) {
                    // Found user by referral code
                    const userDoc = querySnapshot.docs[0];
                    foundReferrer = userDoc.data();
                    foundReferrerId = userDoc.id;
                    console.log('✅ Found referrer by referralCode:', foundReferrerId, foundReferrer.firstName || foundReferrer.fullName);
                } else {
                    // ============================================
                    // METHOD 2: Check if refCode is a user ID directly
                    // ============================================
                    console.log('🔍 Trying direct user ID lookup...');
                    const userDocRef = doc(firestore, 'users', refCode);
                    const userDocSnap = await getDoc(userDocRef);
                    
                    if (userDocSnap.exists()) {
                        foundReferrer = userDocSnap.data();
                        foundReferrerId = userDocSnap.id;
                        console.log('✅ Found referrer by user ID:', foundReferrerId, foundReferrer.firstName || foundReferrer.fullName);
                    }
                }
                
                // ============================================
                // UPDATE UI BASED ON RESULT
                // ============================================
                if (foundReferrer && foundReferrerId) {
                    // Valid referral found!
                    referredBy = foundReferrerId;
                    referrerName = foundReferrer.firstName || foundReferrer.fullName || 'Friend';
                    referralValid = true;
                    referralCodeHidden.value = foundReferrerId;
                    referrerNameHidden.value = referrerName;
                    
                    const referrerDisplayName = referrerName.length > 20 ? referrerName.substring(0, 20) + '...' : referrerName;
                    
                    // Update signup referral box
                    referralBox.className = 'referral-box has-ref';
                    referralBox.innerHTML = `
                        <span class="ref-icon">🎉</span>
                        <span>Invited by <span class="ref-name">${referrerDisplayName}</span>!</span>
                        <div class="ref-bonus-info">
                            You'll earn <span class="ref-bonus-highlight">50 welcome points</span> for joining with a referral!
                            <br>Your inviter earns <span class="ref-bonus-highlight">10% points</span> of your first deposit!
                        </div>
                    `;
                    
                    // Update login referral box
                    loginReferralBox.style.display = 'block';
                    loginReferralBox.className = 'referral-box has-ref';
                    loginReferralBox.innerHTML = `
                        <span class="ref-icon">🎉</span>
                        <span>Referred by <span class="ref-name">${referrerDisplayName}</span></span>
                        <div class="ref-bonus-info">Login to continue with this referral!</div>
                    `;
                    
                } else {
                    // Invalid referral code
                    referredBy = null;
                    referrerName = null;
                    referralValid = false;
                    
                    referralBox.className = 'referral-box invalid-ref';
                    referralBox.innerHTML = `
                        <span class="ref-icon">⚠️</span>
                        <span>Invalid referral link</span>
                        <div class="ref-bonus-info">This referral code doesn't match any user. Continuing without referral.</div>
                    `;
                    
                    loginReferralBox.style.display = 'block';
                    loginReferralBox.className = 'referral-box invalid-ref';
                    loginReferralBox.innerHTML = `
                        <span class="ref-icon">⚠️</span>
                        <span>Invalid referral link</span>
                        <div class="ref-bonus-info">Continuing without referral.</div>
                    `;
                }
                
            } catch (error) {
                console.error('❌ Error checking referral code:', error);
                
                // Show error state
                referralBox.className = 'referral-box no-ref';
                referralBox.innerHTML = `
                    <span class="ref-icon">⚠️</span>
                    <span>Could not verify referral</span>
                    <div class="ref-bonus-info">Continuing without referral. You can still earn by referring others!</div>
                `;
                
                loginReferralBox.style.display = 'block';
                loginReferralBox.className = 'referral-box no-ref';
                loginReferralBox.innerHTML = `
                    <span class="ref-icon">⚠️</span>
                    <span>Could not verify referral</span>
                    <div class="ref-bonus-info">Continuing without referral.</div>
                `;
                
                referredBy = null;
                referrerName = null;
                referralValid = false;
            }
            
            referralChecked = true;
        }

        // ============================================
        // CAPTCHA
        // ============================================
        function generateCaptcha() {
            const num1 = Math.floor(Math.random() * 10) + 1;
            const num2 = Math.floor(Math.random() * 10) + 1;
            const operators = ['+', '-', '×'];
            const operator = operators[Math.floor(Math.random() * operators.length)];
            
            switch(operator) {
                case '+': 
                    captchaAnswer = num1 + num2; 
                    document.getElementById('captchaChallenge').textContent = `${num1} + ${num2} = ?`; 
                    break;
                case '-': 
                    captchaAnswer = num1 - num2; 
                    document.getElementById('captchaChallenge').textContent = `${num1} - ${num2} = ?`; 
                    break;
                case '×': 
                    captchaAnswer = num1 * num2; 
                    document.getElementById('captchaChallenge').textContent = `${num1} × ${num2} = ?`; 
                    break;
            }
            
            console.log('🔢 Captcha answer:', captchaAnswer);
        }

        // ============================================
        // TAB SWITCHING
        // ============================================
        function switchTab(tabName) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.form-container').forEach(f => f.classList.remove('active'));
            
            if (tabName === 'signup') {
                document.getElementById('signupTab').classList.add('active');
                document.getElementById('signup-form').classList.add('active');
            } else {
                document.getElementById('loginTab').classList.add('active');
                document.getElementById('login-form').classList.add('active');
            }
        }

        // ============================================
        // MESSAGES
        // ============================================
        function showSignupMessage(msg, type) {
            const el = document.getElementById('signupMessage');
            el.textContent = msg;
            el.className = `message ${type} show`;
            
            // Auto hide after 5 seconds
            setTimeout(() => {
                el.classList.remove('show');
            }, 5000);
        }

        function showLoginMessage(msg, type) {
            const el = document.getElementById('loginMessage');
            el.textContent = msg;
            el.className = `message ${type} show`;
            
            setTimeout(() => {
                el.classList.remove('show');
            }, 5000);
        }

        // ============================================
        // GENERATE REFERRAL CODE
        // ============================================
        function generateReferralCode() {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
            let code = '';
            for (let i = 0; i < 8; i++) {
                code += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return code;
        }

        // ============================================
        // SIGN UP - With Referral Handling
        // ============================================
        async function signUp() {
            const fullName = document.getElementById('fullName').value.trim();
            const email = document.getElementById('signupEmail').value.trim();
            const password = document.getElementById('signupPassword').value;
            const phone = document.getElementById('phone').value.trim();
            const captchaInput = document.getElementById('captchaInput').value;
            const btn = document.getElementById('signupBtn');
            
            // Clear previous messages
            showSignupMessage('', '');
            
            // Validation
            if (!fullName || fullName.length < 2) {
                return showSignupMessage('Please enter your full name', 'error');
            }
            if (!email || !email.includes('@') || !email.includes('.')) {
                return showSignupMessage('Please enter a valid email address', 'error');
            }
            if (password.length < 6) {
                return showSignupMessage('Password must be at least 6 characters', 'error');
            }
            if (!captchaInput || parseInt(captchaInput) !== captchaAnswer) {
                showSignupMessage('Wrong captcha answer. Please try again.', 'error');
                generateCaptcha();
                document.getElementById('captchaInput').value = '';
                return;
            }

            // Show loading state
            btn.disabled = true;
            btn.classList.add('loading');

            try {
                // Create auth user (no email verification)
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;
                const referralCode = generateReferralCode();
                
                console.log('👤 User created:', user.uid);
                console.log('🔗 Referral info - referredBy:', referredBy, 'referrerName:', referrerName);
                
                // ============================================
                // BUILD USER DATA
                // ============================================
                const userData = {
                    fullName: fullName,
                    firstName: fullName.split(' ')[0],
                    lastName: fullName.split(' ').slice(1).join(' ') || '',
                    email: email,
                    phone: phone || '',
                    createdAt: serverTimestamp(),
                    status: 'active',
                    referralCode: referralCode,
                    referredBy: referredBy || null,           // Referrer's user ID
                    referredByName: referrerName || null,     // Referrer's name
                    referralCount: 0,
                    referralBonus: 0,
                    totalReferralPoints: 0,
                    depositBalance: 0,
                    taskEarnings: 0,
                    points: 0,
                    firstDepositCompleted: false,             // Track first deposit for referral bonus
                    lastLogin: null
                };

                // ============================================
                // SAVE TO FIRESTORE
                // ============================================
                await setDoc(doc(firestore, 'users', user.uid), userData);
                console.log('✅ User data saved to Firestore');
                
                // ============================================
                // SAVE TO REALTIME DATABASE
                // ============================================
                await set(ref(rtdb, 'users/' + user.uid), {
                    email: email,
                    fullName: fullName,
                    referralCode: referralCode,
                    referredBy: referredBy || null,
                    status: 'active',
                    lastLogin: null
                });
                console.log('✅ User data saved to RTDB');

                // ============================================
                // HANDLE REFERRAL - Create referral record
                // ============================================
                if (referredBy && referralValid) {
                    try {
                        // Create referral record in Firestore
                        const referralData = {
                            referrerId: referredBy,
                            referredUserId: user.uid,
                            referredEmail: email,
                            referredName: fullName,
                            timestamp: serverTimestamp(),
                            status: 'pending_first_deposit',  // Waiting for first deposit
                            pointsAwarded: 0,
                            bonusEarned: 0
                        };
                        
                        // Add to referrals collection
                        const referralsRef = collection(firestore, 'referrals');
                        const { addDoc } = await import('https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js');
                        await addDoc(referralsRef, referralData);
                        console.log('✅ Referral record created in Firestore');
                        
                        // Also add to RTDB for notifications
                        await push(ref(rtdb, 'referral_notifications/' + referredBy), {
                            type: 'new_signup',
                            email: email,
                            fullName: fullName,
                            userId: user.uid,
                            timestamp: Date.now(),
                            read: false,
                            claimed: false
                        });
                        console.log('✅ Referral notification sent to RTDB');
                        
                    } catch (refError) {
                        console.error('⚠️ Error creating referral record:', refError);
                        // Continue even if referral record fails - user is still created
                    }
                }

                // ============================================
                // SUCCESS - Redirect
                // ============================================
                const bonusMessage = (referredBy && referralValid) 
                    ? '🎉 Account created with referral bonus eligibility!' 
                    : '✅ Account created successfully!';
                
                showSignupMessage(bonusMessage + ' Redirecting...', 'success');
                
                // Fast redirect to home
                setTimeout(() => {
                    window.location.href = 'home.html';
                }, 1500);
                
            } catch (error) {
                console.error('❌ Signup error:', error.code, error.message);
                
                let msg = 'An error occurred. Please try again.';
                
                switch (error.code) {
                    case 'auth/email-already-in-use':
                        msg = 'This email is already registered. Please login instead.';
                        break;
                    case 'auth/weak-password':
                        msg = 'Password is too weak. Please use at least 6 characters.';
                        break;
                    case 'auth/invalid-email':
                        msg = 'Invalid email address. Please check and try again.';
                        break;
                    case 'auth/network-request-failed':
                        msg = 'Network error. Please check your internet connection.';
                        break;
                    default:
                        msg = error.message || 'Registration failed. Please try again.';
                }
                
                showSignupMessage(msg, 'error');
                
                // Reset button
                btn.disabled = false;
                btn.classList.remove('loading');
                
            } finally {
                // Refresh captcha
                generateCaptcha();
                document.getElementById('captchaInput').value = '';
            }
        }

        // ============================================
        // LOGIN
        // ============================================
        async function login() {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            const btn = document.getElementById('loginBtn');

            // Clear previous messages
            showLoginMessage('', '');

            if (!email) {
                return showLoginMessage('Please enter your email address', 'error');
            }
            if (!password) {
                return showLoginMessage('Please enter your password', 'error');
            }

            // Show loading
            btn.disabled = true;
            btn.classList.add('loading');

            try {
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                console.log('✅ Login successful:', userCredential.user.uid);
                
                // Update last login (non-blocking)
                const uid = userCredential.user.uid;
                try {
                    await setDoc(doc(firestore, 'users', uid), { 
                        lastLogin: serverTimestamp() 
                    }, { merge: true });
                    
                    await set(ref(rtdb, 'users/' + uid), {
                        lastLogin: Date.now()
                    }, { merge: true });  // Using set with merge-like behavior
                    
                } catch (updateError) {
                    console.log('⚠️ Last login update skipped:', updateError.message);
                }
                
                showLoginMessage('✅ Login successful! Redirecting...', 'success');
                
                setTimeout(() => {
                    window.location.href = 'home.html';
                }, 800);
                
            } catch (error) {
                console.error('❌ Login error:', error.code);
                
                let msg = 'Login failed. Please try again.';
                
                switch (error.code) {
                    case 'auth/user-not-found':
                        msg = 'No account found with this email. Please sign up.';
                        break;
                    case 'auth/wrong-password':
                        msg = 'Incorrect password. Please try again.';
                        break;
                    case 'auth/invalid-email':
                        msg = 'Invalid email address.';
                        break;
                    case 'auth/too-many-requests':
                        msg = 'Too many failed attempts. Please try again later.';
                        break;
                    case 'auth/network-request-failed':
                        msg = 'Network error. Please check your internet connection.';
                        break;
                    default:
                        msg = error.message || 'Login failed.';
                }
                
                showLoginMessage(msg, 'error');
                
                btn.disabled = false;
                btn.classList.remove('loading');
            }
        }

        // ============================================
        // MAKE FUNCTIONS GLOBAL
        // ============================================
        window.switchTab = switchTab;
        window.signUp = signUp;
        window.login = login;
        window.generateCaptcha = generateCaptcha;
        window.checkReferralCode = checkReferralCode;

        console.log('✅ Page ready - Referral system active');
        console.log('📋 Referral bonus: 10% points of first deposit for inviter');
        console.log('🎁 Welcome bonus: 50 points for joining with referral');
    </script>
</body>
</html>
