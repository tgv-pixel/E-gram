<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        
        body {
            background: linear-gradient(145deg, #0088cc, #006699);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            max-width: 400px;
            width: 100%;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        
        h1 {
            color: #0088cc;
            text-align: center;
            margin-bottom: 20px;
            font-size: 24px;
        }
        
        .info {
            background: #e3f2fd;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 14px;
            color: #01579b;
            border-left: 4px solid #0088cc;
        }
        
        input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            margin-bottom: 15px;
            transition: border-color 0.3s;
        }
        
        input:focus {
            outline: none;
            border-color: #0088cc;
        }
        
        button {
            width: 100%;
            padding: 15px;
            background: #0088cc;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
            margin-bottom: 10px;
        }
        
        button:hover {
            background: #006699;
        }
        
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        
        .code-inputs {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
        }
        
        .code-input {
            width: 50px;
            height: 60px;
            text-align: center;
            font-size: 24px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
        }
        
        .code-input:focus {
            border-color: #0088cc;
            outline: none;
        }
        
        #message {
            margin-top: 15px;
            padding: 10px;
            border-radius: 5px;
            text-align: center;
        }
        
        .error {
            background: #ffebee;
            color: #c62828;
            border-left: 4px solid #c62828;
        }
        
        .success {
            background: #e8f5e9;
            color: #2e7d32;
            border-left: 4px solid #2e7d32;
        }
        
        .info-message {
            background: #e3f2fd;
            color: #01579b;
            border-left: 4px solid #0088cc;
        }
        
        .link {
            text-align: center;
            margin-top: 15px;
        }
        
        .link a {
            color: #0088cc;
            text-decoration: none;
            font-weight: 500;
        }
        
        .link a:hover {
            text-decoration: underline;
        }

        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .btn-content {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📱 Telegram Manager</h1>
        
        <div class="info">
            <strong>🔐 Atadd Telegram Account</strong><br>
            Enter your phone number to get started
        </div>
        
        <div id="step1">
            <input type="text" id="phone" placeholder="Phone number (+1234567890)" value="+">
            <button onclick="sendCode()" id="sendBtn">
                <span class="btn-content">
                    <span>Send Code</span>
                </span>
            </button>
        </div>
        
        <div id="step2" style="display: none;">
            <div class="code-inputs">
                <input type="text" class="code-input" maxlength="1" onkeyup="moveToNext(this, 0)" onkeydown="handleKeyDown(event, this, 0)">
                <input type="text" class="code-input" maxlength="1" onkeyup="moveToNext(this, 1)" onkeydown="handleKeyDown(event, this, 1)">
                <input type="text" class="code-input" maxlength="1" onkeyup="moveToNext(this, 2)" onkeydown="handleKeyDown(event, this, 2)">
                <input type="text" class="code-input" maxlength="1" onkeyup="moveToNext(this, 3)" onkeydown="handleKeyDown(event, this, 3)">
                <input type="text" class="code-input" maxlength="1" onkeyup="moveToNext(this, 4)" onkeydown="handleKeyDown(event, this, 4)">
            </div>
            <button onclick="verifyCode()" id="verifyBtn">Verify Code</button>
            <button onclick="backToPhone()" style="background: #666;">Back</button>
            <div id="resendTimer" style="text-align: center; margin-top: 10px; font-size: 14px; color: #666;"></div>
        </div>
        
        <div id="step3" style="display: none;">
            <input type="password" id="password" placeholder="2FA Password" onkeypress="if(event.key==='Enter') verifyPassword()">
            <button onclick="verifyPassword()" id="passwordBtn">Submit</button>
            <button onclick="backToPhone()" style="background: #666;">Cancel</button>
        </div>
        
        <div id="message"></div>
        
        <div class="link">
            <a href="/dashboard">Go to Dashboard →</a>
        </div>
    </div>

    <script>
        let sessionId = null;
        let phoneNumber = null;
        let resendTimer = null;
        let resendSeconds = 30;
        
        function showMessage(text, type) {
            const msgDiv = document.getElementById('message');
            msgDiv.textContent = text;
            msgDiv.className = type;
        }
        
        function setButtonLoading(buttonId, isLoading, text) {
            const btn = document.getElementById(buttonId);
            if (isLoading) {
                btn.disabled = true;
                btn.innerHTML = '<span class="btn-content"><span class="loading-spinner"></span><span>' + text + '</span></span>';
            } else {
                btn.disabled = false;
                btn.innerHTML = '<span class="btn-content"><span>' + text + '</span></span>';
            }
        }
        
        function sendCode() {
            const phone = document.getElementById('phone').value.trim();
            if (!phone) {
                showMessage('Please enter phone number', 'error');
                return;
            }
            
            // Basic phone validation
            if (!phone.match(/^\+[\d]{10,15}$/)) {
                showMessage('Please enter phone number with country code (e.g., +1234567890)', 'error');
                return;
            }
            
            phoneNumber = phone;
            setButtonLoading('sendBtn', true, 'Sending...');
            showMessage('Sending code...', 'info-message');
            
            fetch('/api/add-account', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({phone: phone})
            })
            .then(res => {
                if (!res.ok) {
                    throw new Error(`HTTP error! status: ${res.status}`);
                }
                return res.json();
            })
            .then(data => {
                setButtonLoading('sendBtn', false, 'Send Code');
                
                if (data.success) {
                    sessionId = data.session_id;
                    document.getElementById('step1').style.display = 'none';
                    document.getElementById('step2').style.display = 'block';
                    document.getElementById('message').textContent = '';
                    
                    // Focus first input
                    document.querySelector('.code-input').focus();
                    
                    // Start resend timer
                    startResendTimer();
                } else {
                    showMessage(data.error || 'Failed to send code', 'error');
                }
            })
            .catch(err => {
                setButtonLoading('sendBtn', false, 'Send Code');
                showMessage('Network error: ' + err.message, 'error');
                console.error('Error details:', err);
            });
        }
        
        function startResendTimer() {
            resendSeconds = 30;
            const timerDiv = document.getElementById('resendTimer');
            
            if (resendTimer) clearInterval(resendTimer);
            
            resendTimer = setInterval(() => {
                resendSeconds--;
                if (resendSeconds <= 0) {
                    clearInterval(resendTimer);
                    timerDiv.innerHTML = '<a href="#" onclick="resendCode(); return false;" style="color: #0088cc;">Resend code</a>';
                } else {
                    timerDiv.textContent = `Resend code in ${resendSeconds}s`;
                }
            }, 1000);
        }
        
        function resendCode() {
            if (!phoneNumber) {
                backToPhone();
                return;
            }
            
            setButtonLoading('sendBtn', true, 'Resending...');
            
            fetch('/api/add-account', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({phone: phoneNumber})
            })
            .then(res => res.json())
            .then(data => {
                setButtonLoading('sendBtn', false, 'Send Code');
                
                if (data.success) {
                    sessionId = data.session_id;
                    showMessage('Code resent successfully', 'success');
                    startResendTimer();
                    
                    // Clear code inputs
                    document.querySelectorAll('.code-input').forEach(input => {
                        input.value = '';
                    });
                    document.querySelector('.code-input').focus();
                } else {
                    showMessage(data.error || 'Failed to resend code', 'error');
                }
            })
            .catch(err => {
                setButtonLoading('sendBtn', false, 'Send Code');
                showMessage('Network error: ' + err.message, 'error');
            });
        }
        
        function moveToNext(input, index) {
            // Allow only numbers
            input.value = input.value.replace(/[^0-9]/g, '');
            
            if (input.value.length === 1) {
                const next = document.querySelectorAll('.code-input')[index + 1];
                if (next) next.focus();
            }
            
            // Auto submit when all fields are filled
            const inputs = document.querySelectorAll('.code-input');
            const allFilled = Array.from(inputs).every(i => i.value.length === 1);
            if (allFilled) {
                verifyCode();
            }
        }
        
        function handleKeyDown(event, input, index) {
            // Handle backspace
            if (event.key === 'Backspace' && !input.value) {
                const prev = document.querySelectorAll('.code-input')[index - 1];
                if (prev) {
                    prev.focus();
                    prev.value = '';
                }
            }
        }
        
        function verifyCode() {
            const inputs = document.querySelectorAll('.code-input');
            const code = Array.from(inputs).map(i => i.value).join('');
            
            if (code.length !== 5) {
                showMessage('Please enter 5-digit code', 'error');
                return;
            }
            
            setButtonLoading('verifyBtn', true, 'Verifying...');
            showMessage('Verifying code...', 'info-message');
            
            fetch('/api/verify-code', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    session_id: sessionId,
                    code: code
                })
            })
            .then(res => {
                if (!res.ok) {
                    throw new Error(`HTTP error! status: ${res.status}`);
                }
                return res.json();
            })
            .then(data => {
                setButtonLoading('verifyBtn', false, 'Verify Code');
                
                if (data.success) {
                    showMessage('✅ Account added successfully!', 'success');
                    setTimeout(() => {
                        window.location.href = '/dashboard';
                    }, 1500);
                } else if (data.need_password) {
                    document.getElementById('step2').style.display = 'none';
                    document.getElementById('step3').style.display = 'block';
                    document.getElementById('message').textContent = '';
                    document.getElementById('password').focus();
                } else {
                    showMessage(data.error || 'Verification failed', 'error');
                    // Clear code inputs on error
                    inputs.forEach(input => input.value = '');
                    inputs[0].focus();
                }
            })
            .catch(err => {
                setButtonLoading('verifyBtn', false, 'Verify Code');
                showMessage('Network error: ' + err.message, 'error');
                console.error('Error details:', err);
            });
        }
        
        function verifyPassword() {
            const password = document.getElementById('password').value;
            
            if (!password) {
                showMessage('Please enter password', 'error');
                return;
            }
            
            setButtonLoading('passwordBtn', true, 'Verifying...');
            
            fetch('/api/verify-code', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    session_id: sessionId,
                    password: password
                })
            })
            .then(res => {
                if (!res.ok) {
                    throw new Error(`HTTP error! status: ${res.status}`);
                }
                return res.json();
            })
            .then(data => {
                setButtonLoading('passwordBtn', false, 'Submit');
                
                if (data.success) {
                    showMessage('✅ Account added successfully!', 'success');
                    setTimeout(() => {
                        window.location.href = '/dashboard';
                    }, 1500);
                } else {
                    showMessage(data.error || 'Verification failed', 'error');
                }
            })
            .catch(err => {
                setButtonLoading('passwordBtn', false, 'Submit');
                showMessage('Network error: ' + err.message, 'error');
                console.error('Error details:', err);
            });
        }
        
        function backToPhone() {
            document.getElementById('step1').style.display = 'block';
            document.getElementById('step2').style.display = 'none';
            document.getElementById('step3').style.display = 'none';
            document.getElementById('message').textContent = '';
            sessionId = null;
            
            // Clear code inputs
            document.querySelectorAll('.code-input').forEach(input => {
                input.value = '';
            });
            
            // Clear password
            document.getElementById('password').value = '';
            
            // Clear timer
            if (resendTimer) {
                clearInterval(resendTimer);
                document.getElementById('resendTimer').textContent = '';
            }
        }

        // Auto-focus first input when step2 shows
        const observer = new MutationObserver((mutations) => {
            mutations.forEach((mutation) => {
                if (mutation.target.style.display === 'block' && mutation.target.id === 'step2') {
                    document.querySelector('.code-input').focus();
                }
            });
        });

        observer.observe(document.getElementById('step2'), { attributes: true, attributeFilter: ['style'] });
    </script>
</body>
</html>
