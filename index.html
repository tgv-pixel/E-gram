<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup - SAFE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #667eea;
            --primary-dark: #764ba2;
            --success: #2ecc71;
            --warning: #f39c12;
            --danger: #e74c3c;
            --dark: #2c3e50;
            --light: #f8f9fa;
            --gray: #6c757d;
            --gold: #ffd700;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
        }

        .container {
            background: white;
            padding: 30px 25px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 430px;
            animation: fadeInUp 0.5s ease;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo {
            text-align: center;
            margin-bottom: 20px;
            font-size: 2em;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .tab-container {
            display: flex;
            background: #f5f5f5;
            border-radius: 12px;
            padding: 4px;
            margin-bottom: 20px;
            gap: 4px;
        }

        .tab {
            flex: 1;
            padding: 11px;
            border: none;
            background: transparent;
            color: #666;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            border-radius: 10px;
            transition: all 0.3s ease;
        }

        .tab.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .form-container {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .form-container.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h2 {
            color: #333;
            margin-bottom: 18px;
            font-size: 20px;
            text-align: center;
        }

        .input-group {
            margin-bottom: 14px;
        }

        .input-group label {
            display: block;
            margin-bottom: 4px;
            color: #555;
            font-size: 12px;
            font-weight: 500;
        }

        .input-group input {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid #e1e5e9;
            border-radius: 10px;
            font-size: 14px;
            transition: all 0.3s ease;
            outline: none;
            background: #fafafa;
        }

        .input-group input:focus {
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        /* Referral Box */
        .referral-box {
            padding: 14px;
            border-radius: 12px;
            margin-bottom: 14px;
            text-align: center;
            font-size: 13px;
            animation: fadeIn 0.3s ease;
            transition: all 0.3s ease;
        }

        .referral-box.verifying {
            background: #e3f2fd;
            border: 2px solid #2196f3;
            color: #0d47a1;
        }

        .referral-box.valid {
            background: linear-gradient(135deg, #e8f5e9, #c8e6c9);
            border: 2px solid #4caf50;
            color: #1b5e20;
            animation: pulse-green 2s infinite;
        }

        @keyframes pulse-green {
            0%, 100% { box-shadow: 0 0 0 0 rgba(76, 175, 80, 0.3); }
            50% { box-shadow: 0 0 0 8px rgba(76, 175, 80, 0); }
        }

        .referral-box.invalid {
            background: #fff3e0;
            border: 2px solid #ff9800;
            color: #e65100;
        }

        .referral-box.no-ref {
            background: #f8f9fa;
            border: 2px dashed #dee2e6;
            color: #6c757d;
        }

        .referral-box .ref-icon {
            font-size: 1.4em;
            display: block;
            margin-bottom: 4px;
        }

        .referral-box .ref-name {
            font-weight: 700;
            font-size: 1.05em;
        }

        .referral-box .ref-details {
            font-size: 0.8em;
            margin-top: 6px;
            opacity: 0.9;
            line-height: 1.5;
        }

        .ref-highlight {
            font-weight: 700;
            padding: 1px 6px;
            border-radius: 4px;
            display: inline-block;
            margin: 0 2px;
        }

        .ref-highlight.points {
            background: rgba(255, 152, 0, 0.2);
            color: #e65100;
        }

        .ref-highlight.balance {
            background: rgba(46, 204, 113, 0.2);
            color: #155724;
        }

        .captcha-container {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 16px 0;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 10px;
        }

        .captcha-challenge {
            font-size: 17px;
            font-weight: 700;
            color: #333;
            background: white;
            padding: 9px 16px;
            border-radius: 8px;
            border: 2px dashed #667eea;
            min-width: 85px;
            text-align: center;
            user-select: none;
            letter-spacing: 1px;
        }

        .refresh-captcha {
            background: none;
            border: none;
            color: #667eea;
            cursor: pointer;
            font-size: 20px;
            padding: 8px;
            border-radius: 50%;
            transition: all 0.3s;
        }

        .refresh-captcha:hover {
            background: rgba(102, 126, 234, 0.1);
            transform: rotate(180deg);
        }

        #captcha-input {
            flex: 1;
            min-width: 0;
        }

        .btn {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none !important;
        }

        .btn .spinner {
            display: none;
            width: 18px;
            height: 18px;
            border: 2px solid white;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        .btn.loading .spinner {
            display: inline-block;
        }

        .btn.loading .btn-text {
            display: none;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .message {
            margin: 10px 0;
            padding: 10px 12px;
            border-radius: 10px;
            text-align: center;
            font-weight: 500;
            font-size: 13px;
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .message.show {
            display: block;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .message.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        .link-text {
            text-align: center;
            margin-top: 16px;
            color: #666;
            font-size: 13px;
        }

        .link-text a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
            transition: color 0.3s;
        }

        .link-text a:hover {
            color: #764ba2;
            text-decoration: underline;
        }

        /* Loading overlay */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            gap: 12px;
        }

        .loading-overlay .spinner-big {
            width: 45px;
            height: 45px;
            border: 4px solid #667eea;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        .loading-overlay .loading-text {
            color: #666;
            font-size: 13px;
        }

        @media (max-width: 480px) {
            .container {
                padding: 22px 16px;
            }
            
            .captcha-container {
                flex-wrap: wrap;
            }
            
            .referral-box {
                padding: 12px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <!-- Loading overlay -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner-big"></div>
        <div class="loading-text">Loading...</div>
    </div>

    <div class="container" id="mainContainer" style="display: none;">
        <div class="logo">SAFE</div>
        
        <div class="tab-container">
            <button class="tab active" id="signupTab" onclick="switchTab('signup')">Sign Up</button>
            <button class="tab" id="loginTab" onclick="switchTab('login')">Login</button>
        </div>

        <!-- Signup Form -->
        <div id="signup-form" class="form-container active">
            <h2>Create Account</h2>
            <div class="message" id="signupMessage"></div>
            
            <!-- Referral Box -->
            <div class="referral-box verifying" id="referralBox">
                <span class="ref-icon"><i class="fas fa-spinner fa-spin"></i></span>
                <span>Checking referral link...</span>
            </div>
            
            <div class="input-group">
                <label for="fullName">Full Name</label>
                <input type="text" id="fullName" placeholder="Enter your full name" required autocomplete="name">
            </div>
            
            <div class="input-group">
                <label for="signupEmail">Email Address</label>
                <input type="email" id="signupEmail" placeholder="you@example.com" required autocomplete="email">
            </div>
            
            <div class="input-group">
                <label for="signupPassword">Password</label>
                <input type="password" id="signupPassword" placeholder="Min 6 characters" required minlength="6" autocomplete="new-password">
            </div>
            
            <div class="input-group">
                <label for="phone">Phone (Optional)</label>
                <input type="text" id="phone" placeholder="+251..." autocomplete="tel">
            </div>
            
            <input type="hidden" id="referralCodeHidden" value="">
            <input type="hidden" id="referrerNameHidden" value="">
            
            <div class="captcha-container">
                <div class="captcha-challenge" id="captchaChallenge">?</div>
                <button type="button" class="refresh-captcha" onclick="generateCaptcha()" title="Refresh">
                    <i class="fas fa-sync-alt"></i>
                </button>
                <input type="text" id="captchaInput" class="captcha-input" placeholder="Answer" required>
            </div>
            
            <button class="btn" id="signupBtn" onclick="signUp()">
                <span class="spinner"></span>
                <span class="btn-text">Create Account</span>
            </button>
            
            <div class="link-text">
                Already have an account? <a onclick="switchTab('login')">Login</a>
            </div>
        </div>

        <!-- Login Form -->
        <div id="login-form" class="form-container">
            <h2>Welcome Back</h2>
            <div class="message" id="loginMessage"></div>
            
            <!-- Login Referral Box -->
            <div class="referral-box verifying" id="loginReferralBox" style="display: none;">
                <span class="ref-icon"><i class="fas fa-spinner fa-spin"></i></span>
                <span>Checking referral link...</span>
            </div>
            
            <div class="input-group">
                <label for="loginEmail">Email Address</label>
                <input type="email" id="loginEmail" placeholder="you@example.com" required autocomplete="email">
            </div>
            
            <div class="input-group">
                <label for="loginPassword">Password</label>
                <input type="password" id="loginPassword" placeholder="Enter password" required autocomplete="current-password">
            </div>
            
            <button class="btn" id="loginBtn" onclick="login()">
                <span class="spinner"></span>
                <span class="btn-text">Sign In</span>
            </button>
            
            <div class="link-text">
                Don't have an account? <a onclick="switchTab('signup')">Sign up</a>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js';
        import { 
            getAuth, 
            createUserWithEmailAndPassword, 
            signInWithEmailAndPassword, 
            onAuthStateChanged 
        } from 'https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js';
        import { 
            getDatabase, 
            ref, 
            set, 
            push 
        } from 'https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js';
        import { 
            getFirestore, 
            doc, 
            setDoc, 
            getDoc, 
            getDocs,
            query,
            where,
            addDoc,
            collection, 
            serverTimestamp 
        } from 'https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js';

        // ============================================
        // FIREBASE CONFIG
        // ============================================
        const firebaseConfig = {
            apiKey: "AIzaSyD4t4GUzN1xkyia0o3zx9i2cX2004Epv7A",
            authDomain: "webapp-fc856.firebaseapp.com",
            projectId: "webapp-fc856",
            storageBucket: "webapp-fc856.appspot.com",
            messagingSenderId: "892830607693",
            appId: "1:892830607693:web:a3a886c142586665fc2f04"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const rtdb = getDatabase(app);
        const db = getFirestore(app);

        console.log('✅ Firebase ready');

        // ============================================
        // GLOBAL VARIABLES
        // ============================================
        let captchaAnswer = 0;
        let referredBy = null;        // Referrer's user ID
        let referrerName = null;      // Referrer's display name
        let referralValid = false;    // Is referral code valid?
        let referralChecked = false;  // Has referral been verified?

        // ============================================
        // AUTH STATE - Redirect if logged in
        // ============================================
        onAuthStateChanged(auth, (user) => {
            const loadingOverlay = document.getElementById('loadingOverlay');
            const mainContainer = document.getElementById('mainContainer');
            
            if (user) {
                console.log('✅ User authenticated, redirecting to home');
                window.location.href = 'home.html';
            } else {
                console.log('👤 No user, showing auth page');
                loadingOverlay.style.display = 'none';
                mainContainer.style.display = 'block';
                
                generateCaptcha();
                checkReferralCode();
            }
        });

        // ============================================
        // GET REFERRAL CODE FROM URL
        // ============================================
        function getReferralFromURL() {
            const params = new URLSearchParams(window.location.search);
            return params.get('ref');
        }

        // ============================================
        // CHECK REFERRAL CODE - Validate with Firestore
        // ============================================
        async function checkReferralCode() {
            const refCode = getReferralFromURL();
            const referralBox = document.getElementById('referralBox');
            const referralCodeHidden = document.getElementById('referralCodeHidden');
            const referrerNameHidden = document.getElementById('referrerNameHidden');
            const loginReferralBox = document.getElementById('loginReferralBox');
            
            // No referral code in URL
            if (!refCode) {
                referralBox.className = 'referral-box no-ref';
                referralBox.innerHTML = `
                    <span class="ref-icon">🔗</span>
                    <span>No referral code detected</span>
                    <div class="ref-details">
                        Sign up to get your own referral link!<br>
                        Earn <span class="ref-highlight points">10% points</span> + <span class="ref-highlight balance">3% balance</span> per referral
                    </div>`;
                referredBy = null;
                referrerName = null;
                referralValid = false;
                referralChecked = true;
                return;
            }

            // Show verifying state
            referralBox.className = 'referral-box verifying';
            referralBox.innerHTML = `
                <span class="ref-icon"><i class="fas fa-spinner fa-spin"></i></span>
                <span>Verifying referral code...</span>`;
            
            loginReferralBox.style.display = 'block';
            loginReferralBox.className = 'referral-box verifying';
            loginReferralBox.innerHTML = `
                <span class="ref-icon"><i class="fas fa-spinner fa-spin"></i></span>
                <span>Verifying referral code...</span>`;

            try {
                console.log('🔍 Checking referral code:', refCode);
                
                let foundReferrer = null;
                let foundReferrerId = null;
                
                // METHOD 1: Query by referralCode field
                const usersRef = collection(db, 'users');
                const q = query(usersRef, where('referralCode', '==', refCode));
                const querySnapshot = await getDocs(q);
                
                if (!querySnapshot.empty) {
                    const userDoc = querySnapshot.docs[0];
                    foundReferrer = userDoc.data();
                    foundReferrerId = userDoc.id;
                    console.log('✅ Found referrer by referralCode:', foundReferrerId);
                } else {
                    // METHOD 2: Direct user ID lookup
                    console.log('🔍 Trying user ID lookup...');
                    const userDocSnap = await getDoc(doc(db, 'users', refCode));
                    
                    if (userDocSnap.exists()) {
                        foundReferrer = userDocSnap.data();
                        foundReferrerId = userDocSnap.id;
                        console.log('✅ Found referrer by user ID:', foundReferrerId);
                    }
                }
                
                // UPDATE UI
                if (foundReferrer && foundReferrerId) {
                    // Valid referral!
                    referredBy = foundReferrerId;
                    referrerName = foundReferrer.firstName || foundReferrer.fullName || 'Friend';
                    referralValid = true;
                    referralCodeHidden.value = foundReferrerId;
                    referrerNameHidden.value = referrerName;
                    
                    const displayName = referrerName.length > 20 ? referrerName.substring(0, 20) + '...' : referrerName;
                    
                    // Signup referral box
                    referralBox.className = 'referral-box valid';
                    referralBox.innerHTML = `
                        <span class="ref-icon">🎉</span>
                        <span>Invited by <span class="ref-name">${escapeHTML(displayName)}</span>!</span>
                        <div class="ref-details">
                            When you make your <strong>first deposit</strong>, your inviter earns:<br>
                            <span class="ref-highlight points">10% as POINTS</span> + 
                            <span class="ref-highlight balance">3% as BALANCE</span>
                        </div>`;
                    
                    // Login referral box
                    loginReferralBox.style.display = 'block';
                    loginReferralBox.className = 'referral-box valid';
                    loginReferralBox.innerHTML = `
                        <span class="ref-icon">🎉</span>
                        <span>Referred by <span class="ref-name">${escapeHTML(displayName)}</span></span>
                        <div class="ref-details">Login to continue with this referral!</div>`;
                    
                } else {
                    // Invalid referral
                    referredBy = null;
                    referrerName = null;
                    referralValid = false;
                    
                    referralBox.className = 'referral-box invalid';
                    referralBox.innerHTML = `
                        <span class="ref-icon">⚠️</span>
                        <span>Invalid referral link</span>
                        <div class="ref-details">This referral code doesn't match any user.<br>Continuing without referral.</div>`;
                    
                    loginReferralBox.style.display = 'block';
                    loginReferralBox.className = 'referral-box invalid';
                    loginReferralBox.innerHTML = `
                        <span class="ref-icon">⚠️</span>
                        <span>Invalid referral link</span>
                        <div class="ref-details">Continuing without referral.</div>`;
                }
                
            } catch (error) {
                console.error('❌ Error checking referral:', error);
                
                referralBox.className = 'referral-box no-ref';
                referralBox.innerHTML = `
                    <span class="ref-icon">⚠️</span>
                    <span>Could not verify referral</span>
                    <div class="ref-details">Continuing without referral.</div>`;
                
                loginReferralBox.style.display = 'block';
                loginReferralBox.className = 'referral-box no-ref';
                loginReferralBox.innerHTML = `
                    <span class="ref-icon">⚠️</span>
                    <span>Could not verify referral</span>
                    <div class="ref-details">Continuing without referral.</div>`;
                
                referredBy = null;
                referrerName = null;
                referralValid = false;
            }
            
            referralChecked = true;
        }

        // ============================================
        // CAPTCHA
        // ============================================
        function generateCaptcha() {
            const num1 = Math.floor(Math.random() * 10) + 1;
            const num2 = Math.floor(Math.random() * 10) + 1;
            const operators = ['+', '-', '×'];
            const operator = operators[Math.floor(Math.random() * operators.length)];
            
            switch(operator) {
                case '+': 
                    captchaAnswer = num1 + num2; 
                    document.getElementById('captchaChallenge').textContent = `${num1} + ${num2} = ?`; 
                    break;
                case '-': 
                    captchaAnswer = num1 - num2; 
                    document.getElementById('captchaChallenge').textContent = `${num1} - ${num2} = ?`; 
                    break;
                case '×': 
                    captchaAnswer = num1 * num2; 
                    document.getElementById('captchaChallenge').textContent = `${num1} × ${num2} = ?`; 
                    break;
            }
        }

        // ============================================
        // TAB SWITCHING
        // ============================================
        function switchTab(tabName) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.form-container').forEach(f => f.classList.remove('active'));
            
            if (tabName === 'signup') {
                document.getElementById('signupTab').classList.add('active');
                document.getElementById('signup-form').classList.add('active');
            } else {
                document.getElementById('loginTab').classList.add('active');
                document.getElementById('login-form').classList.add('active');
            }
        }

        // ============================================
        // MESSAGE HELPERS
        // ============================================
        function showSignupMessage(msg, type) {
            const el = document.getElementById('signupMessage');
            el.textContent = msg;
            el.className = `message ${type} show`;
            setTimeout(() => el.classList.remove('show'), 5000);
        }

        function showLoginMessage(msg, type) {
            const el = document.getElementById('loginMessage');
            el.textContent = msg;
            el.className = `message ${type} show`;
            setTimeout(() => el.classList.remove('show'), 5000);
        }

        // ============================================
        // GENERATE REFERRAL CODE
        // ============================================
        function generateReferralCode() {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
            let code = '';
            for (let i = 0; i < 8; i++) {
                code += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return code;
        }

        // ============================================
        // SIGN UP
        // ============================================
        async function signUp() {
            const fullName = document.getElementById('fullName').value.trim();
            const email = document.getElementById('signupEmail').value.trim();
            const password = document.getElementById('signupPassword').value;
            const phone = document.getElementById('phone').value.trim();
            const captchaInput = document.getElementById('captchaInput').value;
            const btn = document.getElementById('signupBtn');
            
            // Clear messages
            showSignupMessage('', '');
            
            // Validation
            if (!fullName || fullName.length < 2) {
                return showSignupMessage('Please enter your full name', 'error');
            }
            if (!email || !email.includes('@') || !email.includes('.')) {
                return showSignupMessage('Please enter a valid email', 'error');
            }
            if (password.length < 6) {
                return showSignupMessage('Password must be at least 6 characters', 'error');
            }
            if (!captchaInput || parseInt(captchaInput) !== captchaAnswer) {
                showSignupMessage('Wrong captcha. Try again.', 'error');
                generateCaptcha();
                document.getElementById('captchaInput').value = '';
                return;
            }

            // Loading state
            btn.disabled = true;
            btn.classList.add('loading');

            try {
                // Create auth user
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;
                const referralCode = generateReferralCode();
                
                console.log('👤 User created:', user.uid);
                console.log('🔗 Referrer:', referredBy, referrerName);
                
                // ============================================
                // BUILD USER DATA
                // ============================================
                const userData = {
                    fullName: fullName,
                    firstName: fullName.split(' ')[0],
                    lastName: fullName.split(' ').slice(1).join(' ') || '',
                    email: email,
                    phone: phone || '',
                    createdAt: serverTimestamp(),
                    status: 'active',
                    referralCode: referralCode,
                    referredBy: referredBy || null,
                    referredByName: referrerName || null,
                    referralCount: 0,
                    referralBonus: 0,
                    totalReferralPoints: 0,
                    depositBalance: 0,
                    taskEarnings: 0,
                    points: 0,
                    firstDepositCompleted: false,
                    lastLogin: null
                };

                // Save to Firestore
                await setDoc(doc(db, 'users', user.uid), userData);
                console.log('✅ User saved to Firestore');
                
                // Save to RTDB
                await set(ref(rtdb, 'users/' + user.uid), {
                    email: email,
                    fullName: fullName,
                    referralCode: referralCode,
                    referredBy: referredBy || null,
                    status: 'active',
                    lastLogin: null
                });
                console.log('✅ User saved to RTDB');

                // ============================================
                // CREATE REFERRAL RECORD (if referred)
                // ============================================
                if (referredBy && referralValid) {
                    try {
                        const referralData = {
                            referrerId: referredBy,
                            referredUserId: user.uid,
                            referredEmail: email,
                            referredName: fullName,
                            timestamp: serverTimestamp(),
                            status: 'pending_first_deposit',
                            pointsAwarded: 0,
                            bonusEarned: 0,
                            depositAmount: 0,
                            bonusPercentage: 10,
                            balancePercentage: 3
                        };
                        
                        await addDoc(collection(db, 'referrals'), referralData);
                        console.log('✅ Referral record created');
                        
                        // RTDB notification
                        await push(ref(rtdb, 'referral_notifications/' + referredBy), {
                            type: 'new_signup',
                            email: email,
                            fullName: fullName,
                            userId: user.uid,
                            timestamp: Date.now(),
                            read: false,
                            claimed: false
                        });
                        console.log('✅ Referral notification sent');
                        
                    } catch (refError) {
                        console.error('⚠️ Referral record error:', refError);
                    }
                }

                // Success
                const bonusMsg = (referredBy && referralValid) 
                    ? '🎉 Account created! Your inviter will earn rewards after your first deposit.' 
                    : '✅ Account created successfully!';
                
                showSignupMessage(bonusMsg + ' Redirecting...', 'success');
                
                setTimeout(() => {
                    window.location.href = 'home.html';
                }, 1500);
                
            } catch (error) {
                console.error('❌ Signup error:', error.code);
                
                let msg = 'Registration failed.';
                switch (error.code) {
                    case 'auth/email-already-in-use':
                        msg = 'Email already registered. Please login.';
                        break;
                    case 'auth/weak-password':
                        msg = 'Password too weak. Use 6+ characters.';
                        break;
                    case 'auth/invalid-email':
                        msg = 'Invalid email address.';
                        break;
                    case 'auth/network-request-failed':
                        msg = 'Network error. Check your connection.';
                        break;
                    default:
                        msg = error.message || 'Registration failed.';
                }
                
                showSignupMessage(msg, 'error');
                btn.disabled = false;
                btn.classList.remove('loading');
                
            } finally {
                generateCaptcha();
                document.getElementById('captchaInput').value = '';
            }
        }

        // ============================================
        // LOGIN
        // ============================================
        async function login() {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            const btn = document.getElementById('loginBtn');

            showLoginMessage('', '');

            if (!email) return showLoginMessage('Please enter your email', 'error');
            if (!password) return showLoginMessage('Please enter your password', 'error');

            btn.disabled = true;
            btn.classList.add('loading');

            try {
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                console.log('✅ Login:', userCredential.user.uid);
                
                // Update last login (non-blocking)
                const uid = userCredential.user.uid;
                setDoc(doc(db, 'users', uid), { lastLogin: serverTimestamp() }, { merge: true }).catch(() => {});
                
                showLoginMessage('✅ Login successful! Redirecting...', 'success');
                
                setTimeout(() => {
                    window.location.href = 'home.html';
                }, 800);
                
            } catch (error) {
                console.error('❌ Login error:', error.code);
                
                let msg = 'Login failed.';
                switch (error.code) {
                    case 'auth/user-not-found':
                        msg = 'No account found. Please sign up.';
                        break;
                    case 'auth/wrong-password':
                        msg = 'Incorrect password.';
                        break;
                    case 'auth/invalid-email':
                        msg = 'Invalid email.';
                        break;
                    case 'auth/too-many-requests':
                        msg = 'Too many attempts. Try later.';
                        break;
                    default:
                        msg = error.message || 'Login failed.';
                }
                
                showLoginMessage(msg, 'error');
                btn.disabled = false;
                btn.classList.remove('loading');
            }
        }

        // ============================================
        // HELPERS
        // ============================================
        function escapeHTML(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        // ============================================
        // GLOBAL EXPORTS
        // ============================================
        window.switchTab = switchTab;
        window.signUp = signUp;
        window.login = login;
        window.generateCaptcha = generateCaptcha;
        window.checkReferralCode = checkReferralCode;

        console.log('✅ Auth page ready');
        console.log('💰 Rewards: 10% POINTS + 3% BALANCE on first deposit');
    </script>
</body>
</html>
