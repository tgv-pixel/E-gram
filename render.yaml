services:
  - type: web
    name: safe-platform
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn server:app --workers 1 --timeout 120 --preload
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
    autoDeploy: true
    plan: free
    healthCheckPath: /api/health
