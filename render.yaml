services:
  - type: web
    name: telegram-web
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python web.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0

  - type: worker
    name: telegram-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
