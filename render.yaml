services:
  - type: web
    name: telegram-manager
    runtime: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python server.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
    healthCheckPath: /api/health
    autoDeploy: true
    disk:
      name: telegram-data
      mountPath: /opt/render/project/src
      sizeGB: 1
