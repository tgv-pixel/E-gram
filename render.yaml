services:
  - type: web
    name: telegram-auto-add-server-4
    runtime: python
    repo: https://github.com/tgv-pixel/E-gram
    plan: free
    region: oregon
    branch: main
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn server:app --worker-class sync --workers 1 --timeout 120 --bind 0.0.0.0:$PORT
    healthCheckPath: /ping
    autoDeploy: true
