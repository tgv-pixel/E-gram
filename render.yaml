services:
  - type: web
    name: e-gram
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn server:app
    envVars:
      - key: API_ID
        value: 33465589  # Replace with your real API ID
      - key: API_HASH
        value: "08bdab35790bf1fdf20c16a50bd323b8"  # Replace with your real API hash
    disk:
      name: data
      mountPath: /opt/render/project/src
      sizeGB: 1
