services:
  # Service 1: Main Telegram Account Manager
  - type: web
    name: tsega-main
    runtime: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --workers=1 --threads=2 --timeout=60 server:app
    envVars:
      - key: API_ID
        value: 33465589
      - key: API_HASH
        value: 08bdab35790bf1fdf20c16a50bd323b8
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: PORT
        value: 5000
    healthCheckPath: /ping  # Changed from /api/health to /ping (faster)
    autoDeploy: true
    disk:
      name: telegram-data
      mountPath: /opt/render/project/src
      sizeGB: 1

  # Service 2: Tsega Star Earning System


# Backup cron job for database
  - type: cron
    name: db-backup
    runtime: python
    region: oregon
    schedule: "0 0 * * *"  # Daily at midnight UTC
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py  # Changed from bot.py to backup_db.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
    disk:
      name: backup-data
      mountPath: /opt/render/project/src
      sizeGB: 1
