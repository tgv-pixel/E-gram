  <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Withdraw - SAFE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 550px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 25px;
        }

        .header {
            display: flex;
            align-items: center;
            margin-bottom: 25px;
            gap: 15px;
        }

        .back-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #f5f5f5;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
            border: none;
            color: #333;
            font-size: 18px;
        }

        .back-btn:hover {
            background: #e0e0e0;
            transform: scale(1.05);
        }

        h1 {
            color: #333;
            font-size: 24px;
        }

        /* Balance Cards */
        .balance-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 25px;
        }

        .balance-card {
            padding: 15px;
            border-radius: 15px;
            text-align: center;
            color: white;
        }

        .balance-card.deposit {
            background: linear-gradient(135deg, #28a745, #20c997);
        }

        .balance-card.earning {
            background: linear-gradient(135deg, #17a2b8, #0dcaf0);
        }

        .balance-label {
            font-size: 12px;
            opacity: 0.9;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .balance-amount {
            font-size: 24px;
            font-weight: 700;
            margin: 5px 0;
        }

        /* Withdrawal Method Tabs */
        .method-tabs {
            display: flex;
            background: #f5f5f5;
            border-radius: 12px;
            padding: 4px;
            margin-bottom: 20px;
            gap: 4px;
        }

        .method-tab {
            flex: 1;
            padding: 12px;
            border: none;
            background: transparent;
            color: #666;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border-radius: 10px;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .method-tab.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .method-form {
            display: none;
        }

        .method-form.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Telebirr Info */
        .telebirr-box {
            background: linear-gradient(135deg, #e8f5e9, #c8e6c9);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 15px;
            border: 2px solid #4caf50;
        }

        .telebirr-box .info-text {
            color: #2e7d32;
            font-size: 13px;
            text-align: center;
        }

        /* Form Styles */
        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            color: #555;
            font-weight: 600;
            font-size: 14px;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 14px;
            border: 2px solid #e1e5e9;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.3s;
            outline: none;
        }

        .form-group input:focus,
        .form-group select:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .input-with-icon {
            position: relative;
        }

        .input-with-icon i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
        }

        .input-with-icon input {
            padding-left: 40px;
        }

        /* Security Code */
        .security-box {
            background: #fff3cd;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 15px;
            border: 2px solid #ffc107;
            text-align: center;
        }

        .security-box .warning {
            color: #856404;
            font-size: 13px;
            font-weight: 600;
        }

        .submit-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 10px;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .submit-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        /* Alert */
        .alert {
            padding: 12px 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            font-size: 14px;
            display: none;
        }

        .alert.show {
            display: block;
        }

        .alert-info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-danger {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        /* History */
        .history-section {
            margin-top: 25px;
        }

        .history-section h3 {
            color: #333;
            margin-bottom: 15px;
            font-size: 18px;
        }

        .history-item {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 4px solid #dc3545;
        }

        .history-amount {
            font-weight: 700;
            color: #dc3545;
            font-size: 16px;
        }

        .history-date {
            font-size: 12px;
            color: #666;
        }

        .history-method {
            font-size: 11px;
            color: #999;
        }

        .badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }

        .badge-pending {
            background: #ffc107;
            color: #333;
        }

        .badge-completed {
            background: #28a745;
            color: white;
        }

        .badge-rejected {
            background: #dc3545;
            color: white;
        }

        .no-data {
            text-align: center;
            padding: 30px;
            color: #999;
        }

        /* Min/Max info */
        .limits-info {
            background: #f8f9fa;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 15px;
            font-size: 13px;
            color: #666;
            text-align: center;
        }

        @media (max-width: 480px) {
            .container {
                padding: 15px;
            }
            
            .balance-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <button class="back-btn" onclick="window.location.href='home.html'">
                <i class="fas fa-arrow-left"></i>
            </button>
            <h1>Withdraw Funds</h1>
        </div>

        <!-- Balance -->
        <div class="balance-grid">
            <div class="balance-card deposit">
                <div class="balance-label">Deposit Balance</div>
                <div class="balance-amount" id="depositBalance">0.00</div>
            </div>
            <div class="balance-card earning">
                <div class="balance-label">Earnings</div>
                <div class="balance-amount" id="earningBalance">0.00</div>
            </div>
        </div>

        <!-- Withdrawal Method -->
        <div class="method-tabs">
            <button class="method-tab active" onclick="switchMethod('telebirr')">
                <i class="fas fa-mobile-alt"></i> Telebirr
            </button>
            <button class="method-tab" onclick="switchMethod('crypto')">
                <i class="fab fa-bitcoin"></i> Crypto
            </button>
        </div>

        <!-- Telebirr Withdrawal -->
        <div id="telebirr-form" class="method-form active">
            <div class="telebirr-box">
                <div class="info-text">
                    <i class="fas fa-check-circle"></i> Withdraw to your Telebirr account<br>
                    <strong>Number: 0949399753 (Abinet)</strong>
                </div>
            </div>

            <div class="form-group">
                <label>Your Telebirr Number</label>
                <div class="input-with-icon">
                    <i class="fas fa-mobile-alt"></i>
                    <input type="text" id="telebirr-number" placeholder="09XXXXXXXX">
                </div>
            </div>

            <div class="form-group">
                <label>Account Holder Name</label>
                <input type="text" id="telebirr-name" placeholder="Your full name">
            </div>

            <div class="form-group">
                <label>Amount (USDT)</label>
                <div class="input-with-icon">
                    <i class="fas fa-dollar-sign"></i>
                    <input type="number" id="telebirr-amount" placeholder="Min 20 USDT" min="20" step="1">
                </div>
            </div>

            <div class="limits-info">
                <i class="fas fa-info-circle"></i> Minimum: 20 USDT • Maximum: 500 USDT per day
            </div>

            <div class="form-group">
                <label>Security Code</label>
                <input type="text" id="telebirr-security" placeholder="Enter your 4-digit security code" maxlength="4">
            </div>

            <button class="submit-btn" id="telebirr-submit" onclick="submitWithdrawal('telebirr')">
                <i class="fas fa-paper-plane"></i> Request Withdrawal
            </button>
        </div>

        <!-- Crypto Withdrawal -->
        <div id="crypto-form" class="method-form">
            <div class="form-group">
                <label>TRC20 Wallet Address</label>
                <input type="text" id="crypto-address" placeholder="Enter your TRC20 USDT address">
            </div>

            <div class="form-group">
                <label>Network</label>
                <select id="crypto-network">
                    <option value="TRC20">TRC20 (Tron)</option>
                </select>
            </div>

            <div class="form-group">
                <label>Amount (USDT)</label>
                <div class="input-with-icon">
                    <i class="fas fa-dollar-sign"></i>
                    <input type="number" id="crypto-amount" placeholder="Min 20 USDT" min="20" step="0.01">
                </div>
            </div>

            <div class="limits-info">
                <i class="fas fa-info-circle"></i> Minimum: 20 USDT • Maximum: 1000 USDT per day • TRC20 Only
            </div>

            <div class="form-group">
                <label>Security Code</label>
                <input type="text" id="crypto-security" placeholder="Enter your 4-digit security code" maxlength="4">
            </div>

            <button class="submit-btn" id="crypto-submit" onclick="submitWithdrawal('crypto')">
                <i class="fas fa-paper-plane"></i> Request Withdrawal
            </button>
        </div>

        <!-- Alert -->
        <div id="alertMessage" class="alert"></div>

        <!-- Withdrawal History -->
        <div class="history-section">
            <h3><i class="fas fa-history"></i> Withdrawal History</h3>
            <div id="withdrawHistory">
                <div class="no-data">Loading history...</div>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

    <script>
        // Firebase Configuration
        const firebaseConfig = {
        const firebaseConfig = {
  apiKey: "AIzaSyD4t4GUzN1xkyia0o3zx9i2cX2004Epv7A",
  authDomain: "webapp-fc856.firebaseapp.com",
  projectId: "webapp-fc856",
  storageBucket: "webapp-fc856.firebasestorage.app",
  messagingSenderId: "892830607693",
  appId: "1:892830607693:web:a3a886c142586665fc2f04",
  measurementId: "G-BR4FLD1N6F"
};
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const rdb = firebase.database();

        let currentUser = null;
        let userData = null;

        // Auth Check
        auth.onAuthStateChanged((user) => {
            if (!user) {
                window.location.href = 'index.html';
                return;
            }
            currentUser = user;
            loadUserData();
            loadWithdrawHistory();
        });

        // Load User Data
        async function loadUserData() {
            try {
                const doc = await db.collection('users').doc(currentUser.uid).get();
                if (doc.exists) {
                    userData = doc.data();
                    document.getElementById('depositBalance').textContent = 
                        (userData.depositBalance || 0).toFixed(2);
                    document.getElementById('earningBalance').textContent = 
                        (userData.taskEarnings || 0).toFixed(2);
                }
            } catch (error) {
                console.error('Error loading data:', error);
            }
        }

        // Switch Method
        function switchMethod(method) {
            document.querySelectorAll('.method-tab').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.method-form').forEach(form => form.classList.remove('active'));

            if (method === 'telebirr') {
                document.querySelector('.method-tab:nth-child(1)').classList.add('active');
                document.getElementById('telebirr-form').classList.add('active');
            } else {
                document.querySelector('.method-tab:nth-child(2)').classList.add('active');
                document.getElementById('crypto-form').classList.add('active');
            }
        }

        // Show Alert
        function showAlert(message, type) {
            const alert = document.getElementById('alertMessage');
            alert.textContent = message;
            alert.className = `alert alert-${type} show`;
            setTimeout(() => alert.classList.remove('show'), 4000);
        }

        // Submit Withdrawal
        async function submitWithdrawal(method) {
            if (!currentUser) return;

            const amount = parseFloat(document.getElementById(`${method}-amount`).value);
            const securityCode = document.getElementById(`${method}-security`).value.trim();
            const submitBtn = document.getElementById(`${method}-submit`);

            let details = {};
            if (method === 'telebirr') {
                details.number = document.getElementById('telebirr-number').value.trim();
                details.name = document.getElementById('telebirr-name').value.trim();
            } else {
                details.address = document.getElementById('crypto-address').value.trim();
            }

            // Validation
            if (!amount || amount < 20) {
                showAlert('Minimum withdrawal is 20 USDT', 'danger');
                return;
            }

            if (method === 'telebirr' && !details.number) {
                showAlert('Please enter your Telebirr number', 'danger');
                return;
            }

            if (method === 'crypto' && !details.address) {
                showAlert('Please enter your wallet address', 'danger');
                return;
            }

            if (!securityCode || securityCode.length !== 4) {
                showAlert('Please enter your 4-digit security code', 'danger');
                return;
            }

            // Check balance
            const availableBalance = (userData.depositBalance || 0) + (userData.taskEarnings || 0);
            if (amount > availableBalance) {
                showAlert('Insufficient balance', 'danger');
                return;
            }

            // Disable button
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processing...';

            try {
                // Check security code
                const securityDoc = await db.collection('withdrawalSecurity').doc(currentUser.uid).get();
                const validCode = securityDoc.exists ? securityDoc.data().code : '0000';

                if (securityCode !== validCode) {
                    showAlert('Invalid security code. Please try again.', 'danger');
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = '<i class="fas fa-paper-plane"></i> Request Withdrawal';
                    return;
                }

                // Save withdrawal request
                const withdrawData = {
                    userId: currentUser.uid,
                    email: currentUser.email,
                    amount: amount,
                    method: method,
                    details: details,
                    status: 'pending',
                    timestamp: Date.now()
                };

                await rdb.ref('withdrawals').push(withdrawData);

                showAlert('Withdrawal request submitted! Processing within 24-48 hours.', 'success');

                // Clear form
                document.getElementById(`${method}-amount`).value = '';
                document.getElementById(`${method}-security`).value = '';
                if (method === 'telebirr') {
                    document.getElementById('telebirr-number').value = '';
                    document.getElementById('telebirr-name').value = '';
                } else {
                    document.getElementById('crypto-address').value = '';
                }

            } catch (error) {
                console.error('Withdrawal error:', error);
                showAlert('Error processing withdrawal. Please try again.', 'danger');
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fas fa-paper-plane"></i> Request Withdrawal';
            }
        }

        // Load Withdrawal History
        function loadWithdrawHistory() {
            const historyDiv = document.getElementById('withdrawHistory');
            
            rdb.ref('withdrawals')
                .orderByChild('userId')
                .equalTo(currentUser.uid)
                .limitToLast(10)
                .on('value', (snapshot) => {
                    if (!snapshot.exists()) {
                        historyDiv.innerHTML = '<div class="no-data">No withdrawals yet</div>';
                        return;
                    }

                    let withdrawals = [];
                    snapshot.forEach(child => {
                        withdrawals.push({ id: child.key, ...child.val() });
                    });

                    withdrawals.sort((a, b) => b.timestamp - a.timestamp);

                    historyDiv.innerHTML = withdrawals.map(w => {
                        const date = new Date(w.timestamp);
                        const method = w.method === 'telebirr' ? '📱 Telebirr' : '₿ Crypto';
                        
                        return `
                            <div class="history-item">
                                <div>
                                    <div class="history-amount">-${parseFloat(w.amount).toFixed(2)} USDT</div>
                                    <div class="history-date">${date.toLocaleString()}</div>
                                    <div class="history-method">${method}</div>
                                </div>
                                <span class="badge badge-${w.status || 'pending'}">${w.status || 'Pending'}</span>
                            </div>
                        `;
                    }).join('');
                });
        }
    </script>
</body>
</html>
