<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Balance Manager - SAFE Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #667eea;
            --primary-dark: #764ba2;
            --success: #2ecc71;
            --warning: #f39c12;
            --danger: #e74c3c;
            --dark: #2c3e50;
            --light: #f8f9fa;
            --gray: #6c757d;
            --bg: #1a1a2e;
            --card: #16213e;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg);
            min-height: 100vh;
            color: #fff;
        }

        .top-nav {
            background: var(--card);
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 20px rgba(0,0,0,0.3);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-brand {
            font-size: 1.3em;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-actions {
            display: flex;
            gap: 10px;
        }

        .nav-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            color: white;
            padding: 8px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85em;
            transition: all 0.3s;
            text-decoration: none;
        }

        .nav-btn:hover {
            background: rgba(255,255,255,0.2);
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Search */
        .search-card {
            background: var(--card);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .search-box {
            display: flex;
            gap: 10px;
        }

        .search-input {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            font-size: 14px;
            background: rgba(255,255,255,0.05);
            color: white;
            outline: none;
            transition: all 0.3s;
        }

        .search-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.15);
        }

        .search-input::placeholder {
            color: rgba(255,255,255,0.4);
        }

        .search-btn {
            padding: 12px 20px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            white-space: nowrap;
        }

        .search-btn:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
        }

        .search-hint {
            font-size: 0.75em;
            color: #666;
            margin-top: 8px;
        }

        /* Users List Card */
        .users-list-card {
            background: var(--card);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .card-title {
            font-size: 1em;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .card-title i { color: var(--primary); }

        .user-count {
            font-size: 0.8em;
            color: #aaa;
            background: rgba(255,255,255,0.05);
            padding: 5px 12px;
            border-radius: 15px;
        }

        .user-list-item {
            display: flex;
            align-items: center;
            padding: 12px 10px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            gap: 12px;
            cursor: pointer;
            transition: all 0.2s;
            border-radius: 8px;
        }

        .user-list-item:hover {
            background: rgba(255,255,255,0.03);
        }

        .user-list-item:last-child {
            border-bottom: none;
        }

        .user-list-item.selected {
            background: rgba(102, 126, 234, 0.15);
            border: 1px solid rgba(102, 126, 234, 0.3);
        }

        .user-list-avatar {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.9em;
            flex-shrink: 0;
        }

        .user-list-info {
            flex: 1;
            min-width: 0;
        }

        .user-list-name {
            font-weight: 600;
            font-size: 0.9em;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .user-list-email {
            font-size: 0.75em;
            color: #aaa;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .user-list-balances {
            display: flex;
            gap: 15px;
            font-size: 0.8em;
            flex-shrink: 0;
        }

        .user-list-balance {
            text-align: center;
        }

        .user-list-balance .bal-value {
            font-weight: 700;
            display: block;
        }

        .user-list-balance .bal-label {
            font-size: 0.65em;
            color: #666;
            text-transform: uppercase;
        }

        .user-list-balance.deposit .bal-value { color: #2ecc71; }
        .user-list-balance.earning .bal-value { color: #0dcaf0; }
        .user-list-balance.points .bal-value { color: #8b5cf6; }

        .user-list-arrow {
            color: #666;
            font-size: 0.8em;
        }

        .load-more-btn {
            width: 100%;
            padding: 12px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: #aaa;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.85em;
            margin-top: 10px;
            transition: all 0.2s;
        }

        .load-more-btn:hover {
            background: rgba(255,255,255,0.1);
            color: white;
        }

        /* User Edit Card */
        .user-card {
            background: var(--card);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            display: none;
        }

        .user-card.show {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .user-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .user-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1.2em;
        }

        .user-details h3 {
            font-size: 1.1em;
            margin-bottom: 3px;
        }

        .user-details span {
            font-size: 0.8em;
            color: #aaa;
        }

        .user-id {
            font-size: 0.7em;
            color: #666;
            word-break: break-all;
        }

        .close-edit-btn {
            background: none;
            border: none;
            color: #aaa;
            cursor: pointer;
            font-size: 1.2em;
            padding: 5px;
            margin-left: auto;
        }

        .close-edit-btn:hover {
            color: #e74c3c;
        }

        /* Balance Grid */
        .balance-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .balance-item {
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.08);
        }

        .balance-item label {
            display: block;
            font-size: 0.7em;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .balance-item .value {
            font-size: 1.4em;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .balance-item.deposit .value { color: #2ecc71; }
        .balance-item.earning .value { color: #0dcaf0; }
        .balance-item.points .value { color: #8b5cf6; }

        .balance-actions {
            display: flex;
            gap: 6px;
            justify-content: center;
        }

        .btn-action {
            padding: 6px 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.75em;
            transition: all 0.2s;
            color: white;
        }

        .btn-action.add { background: #2ecc71; }
        .btn-action.add:hover { background: #27ae60; }
        .btn-action.sub { background: #e74c3c; }
        .btn-action.sub:hover { background: #c0392b; }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal-box {
            background: var(--card);
            border-radius: 20px;
            padding: 25px;
            max-width: 380px;
            width: 100%;
            animation: fadeIn 0.3s ease;
        }

        .modal-box h3 {
            margin-bottom: 8px;
            font-size: 1.2em;
        }

        .modal-box .modal-sub {
            font-size: 0.8em;
            color: #aaa;
            margin-bottom: 18px;
        }

        .modal-box .current-value {
            font-size: 1.5em;
            font-weight: 700;
            margin-bottom: 15px;
            padding: 10px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            text-align: center;
        }

        .modal-box input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            font-size: 16px;
            background: rgba(255,255,255,0.05);
            color: white;
            outline: none;
            margin-bottom: 8px;
            text-align: center;
        }

        .modal-box input:focus {
            border-color: var(--primary);
        }

        .modal-box .preview {
            text-align: center;
            padding: 10px;
            font-size: 0.85em;
            color: #aaa;
            margin-bottom: 12px;
        }

        .modal-box .preview .new-val {
            font-weight: 700;
            font-size: 1.1em;
        }

        .modal-box .preview .new-val.positive { color: #2ecc71; }
        .modal-box .preview .new-val.negative { color: #e74c3c; }

        .modal-actions {
            display: flex;
            gap: 10px;
        }

        .modal-actions button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
            color: white;
            font-size: 0.9em;
        }

        .modal-actions .btn-confirm {
            background: var(--primary);
        }

        .modal-actions .btn-confirm:hover {
            background: var(--primary-dark);
        }

        .modal-actions .btn-cancel {
            background: rgba(255,255,255,0.1);
        }

        .modal-actions .btn-cancel:hover {
            background: rgba(255,255,255,0.2);
        }

        /* History */
        .history-card {
            background: var(--card);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .history-item {
            display: flex;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            gap: 10px;
            font-size: 0.85em;
        }

        .history-item:last-child {
            border-bottom: none;
        }

        .history-icon {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 0.8em;
        }

        .history-icon.add { background: rgba(46,204,113,0.2); color: #2ecc71; }
        .history-icon.sub { background: rgba(231,76,60,0.2); color: #e74c3c; }

        .history-info {
            flex: 1;
        }

        .history-field {
            color: #aaa;
            font-size: 0.75em;
        }

        .history-change {
            font-weight: 600;
        }

        .history-change.positive { color: #2ecc71; }
        .history-change.negative { color: #e74c3c; }

        .history-date {
            font-size: 0.7em;
            color: #666;
        }

        .empty-state {
            text-align: center;
            padding: 30px;
            color: #666;
        }

        .empty-state i {
            font-size: 2em;
            margin-bottom: 8px;
            opacity: 0.3;
        }

        .loading-spinner {
            text-align: center;
            padding: 20px;
        }

        .spinner {
            width: 30px;
            height: 30px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            background: #2c3e50;
            color: white;
            padding: 14px 28px;
            border-radius: 25px;
            font-weight: 500;
            z-index: 2000;
            animation: slideUp 0.3s ease;
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
            pointer-events: none;
        }

        @keyframes slideUp {
            from { transform: translateX(-50%) translateY(100px); opacity: 0; }
            to { transform: translateX(-50%) translateY(0); opacity: 1; }
        }

        @media (max-width: 600px) {
            .container {
                padding: 10px;
            }
            .balance-grid {
                grid-template-columns: 1fr;
            }
            .search-box {
                flex-direction: column;
            }
            .user-list-balances {
                flex-direction: column;
                gap: 4px;
                font-size: 0.7em;
            }
        }
    </style>
</head>
<body>
    <!-- Top Navigation -->
    <nav class="top-nav">
        <span class="nav-brand">⚡ Balance Manager</span>
        <div class="nav-actions">
            <a href="admin.html" class="nav-btn">
                <i class="fas fa-chart-bar"></i> Admin Panel
            </a>
            <a href="home.html" class="nav-btn">
                <i class="fas fa-home"></i> Home
            </a>
        </div>
    </nav>

    <div class="container">
        <!-- Search -->
        <div class="search-card">
            <div class="search-box">
                <input type="text" class="search-input" id="searchInput" 
                    placeholder="Search by User ID, Email, or Name..." 
                    oninput="window.filterUsers()">
                <button class="search-btn" onclick="window.loadAllUsers()">
                    <i class="fas fa-sync-alt"></i> Refresh
                </button>
            </div>
            <div class="search-hint">
                <i class="fas fa-info-circle"></i> Click on a user below to edit their balances
            </div>
        </div>

        <!-- Users List -->
        <div class="users-list-card">
            <div class="card-header">
                <div class="card-title">
                    <i class="fas fa-users"></i> All Users
                </div>
                <div class="user-count" id="userCount">0 users</div>
            </div>
            <div id="usersListContainer">
                <div class="loading-spinner">
                    <div class="spinner"></div>
                </div>
            </div>
        </div>

        <!-- User Edit Card -->
        <div class="user-card" id="userCard">
            <div class="user-header">
                <div class="user-avatar" id="userAvatar">U</div>
                <div class="user-details">
                    <h3 id="userName">---</h3>
                    <span id="userEmail">---</span>
                    <div class="user-id">ID: <span id="userIdDisplay">---</span></div>
                </div>
                <button class="close-edit-btn" onclick="window.closeEditUser()">
                    <i class="fas fa-times"></i>
                </button>
            </div>

            <div class="balance-grid">
                <!-- Deposit Balance -->
                <div class="balance-item deposit">
                    <label>Deposit Balance</label>
                    <div class="value" id="depositValue">0.00</div>
                    <div class="balance-actions">
                        <button class="btn-action add" onclick="window.openModal('depositBalance', 'add')">
                            <i class="fas fa-plus"></i> Add
                        </button>
                        <button class="btn-action sub" onclick="window.openModal('depositBalance', 'sub')">
                            <i class="fas fa-minus"></i> Deduct
                        </button>
                    </div>
                </div>

                <!-- Earnings Balance -->
                <div class="balance-item earning">
                    <label>Earnings Balance</label>
                    <div class="value" id="earningValue">0.00</div>
                    <div class="balance-actions">
                        <button class="btn-action add" onclick="window.openModal('taskEarnings', 'add')">
                            <i class="fas fa-plus"></i> Add
                        </button>
                        <button class="btn-action sub" onclick="window.openModal('taskEarnings', 'sub')">
                            <i class="fas fa-minus"></i> Deduct
                        </button>
                    </div>
                </div>

                <!-- Points -->
                <div class="balance-item points">
                    <label>Points</label>
                    <div class="value" id="pointsValue">0</div>
                    <div class="balance-actions">
                        <button class="btn-action add" onclick="window.openModal('points', 'add')">
                            <i class="fas fa-plus"></i> Add
                        </button>
                        <button class="btn-action sub" onclick="window.openModal('points', 'sub')">
                            <i class="fas fa-minus"></i> Deduct
                        </button>
                    </div>
                </div>
            </div>

            <!-- History for this user -->
            <div class="history-card">
                <div class="card-title">
                    <i class="fas fa-history"></i> Balance Change History
                </div>
                <div id="historyList">
                    <div class="empty-state">
                        <i class="fas fa-info-circle"></i>
                        <p>No changes recorded yet</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-box">
            <h3 id="modalTitle">Adjust Balance</h3>
            <div class="modal-sub" id="modalSub">---</div>
            <div class="current-value">Current: <span id="modalCurrent">0</span></div>
            <input type="number" id="modalAmount" placeholder="Enter amount" step="0.01" min="0.01" oninput="window.updatePreview()">
            <div class="preview">
                New value: <span class="new-val" id="modalPreview">---</span>
            </div>
            <div class="modal-actions">
                <button class="btn-cancel" onclick="window.closeModal()">Cancel</button>
                <button class="btn-confirm" id="modalConfirmBtn" onclick="window.confirmAdjust()">
                    <i class="fas fa-check"></i> Confirm
                </button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast" style="display:none;"></div>

    <script>
        // ============================================
        // CONFIGURATION
        // ============================================
        const API_BASE = window.location.origin;

        // ============================================
        // GLOBAL STATE
        // ============================================
        let allUsers = [];
        let currentUserData = null;
        let currentUserId = null;
        let currentField = null;
        let currentAction = null;

        // ============================================
        // INIT
        // ============================================
        document.addEventListener('DOMContentLoaded', () => {
            loadAllUsers();
        });

        // Close modal on outside click
        document.getElementById('modalOverlay').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        // ============================================
        // LOAD ALL USERS
        // ============================================
        async function loadAllUsers() {
            const container = document.getElementById('usersListContainer');
            container.innerHTML = '<div class="loading-spinner"><div class="spinner"></div></div>';

            try {
                const response = await fetch(`${API_BASE}/api/users/all`);
                const data = await response.json();

                if (data.success && data.users) {
                    allUsers = data.users;
                    document.getElementById('userCount').textContent = allUsers.length + ' users';
                    renderUsersList(allUsers);
                } else {
                    container.innerHTML = '<div class="empty-state"><i class="fas fa-exclamation-circle"></i><p>Failed to load users: ' + (data.error || 'Unknown error') + '</p></div>';
                }
            } catch (err) {
                console.error('Load users error:', err);
                container.innerHTML = '<div class="empty-state"><i class="fas fa-exclamation-circle"></i><p>Error loading users. Check console.</p></div>';
            }
        }

        // ============================================
        // FILTER USERS (Search)
        // ============================================
        function filterUsers() {
            const query = document.getElementById('searchInput').value.trim().toLowerCase();
            
            if (!query) {
                renderUsersList(allUsers);
                return;
            }

            const filtered = allUsers.filter(u => 
                (u.userId && u.userId.toLowerCase().includes(query)) ||
                (u.email && u.email.toLowerCase().includes(query)) ||
                (u.fullName && u.fullName.toLowerCase().includes(query))
            );

            renderUsersList(filtered);
        }

        // ============================================
        // RENDER USERS LIST
        // ============================================
        function renderUsersList(users) {
            const container = document.getElementById('usersListContainer');

            if (!users || users.length === 0) {
                container.innerHTML = '<div class="empty-state"><i class="fas fa-search"></i><p>No users found</p></div>';
                return;
            }

            // Show first 50
            const displayUsers = users.slice(0, 50);

            container.innerHTML = displayUsers.map(u => {
                const initial = (u.fullName || u.email || 'U').charAt(0).toUpperCase();
                const isSelected = currentUserId === u.userId;
                const userId = u.userId || '';

                return `
                    <div class="user-list-item ${isSelected ? 'selected' : ''}" onclick="window.selectUser('${escAttr(userId)}')" id="user-item-${escAttr(userId)}">
                        <div class="user-list-avatar">${escHtml(initial)}</div>
                        <div class="user-list-info">
                            <div class="user-list-name">${escHtml(u.fullName || 'Unknown')}</div>
                            <div class="user-list-email">${escHtml(u.email || 'No email')}</div>
                        </div>
                        <div class="user-list-balances">
                            <div class="user-list-balance deposit">
                                <span class="bal-value">$${(u.depositBalance || 0).toFixed(2)}</span>
                                <span class="bal-label">Deposit</span>
                            </div>
                            <div class="user-list-balance earning">
                                <span class="bal-value">$${(u.taskEarnings || 0).toFixed(2)}</span>
                                <span class="bal-label">Earnings</span>
                            </div>
                            <div class="user-list-balance points">
                                <span class="bal-value">${u.points || 0}</span>
                                <span class="bal-label">Points</span>
                            </div>
                        </div>
                        <div class="user-list-arrow">
                            <i class="fas fa-chevron-right"></i>
                        </div>
                    </div>`;
            }).join('');

            if (users.length > 50) {
                container.innerHTML += `<div class="empty-state" style="padding:15px;"><p>Showing 50 of ${users.length} users. Use search to filter.</p></div>`;
            }
        }

        // ============================================
        // SELECT USER (Click from list)
        // ============================================
        async function selectUser(userId) {
            if (!userId) {
                showToast('❌ Invalid user ID');
                return;
            }
            
            showToast('🔄 Loading user...');

            try {
                const response = await fetch(`${API_BASE}/api/user/${encodeURIComponent(userId)}`);
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                
                const data = await response.json();

                if (data.success && data.user) {
                    displayUser(userId, data.user);

                    // Highlight selected
                    document.querySelectorAll('.user-list-item').forEach(el => el.classList.remove('selected'));
                    const item = document.getElementById(`user-item-${userId}`);
                    if (item) {
                        item.classList.add('selected');
                        item.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }
                } else {
                    showToast('❌ User not found: ' + (data.error || ''));
                }
            } catch (err) {
                console.error('Select user error:', err);
                showToast('❌ Error loading user. Make sure the API endpoint exists.');
            }
        }

        // ============================================
        // DISPLAY USER (Edit Card)
        // ============================================
        function displayUser(userId, userData) {
            currentUserData = userData;
            currentUserId = userId;

            document.getElementById('userCard').classList.add('show');
            document.getElementById('userAvatar').textContent = 
                (userData.firstName || userData.fullName || 'U').charAt(0).toUpperCase();
            document.getElementById('userName').textContent = userData.fullName || userData.firstName || 'User';
            document.getElementById('userEmail').textContent = userData.email || 'No email';
            document.getElementById('userIdDisplay').textContent = userId;

            document.getElementById('depositValue').textContent = 
                '$' + (userData.depositBalance || 0).toFixed(2);
            document.getElementById('earningValue').textContent = 
                '$' + (userData.taskEarnings || 0).toFixed(2);
            document.getElementById('pointsValue').textContent = 
                (userData.points || 0) + ' pts';

            // Scroll to edit card
            document.getElementById('userCard').scrollIntoView({ behavior: 'smooth' });

            // Load history
            loadHistory(userId);

            showToast('✅ User loaded');
        }

        // ============================================
        // CLOSE EDIT USER
        // ============================================
        function closeEditUser() {
            document.getElementById('userCard').classList.remove('show');
            currentUserData = null;
            currentUserId = null;
            
            // Remove selection highlight
            document.querySelectorAll('.user-list-item').forEach(el => el.classList.remove('selected'));
        }

        // ============================================
        // OPEN MODAL
        // ============================================
        function openModal(field, action) {
            if (!currentUserData) {
                showToast('⚠️ Please select a user first');
                return;
            }

            currentField = field;
            currentAction = action;

            const fieldNames = {
                'depositBalance': 'Deposit Balance',
                'taskEarnings': 'Earnings Balance',
                'points': 'Points'
            };

            const currentValue = currentUserData[field] || 0;
            const suffix = field === 'points' ? ' pts' : ' USDT';

            document.getElementById('modalTitle').textContent = 
                action === 'add' ? `➕ Add ${fieldNames[field]}` : `➖ Deduct ${fieldNames[field]}`;
            document.getElementById('modalSub').textContent = 
                `User: ${currentUserData.fullName || currentUserData.email || currentUserId}`;
            document.getElementById('modalCurrent').textContent = currentValue + suffix;
            document.getElementById('modalAmount').value = '';
            document.getElementById('modalPreview').textContent = '---';
            document.getElementById('modalPreview').className = 'new-val';

            document.getElementById('modalOverlay').classList.add('show');
            setTimeout(() => {
                const input = document.getElementById('modalAmount');
                if (input) input.focus();
            }, 150);
        }

        // ============================================
        // CLOSE MODAL
        // ============================================
        function closeModal() {
            document.getElementById('modalOverlay').classList.remove('show');
            currentField = null;
            currentAction = null;
        }

        // ============================================
        // UPDATE PREVIEW
        // ============================================
        function updatePreview() {
            const amount = parseFloat(document.getElementById('modalAmount').value) || 0;
            const currentValue = currentUserData?.[currentField] || 0;
            const suffix = currentField === 'points' ? ' pts' : ' USDT';
            const decimals = currentField === 'points' ? 0 : 2;
            
            let newValue;
            if (currentAction === 'add') {
                newValue = currentValue + amount;
                document.getElementById('modalPreview').className = 'new-val positive';
            } else {
                newValue = Math.max(0, currentValue - amount);
                document.getElementById('modalPreview').className = 'new-val negative';
            }

            document.getElementById('modalPreview').textContent = 
                newValue.toFixed(decimals) + suffix;
        }

        // ============================================
        // CONFIRM ADJUST
        // ============================================
        async function confirmAdjust() {
            const amount = parseFloat(document.getElementById('modalAmount').value);
            
            if (!amount || amount <= 0) {
                showToast('⚠️ Please enter a valid amount');
                return;
            }

            if (!currentUserId || !currentField) {
                showToast('⚠️ No user selected');
                return;
            }

            const currentValue = currentUserData[currentField] || 0;
            let newValue;

            if (currentAction === 'add') {
                newValue = currentValue + amount;
            } else {
                newValue = Math.max(0, currentValue - amount);
            }

            // Show loading state
            const confirmBtn = document.getElementById('modalConfirmBtn');
            const originalHtml = confirmBtn.innerHTML;
            confirmBtn.innerHTML = '<div class="spinner" style="width:16px;height:16px;border-width:2px;"></div>';
            confirmBtn.disabled = true;

            try {
                const updateData = {};
                updateData[currentField] = newValue;

                const response = await fetch(`${API_BASE}/api/user/${encodeURIComponent(currentUserId)}/update`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(updateData)
                });

                const data = await response.json();

                if (data.success) {
                    // Update local data
                    currentUserData[currentField] = newValue;
                    
                    // Refresh display                    document.getElementById('depositValue').textContent = 
                        '$' + (currentUserData.depositBalance || 0).toFixed(2);
                    document.getElementById('earningValue').textContent = 
                        '$' + (currentUserData.taskEarnings || 0).toFixed(2);
                    document.getElementById('pointsValue').textContent = 
                        (currentUserData.points || 0) + ' pts';

                    // Update user in allUsers list
                    const userIndex = allUsers.findIndex(u => u.userId === currentUserId);
                    if (userIndex !== -1) {
                        allUsers[userIndex][currentField] = newValue;
                    }

                    // Save to history
                    saveHistory(currentUserId, {
                        field: currentField,
                        action: currentAction,
                        amount: amount,
                        previousValue: currentValue,
                        newValue: newValue,
                        timestamp: new Date().toISOString()
                    });

                    const actionText = currentAction === 'add' ? 'Added' : 'Deducted';
                    const suffix = currentField === 'points' ? ' pts' : ' USDT';
                    showToast(`✅ ${actionText} ${amount}${suffix}`);

                    closeModal();
                    loadHistory(currentUserId);
                    
                    // Refresh the list to show updated balances
                    const query = document.getElementById('searchInput').value.trim().toLowerCase();
                    const filteredUsers = query ? allUsers.filter(u => 
                        (u.userId && u.userId.toLowerCase().includes(query)) ||
                        (u.email && u.email.toLowerCase().includes(query)) ||
                        (u.fullName && u.fullName.toLowerCase().includes(query))
                    ) : allUsers;
                    renderUsersList(filteredUsers);
                    
                    // Keep selection highlight
                    const item = document.getElementById(`user-item-${currentUserId}`);
                    if (item) item.classList.add('selected');
                } else {
                    showToast('❌ Error: ' + (data.error || 'Update failed'));
                }

            } catch (err) {
                console.error('Update error:', err);
                showToast('❌ Network error. Check if server has POST /api/user/:id/update endpoint');
            } finally {
                confirmBtn.innerHTML = originalHtml;
                confirmBtn.disabled = false;
            }
        }

        // ============================================
        // BALANCE HISTORY (localStorage)
        // ============================================
        function saveHistory(userId, entry) {
            try {
                const key = `balance_history_${userId}`;
                const history = JSON.parse(localStorage.getItem(key) || '[]');
                history.unshift(entry);
                if (history.length > 50) history.pop();
                localStorage.setItem(key, JSON.stringify(history));
            } catch (e) {
                console.warn('Could not save history to localStorage');
            }
        }

        function loadHistory(userId) {
            try {
                const key = `balance_history_${userId}`;
                const history = JSON.parse(localStorage.getItem(key) || '[]');
                displayHistory(history);
            } catch (e) {
                displayHistory([]);
            }
        }

        function displayHistory(history) {
            const container = document.getElementById('historyList');

            if (!history || history.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-clock"></i>
                        <p>No balance changes yet</p>
                    </div>`;
                return;
            }

            const fieldNames = {
                'depositBalance': 'Deposit Balance',
                'taskEarnings': 'Earnings Balance',
                'points': 'Points'
            };

            container.innerHTML = history.slice(0, 20).map(entry => {
                const date = entry.timestamp ? new Date(entry.timestamp) : new Date();
                const timeStr = date.toLocaleString();
                const isAdd = entry.action === 'add';
                const suffix = entry.field === 'points' ? ' pts' : ' USDT';
                const decimals = entry.field === 'points' ? 0 : 2;
                const changeAmount = (isAdd ? '+' : '-') + (entry.amount || 0).toFixed(decimals) + suffix;
                const newVal = (entry.newValue || 0).toFixed(decimals) + suffix;

                return `
                    <div class="history-item">
                        <div class="history-icon ${isAdd ? 'add' : 'sub'}">
                            <i class="fas fa-${isAdd ? 'plus' : 'minus'}"></i>
                        </div>
                        <div class="history-info">
                            <div><strong>${fieldNames[entry.field] || entry.field}</strong></div>
                            <div class="history-field">
                                ${(entry.previousValue || 0).toFixed(decimals)}${suffix} 
                                → ${newVal}
                            </div>
                            <div class="history-date">${timeStr}</div>
                        </div>
                        <div class="history-change ${isAdd ? 'positive' : 'negative'}">
                            ${changeAmount}
                        </div>
                    </div>`;
            }).join('');
        }

        // ============================================
        // TOAST
        // ============================================
        function showToast(msg) {
            const toast = document.getElementById('toast');
            if (!toast) return;
            
            toast.textContent = msg;
            toast.style.display = 'block';
            toast.style.opacity = '1';

            clearTimeout(window._toastTimeout);
            window._toastTimeout = setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transition = 'opacity 0.3s';
                setTimeout(() => { 
                    toast.style.display = 'none'; 
                    toast.style.transition = '';
                }, 300);
            }, 3000);
        }

        // ============================================
        // HELPERS
        // ============================================
        function escHtml(str) {
            if (!str) return '';
            const d = document.createElement('div');
            d.textContent = str;
            return d.innerHTML;
        }
        
        function escAttr(str) {
            if (!str) return '';
            return str.replace(/'/g, "\\'").replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        // ============================================
        // GLOBAL EXPORTS (for onclick handlers)
        // ============================================
        window.selectUser = selectUser;
        window.closeEditUser = closeEditUser;
        window.openModal = openModal;
        window.closeModal = closeModal;
        window.confirmAdjust = confirmAdjust;
        window.updatePreview = updatePreview;
        window.filterUsers = filterUsers;
        window.loadAllUsers = loadAllUsers;

        console.log('✅ Balance Manager ready');
        console.log('🔗 API Base:', API_BASE);
        console.log('💡 Make sure these API endpoints exist:');
        console.log('   GET  /api/users/all');
        console.log('   GET  /api/user/:userId');
        console.log('   POST /api/user/:userId/update');
    </script>
</body>
