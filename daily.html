<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Tasks - SAFE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 550px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 25px;
        }

        .header {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
            gap: 15px;
        }

        .back-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #f5f5f5;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
            border: none;
            color: #333;
            font-size: 18px;
        }

        .back-btn:hover {
            background: #e0e0e0;
            transform: scale(1.05);
        }

        h1 {
            color: #333;
            font-size: 24px;
        }

        /* Earnings Card */
        .earnings-card {
            background: linear-gradient(135deg, #17a2b8, #0dcaf0);
            color: white;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            margin-bottom: 20px;
            box-shadow: 0 10px 20px rgba(23, 162, 184, 0.3);
        }

        .earnings-label {
            font-size: 13px;
            opacity: 0.9;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .earnings-amount {
            font-size: 38px;
            font-weight: 700;
            margin: 8px 0;
        }

        .earnings-sub {
            font-size: 12px;
            opacity: 0.8;
        }

        /* Weekend Notice */
        .weekend-notice {
            background: #fff3cd;
            color: #856404;
            padding: 14px 18px;
            border-radius: 12px;
            margin-bottom: 20px;
            text-align: center;
            font-size: 14px;
            border: 2px solid #ffc107;
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .weekend-notice.show {
            display: block;
        }

        .weekend-notice i {
            margin-right: 8px;
        }

        /* Task Section */
        .task-section {
            margin-bottom: 20px;
        }

        .task-section h3 {
            color: #333;
            margin-bottom: 15px;
            font-size: 18px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .task-item {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 18px;
            margin-bottom: 12px;
            border-left: 5px solid #667eea;
            transition: all 0.3s;
            position: relative;
        }

        .task-item:hover {
            transform: translateX(5px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .task-item.claimed {
            border-left-color: #28a745;
            opacity: 0.7;
        }

        .task-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .task-name {
            font-weight: 700;
            color: #333;
            font-size: 16px;
        }

        .task-reward {
            font-weight: 700;
            color: #28a745;
            font-size: 16px;
            background: #d4edda;
            padding: 4px 12px;
            border-radius: 20px;
        }

        .task-info {
            display: flex;
            justify-content: space-between;
            color: #666;
            font-size: 13px;
            margin-bottom: 12px;
            flex-wrap: wrap;
            gap: 6px;
        }

        .claim-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .claim-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 15px rgba(102, 126, 234, 0.3);
        }

        .claim-btn:disabled {
            background: #adb5bd;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .claim-btn.loading {
            pointer-events: none;
            opacity: 0.7;
        }

        .claim-btn .spinner {
            display: none;
            width: 16px;
            height: 16px;
            border: 2px solid white;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        .claim-btn.loading .spinner {
            display: inline-block;
        }

        .claim-btn.loading .btn-text {
            display: none;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .claimed-badge {
            width: 100%;
            padding: 12px;
            background: #d4edda;
            color: #155724;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            text-align: center;
        }

        .claimed-badge i {
            margin-right: 5px;
        }

        /* No Tasks */
        .no-tasks {
            text-align: center;
            padding: 40px 20px;
            background: #f8f9fa;
            border-radius: 15px;
            color: #999;
        }

        .no-tasks i {
            font-size: 48px;
            margin-bottom: 15px;
            color: #dee2e6;
        }

        .no-tasks p {
            font-size: 14px;
            margin-bottom: 15px;
        }

        .buy-product-btn {
            display: inline-block;
            padding: 10px 25px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border-radius: 25px;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s;
        }

        .buy-product-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 15px rgba(102, 126, 234, 0.3);
        }

        /* Alert */
        .alert {
            padding: 12px 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            font-size: 14px;
            display: none;
            text-align: center;
        }

        .alert.show {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-danger {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .alert-info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        /* Stats Row */
        .stats-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }

        .stat-card {
            padding: 14px 12px;
            border-radius: 12px;
            text-align: center;
            color: white;
            font-size: 13px;
        }

        .stat-card.total {
            background: linear-gradient(135deg, #6f42c1, #8b5cf6);
        }

        .stat-card.today {
            background: linear-gradient(135deg, #28a745, #20c997);
        }

        .stat-value {
            font-size: 24px;
            font-weight: 700;
            margin: 3px 0;
        }

        .stat-label {
            font-size: 11px;
            opacity: 0.9;
        }

        /* Loading */
        .loading-box {
            text-align: center;
            padding: 30px;
            color: #999;
        }

        .spinner-big {
            width: 35px;
            height: 35px;
            border: 3px solid #e1e5e9;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 12px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Responsive */
        @media (max-width: 480px) {
            .container {
                padding: 15px;
            }

            .earnings-amount {
                font-size: 30px;
            }

            .task-item {
                padding: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <button class="back-btn" onclick="window.location.href='home.html'">
                <i class="fas fa-arrow-left"></i>
            </button>
            <h1>Daily Tasks</h1>
        </div>

        <!-- Earnings Card -->
        <div class="earnings-card">
            <div class="earnings-label">Total Earnings</div>
            <div class="earnings-amount" id="totalEarnings">0.00</div>
            <div class="earnings-sub">USDT (Withdrawable)</div>
        </div>

        <!-- Stats -->
        <div class="stats-row">
            <div class="stat-card total">
                <div class="stat-label">Active Products</div>
                <div class="stat-value" id="activeProducts">0</div>
            </div>
            <div class="stat-card today">
                <div class="stat-label">Claimed Today</div>
                <div class="stat-value" id="claimedToday">0</div>
            </div>
        </div>

        <!-- Weekend Notice -->
        <div class="weekend-notice" id="weekendNotice">
            <i class="fas fa-calendar-alt"></i> 
            <strong>Weekend Break:</strong> Earnings can only be claimed on weekdays (Monday-Friday). Please return on Monday.
        </div>

        <!-- Alert -->
        <div id="alertMessage" class="alert"></div>

        <!-- Tasks List -->
        <div class="task-section">
            <h3><i class="fas fa-list-check"></i> Your Daily Earnings</h3>
            <div id="tasksContainer">
                <div class="loading-box">
                    <div class="spinner-big"></div>
                    <p>Loading investments...</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js';
        import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js';

        // ============================================
        // FIREBASE CONFIG
        // ============================================
        const firebaseConfig = {
            apiKey: "AIzaSyD4t4GUzN1xkyia0o3zx9i2cX2004Epv7A",
            authDomain: "webapp-fc856.firebaseapp.com",
            projectId: "webapp-fc856",
            storageBucket: "webapp-fc856.appspot.com",
            messagingSenderId: "892830607693",
            appId: "1:892830607693:web:a3a886c142586665fc2f04"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // ============================================
        // CONFIGURATION
        // ============================================
        const API_BASE = window.location.origin;

        // ============================================
        // GLOBAL STATE
        // ============================================
        let currentUser = null;
        let allInvestments = [];
        let isWeekendDay = false;

        // ============================================
        // AUTH CHECK
        // ============================================
        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.href = 'index.html';
                return;
            }
            currentUser = user;
            console.log('👤 Logged in:', currentUser.uid);
            
            await checkWeekendStatus();
            await loadUserData();
            await loadInvestments();
        });

        // ============================================
        // CHECK WEEKEND STATUS FROM SERVER
        // ============================================
        async function checkWeekendStatus() {
            if (!currentUser) return;
            
            try {
                const response = await fetch(`${API_BASE}/api/daily/check/${currentUser.uid}`);
                const data = await response.json();
                
                isWeekendDay = data.isWeekend || false;
                
                if (isWeekendDay) {
                    document.getElementById('weekendNotice').classList.add('show');
                } else {
                    document.getElementById('weekendNotice').classList.remove('show');
                }
            } catch (err) {
                console.error('Error checking weekend:', err);
                // Fallback: check locally
                const day = new Date().getDay();
                isWeekendDay = (day === 0 || day === 6);
                if (isWeekendDay) {
                    document.getElementById('weekendNotice').classList.add('show');
                }
            }
        }

        // ============================================
        // LOAD USER DATA FROM SERVER
        // ============================================
        async function loadUserData() {
            if (!currentUser) return;
            
            try {
                const response = await fetch(`${API_BASE}/api/user/${currentUser.uid}`);
                const data = await response.json();
                
                if (data.success && data.user) {
                    const taskEarnings = data.user.taskEarnings || 0;
                    document.getElementById('totalEarnings').textContent = taskEarnings.toFixed(2);
                }
            } catch (error) {
                console.error('Error loading user data:', error);
            }
        }

        // ============================================
        // LOAD INVESTMENTS FROM SERVER
        // ============================================
        async function loadInvestments() {
            if (!currentUser) return;
            
            try {
                const response = await fetch(`${API_BASE}/api/investment/${currentUser.uid}`);
                const data = await response.json();
                
                if (!data.success) {
                    throw new Error('Failed to load investments');
                }
                
                allInvestments = data.investments || [];
                
                // Update stats
                document.getElementById('activeProducts').textContent = allInvestments.length;
                
                // Count claimed today (investments with lastClaimDate = today)
                const today = new Date();
                today.setHours(0, 0, 0, 0);
                let claimedCount = 0;
                allInvestments.forEach(inv => {
                    if (inv.lastClaimDate) {
                        const claimDate = new Date(inv.lastClaimDate);
                        claimDate.setHours(0, 0, 0, 0);
                        if (claimDate.getTime() === today.getTime()) {
                            claimedCount++;
                        }
                    }
                });
                document.getElementById('claimedToday').textContent = claimedCount;
                
                // Render tasks
                renderTasks();
                
            } catch (error) {
                console.error('Error loading investments:', error);
                document.getElementById('tasksContainer').innerHTML = `
                    <div class="no-tasks">
                        <i class="fas fa-exclamation-circle"></i>
                        <p>Error loading investments. Please try again.</p>
                    </div>`;
            }
        }

        // ============================================
        // RENDER TASKS
        // ============================================
        function renderTasks() {
            const container = document.getElementById('tasksContainer');
            
            if (allInvestments.length === 0) {
                container.innerHTML = `
                    <div class="no-tasks">
                        <i class="fas fa-box-open"></i>
                        <p>No active investments yet</p>
                        <a href="product.html" class="buy-product-btn">
                            <i class="fas fa-gem"></i> Buy Products
                        </a>
                    </div>`;
                return;
            }
            
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            
            container.innerHTML = allInvestments.map(inv => {
                // Calculate daily earnings
                let dailyEarnings;
                if (inv.isFixed) {
                    dailyEarnings = inv.dailyEarnings;
                } else {
                    dailyEarnings = (inv.amount * inv.dailyEarnings) / 100;
                }
                
                // Check if claimed today
                let alreadyClaimed = false;
                if (inv.lastClaimDate) {
                    const claimDate = new Date(inv.lastClaimDate);
                    claimDate.setHours(0, 0, 0, 0);
                    if (claimDate.getTime() === today.getTime()) {
                        alreadyClaimed = true;
                    }
                }
                
                const daysLeft = inv.daysLeft || 0;
                const progress = inv.progress || 0;
                const totalEarned = inv.totalEarned || 0;
                const amount = inv.amount || 0;
                
                const canClaim = !alreadyClaimed && !isWeekendDay;
                
                return `
                    <div class="task-item ${alreadyClaimed ? 'claimed' : ''}">
                        <div class="task-header">
                            <span class="task-name">
                                <i class="fas fa-gem"></i> ${inv.productName}
                            </span>
                            <span class="task-reward">+${dailyEarnings.toFixed(2)} USDT</span>
                        </div>
                        <div class="task-info">
                            <span><i class="fas fa-calendar"></i> Days left: ${daysLeft}</span>
                            <span><i class="fas fa-chart-line"></i> Progress: ${progress.toFixed(0)}%</span>
                        </div>
                        <div class="task-info">
                            <span><i class="fas fa-coins"></i> Amount: ${amount} USDT</span>
                            <span><i class="fas fa-piggy-bank"></i> Earned: ${totalEarned.toFixed(2)} USDT</span>
                        </div>
                        ${canClaim ? `
                            <button class="claim-btn" id="claim-btn-${inv.id}" onclick="claimEarnings('${inv.id}', '${inv.productName}')">
                                <span class="spinner"></span>
                                <span class="btn-text"><i class="fas fa-hand-holding-usd"></i> Claim Earnings</span>
                            </button>
                        ` : `
                            <div class="claimed-badge">
                                <i class="fas fa-check-circle"></i> 
                                ${alreadyClaimed ? 'Claimed Today' : 'Weekend - Return Monday'}
                            </div>
                        `}
                    </div>
                `;
            }).join('');
        }

        // ============================================
        // CLAIM DAILY EARNINGS VIA SERVER API
        // ============================================
        async function claimEarnings(investmentId, productName) {
            if (!currentUser) return;
            
            if (isWeekendDay) {
                showAlert('Cannot claim on weekends. Please return on Monday.', 'danger');
                return;
            }
            
            const btn = document.getElementById(`claim-btn-${investmentId}`);
            if (btn) {
                btn.disabled = true;
                btn.classList.add('loading');
            }
            
            try {
                const response = await fetch(`${API_BASE}/api/daily/claim`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        userId: currentUser.uid,
                        investmentId: investmentId
                    })
                });
                
                const result = await response.json();
                
                if (!response.ok || !result.success) {
                    throw new Error(result.error || 'Failed to claim earnings');
                }
                
                const earnings = result.earnings || 0;
                showAlert(`✅ Successfully claimed ${earnings.toFixed(2)} USDT from ${productName}!`, 'success');
                
                // Refresh data
                await loadUserData();
                await loadInvestments();
                
            } catch (error) {
                console.error('Error claiming:', error);
                showAlert('Error: ' + (error.message || 'Failed to claim earnings. Try again.'), 'danger');
                
                if (btn) {
                    btn.disabled = false;
                    btn.classList.remove('loading');
                }
            }
        }

        // ============================================
        // SHOW ALERT
        // ============================================
        function showAlert(message, type) {
            const alert = document.getElementById('alertMessage');
            alert.textContent = message;
            alert.className = `alert alert-${type} show`;
            setTimeout(() => alert.classList.remove('show'), 5000);
        }

        // ============================================
        // GLOBAL EXPORTS
        // ============================================
        window.claimEarnings = claimEarnings;

        console.log('✅ Daily tasks page ready');
        console.log('🔗 API Base:', API_BASE);
        console.log('📅 Weekend detection from server');
        console.log('💰 Claims processed via server API');
    </script>
</body>
</html>
