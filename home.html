<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Home</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0e1621;
            color: white;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            text-align: center;
        }
        h1 { color: #4c9ce0; }
        .links {
            margin-top: 30px;
        }
        a {
            display: inline-block;
            margin: 10px;
            padding: 12px 24px;
            background: #2b3945;
            color: #6ab2f2;
            text-decoration: none;
            border-radius: 8px;
        }
        a:hover {
            background: #3a4a5a;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📱 Telegram Manager</h1>
        <p>Your accounts are loaded successfully!</p>
        <div class="links">
            <a href="/dashboard">Go to Dashboard</a>
            <a href="/login">Add Another Account</a>
        </div>
    </div>
</body>
</html>
