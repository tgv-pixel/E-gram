<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - SAFE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 25px;
            position: relative;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-actions {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .notification-btn {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: #f5f5f5;
            color: #666;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s;
            border: none;
            position: relative;
        }

        .notification-btn:hover {
            background: #e0e0e0;
            color: var(--primary);
        }

        .badge {
            position: absolute;
            top: -2px;
            right: -2px;
            background: #e74c3c;
            color: white;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 10px;
            min-width: 18px;
            text-align: center;
            font-weight: 700;
        }

        .profile-icon {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.3s;
            border: 3px solid white;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.2);
        }

        .profile-icon:hover {
            transform: scale(1.05);
        }

        /* User Welcome */
        .welcome {
            text-align: center;
            margin-bottom: 20px;
        }

        .welcome h2 {
            color: #333;
            font-size: 22px;
            margin-bottom: 5px;
        }

        .welcome .uid {
            color: #666;
            font-size: 12px;
            background: #f5f5f5;
            padding: 5px 15px;
            border-radius: 20px;
            display: inline-block;
        }

        /* Balance Cards */
        .balance-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 25px;
        }

        .balance-card {
            padding: 15px 10px;
            border-radius: 15px;
            text-align: center;
            color: white;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s;
        }

        .balance-card:active {
            transform: scale(0.95);
        }

        .balance-card.deposit {
            background: linear-gradient(135deg, #28a745, #20c997);
        }

        .balance-card.earning {
            background: linear-gradient(135deg, #17a2b8, #0dcaf0);
        }

        .balance-card.points {
            background: linear-gradient(135deg, #6f42c1, #8b5cf6);
        }

        .balance-icon {
            font-size: 20px;
            margin-bottom: 5px;
            opacity: 0.9;
        }

        .balance-amount {
            font-size: 20px;
            font-weight: 700;
            margin: 5px 0;
        }

        .balance-label {
            font-size: 11px;
            opacity: 0.9;
            text-transform: uppercase;
        }

        .balance-sub {
            font-size: 9px;
            opacity: 0.7;
            margin-top: 2px;
        }

        /* Navigation Grid */
        .nav-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 25px;
        }

        .nav-item {
            padding: 18px 10px;
            border-radius: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: #f8f9fa;
            border: 2px solid transparent;
            text-decoration: none;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .nav-item:hover {
            transform: translateY(-3px);
            border-color: #667eea;
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.2);
        }

        .nav-item:active {
            transform: scale(0.95);
        }

        .nav-item i {
            font-size: 28px;
            color: #667eea;
        }

        .nav-item span {
            font-size: 13px;
            font-weight: 500;
        }

        /* Referral Banner */
        .referral-banner {
            background: linear-gradient(135deg, #ffc107, #fd7e14);
            color: white;
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 20px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.3s;
            box-shadow: 0 5px 15px rgba(255, 193, 7, 0.3);
        }

        .referral-banner:hover {
            transform: translateY(-3px);
        }

        .referral-banner i {
            font-size: 24px;
            margin-right: 8px;
        }

        .referral-banner .bonus {
            font-size: 18px;
            font-weight: 700;
        }

        .referral-banner .bonus-small {
            font-size: 0.8em;
            opacity: 0.9;
        }

        /* Logout Button */
        .logout-btn {
            width: 100%;
            padding: 14px;
            background: #dc3545;
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 600;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .logout-btn:hover {
            background: #c82333;
            transform: translateY(-2px);
        }

        /* Loading State */
        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .loading i {
            font-size: 40px;
            color: #667eea;
            margin-bottom: 10px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #e1e5e9;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Responsive */
        @media (max-width: 480px) {
            .container {
                padding: 15px;
            }

            .balance-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 8px;
            }

            .nav-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 8px;
            }

            .balance-card {
                padding: 12px 8px;
            }

            .balance-amount {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="logo">SAFE</div>
            <div class="header-actions">
                <button class="notification-btn" onclick="navigateTo('notification.html')" title="Notifications">
                    <i class="fas fa-bell"></i>
                    <span class="badge" id="notificationBadge" style="display:none;">0</span>
                </button>
                <div class="profile-icon" id="profileIcon" title="Click for options">U</div>
            </div>
        </div>

        <!-- Welcome -->
        <div class="welcome">
            <h2 id="welcomeName">Welcome!</h2>
            <div class="uid">ID: <span id="userIdDisplay">---</span></div>
        </div>

        <!-- Balance Cards -->
        <div class="balance-grid">
            <div class="balance-card deposit" onclick="navigateTo('deposit.html')">
                <div class="balance-icon"><i class="fas fa-wallet"></i></div>
                <div class="balance-amount" id="depositBalance">0.00</div>
                <div class="balance-label">Deposit</div>
                <div class="balance-sub">For Investment</div>
            </div>
            <div class="balance-card earning" onclick="navigateTo('withdraw.html')">
                <div class="balance-icon"><i class="fas fa-chart-line"></i></div>
                <div class="balance-amount" id="earningBalance">0.00</div>
                <div class="balance-label">Earnings</div>
                <div class="balance-sub">Withdrawable</div>
            </div>
            <div class="balance-card points">
                <div class="balance-icon"><i class="fas fa-star"></i></div>
                <div class="balance-amount" id="pointsBalance">0</div>
                <div class="balance-label">Points</div>
                <div class="balance-sub">For Fees</div>
            </div>
        </div>

        <!-- Navigation -->
        <div class="nav-grid">
            <div class="nav-item" onclick="navigateTo('deposit.html')">
                <i class="fas fa-plus-circle"></i>
                <span>Deposit</span>
            </div>
            <div class="nav-item" onclick="navigateTo('withdraw.html')">
                <i class="fas fa-minus-circle"></i>
                <span>Withdraw</span>
            </div>
            <div class="nav-item" onclick="navigateTo('product.html')">
                <i class="fas fa-gem"></i>
                <span>Products</span>
            </div>
            <div class="nav-item" onclick="navigateTo('daily.html')">
                <i class="fas fa-tasks"></i>
                <span>Daily Tasks</span>
            </div>
            <div class="nav-item" onclick="navigateTo('referral.html')">
                <i class="fas fa-users"></i>
                <span>Referrals</span>
            </div>
            <div class="nav-item" onclick="navigateTo('notification.html')">
                <i class="fas fa-bell"></i>
                <span>Alerts</span>
                <span class="badge" id="navNotificationBadge" style="display:none;position:static;font-size:10px;padding:2px 6px;border-radius:10px;background:#e74c3c;color:white;">0</span>
            </div>
        </div>

        <!-- Referral Banner -->
        <div class="referral-banner" onclick="navigateTo('referral.html')">
            <i class="fas fa-gift"></i>
            Earn <span class="bonus">10% Balance + 100 Points</span><br>
            <span class="bonus-small">per referral first deposit! Invite friends now →</span>
        </div>

        <!-- Logout -->
        <button class="logout-btn" onclick="logout()">
            <i class="fas fa-sign-out-alt"></i> Logout
        </button>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js';
        import { getAuth, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js';

        // ============================================
        // FIREBASE CONFIG
        // ============================================
        const firebaseConfig = {
            apiKey: "AIzaSyD4t4GUzN1xkyia0o3zx9i2cX2004Epv7A",
            authDomain: "webapp-fc856.firebaseapp.com",
            projectId: "webapp-fc856",
            storageBucket: "webapp-fc856.appspot.com",
            messagingSenderId: "892830607693",
            appId: "1:892830607693:web:a3a886c142586665fc2f04"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // ============================================
        // CONFIGURATION
        // ============================================
        const API_BASE = window.location.origin;

        // ============================================
        // GLOBAL STATE
        // ============================================
        let currentUser = null;

        // ============================================
        // AUTH CHECK
        // ============================================
        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.href = 'index.html';
                return;
            }
            currentUser = user;
            console.log('👤 Logged in:', currentUser.uid);
            
            await loadUserData();
            await loadNotifications();
        });

        // ============================================
        // LOAD USER DATA FROM SERVER
        // ============================================
        async function loadUserData() {
            if (!currentUser) return;
            
            try {
                const response = await fetch(`${API_BASE}/api/user/${currentUser.uid}`);
                const data = await response.json();
                
                if (data.success && data.user) {
                    const userData = data.user;
                    
                    // Update Profile
                    const firstName = userData.firstName || '';
                    const lastName = userData.lastName || '';
                    const fullName = `${firstName} ${lastName}`.trim() || userData.fullName || 'User';
                    
                    document.getElementById('welcomeName').textContent = `Welcome, ${fullName}!`;
                    document.getElementById('userIdDisplay').textContent = currentUser.uid.substring(0, 12) + '...';
                    
                    // Profile Icon
                    const initial = firstName ? firstName.charAt(0).toUpperCase() : 'U';
                    document.getElementById('profileIcon').textContent = initial;
                    
                    // Update Balances
                    document.getElementById('depositBalance').textContent = 
                        (userData.depositBalance || 0).toFixed(2);
                    document.getElementById('earningBalance').textContent = 
                        (userData.taskEarnings || 0).toFixed(2);
                    document.getElementById('pointsBalance').textContent = 
                        userData.points || 0;
                    
                    // Profile Icon Click
                    document.getElementById('profileIcon').onclick = () => {
                        const referralCode = userData.referralCode || 'N/A';
                        const email = userData.email || currentUser.email || 'N/A';
                        alert(`👤 User Info\n\nName: ${fullName}\nEmail: ${email}\nID: ${currentUser.uid}\nReferral Code: ${referralCode}\n\nDeposit Balance: ${(userData.depositBalance || 0).toFixed(2)} USDT\nEarnings: ${(userData.taskEarnings || 0).toFixed(2)} USDT\nPoints: ${userData.points || 0}`);
                    };
                    
                    console.log('✅ User data loaded from server');
                }
            } catch (error) {
                console.error('Error loading user data:', error);
            }
        }

        // ============================================
        // LOAD NOTIFICATIONS FROM SERVER
        // ============================================
        async function loadNotifications() {
            if (!currentUser) return;
            
            try {
                const response = await fetch(`${API_BASE}/api/notifications/${currentUser.uid}`);
                const data = await response.json();
                
                if (data.success && data.unreadCount > 0) {
                    const count = data.unreadCount > 99 ? '99+' : data.unreadCount;
                    
                    // Header badge
                    const badge = document.getElementById('notificationBadge');
                    badge.textContent = count;
                    badge.style.display = 'block';
                    
                    // Nav badge
                    const navBadge = document.getElementById('navNotificationBadge');
                    navBadge.textContent = count;
                    navBadge.style.display = 'inline-block';
                }
            } catch (err) {
                console.error('Error loading notifications:', err);
            }
        }

        // ============================================
        // NAVIGATION
        // ============================================
        function navigateTo(page) {
            window.location.href = page;
        }

        // ============================================
        // LOGOUT
        // ============================================
        async function logout() {
            try {
                await signOut(auth);
                window.location.href = 'index.html';
            } catch (error) {
                console.error('Logout error:', error);
                // Force redirect even if signOut fails
                window.location.href = 'index.html';
            }
        }

        // ============================================
        // GLOBAL EXPORTS
        // ============================================
        window.navigateTo = navigateTo;
        window.logout = logout;

        console.log('✅ Dashboard ready - Using server API');
        console.log('🔗 API Base:', API_BASE);
    </script>
</body>
</html>
